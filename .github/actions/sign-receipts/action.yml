name: "Sign SZL receipts (Sigstore keyless)"
description: >-
  Mint GENUINE Sigstore keyless DSSE signatures over the SZL governance decision
  log AND a vessels Khipu-ingest gate-decision receipt, then independently verify
  each envelope (Fulcio cert chain + Rekor inclusion + DSSE signature). The
  calling job MUST grant `permissions: id-token: write`; without an ambient OIDC
  token the underlying scripts REFUSE rather than fabricate a signature.

  This is a local composite action (no third-party signing action), satisfying the
  szl-holdings org allowlist (github-owned/verified only). It is a signature-only
  upgrade — the SLSA claim is unchanged (still L1).

inputs:
  log:
    description: "Path to the governance decision log to sign."
    required: false
    default: "governed_loop_E4.json"
  subject:
    description: "DSSE statement subject name for the governance log."
    required: false
    default: "szl-governance-decision-log"
  python-version:
    description: "Python version used to run the signing scripts."
    required: false
    default: "3.12"

outputs:
  governance-envelope:
    description: "Path to the signed governance DSSE envelope."
    value: ${{ steps.locate.outputs.governance_envelope }}
  attestations-dir:
    description: "Directory containing all signed DSSE envelopes."
    value: "attestations"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install sigstore SDK
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "sigstore>=2.0.0"

    - name: Sign governance decision log (real Sigstore keyless)
      shell: bash
      run: |
        python scripts/sign_governance_receipts.py \
          --log "${{ inputs.log }}" \
          --subject "${{ inputs.subject }}"

    - name: Record vessels Khipu-ingest receipt (real DSSE via szl_wire.ingest_receipt)
      shell: bash
      run: |
        python scripts/sign_khipu_ingest_receipt.py

    - name: Locate signed governance envelope
      id: locate
      shell: bash
      run: |
        envelope="$(ls attestations/governance/*.dsse.json | head -n1)"
        echo "governance_envelope=${envelope}" >> "$GITHUB_OUTPUT"
        echo "Signed governance envelope: ${envelope}"

    - name: Independently verify every signed envelope (Fulcio + Rekor + DSSE)
      shell: bash
      run: |
        # The Fulcio certificate SAN for a GitHub Actions OIDC identity is exactly
        # GITHUB_WORKFLOW_REF (the calling workflow's ref), so this pins the signer
        # to whichever deploy/release pipeline invoked this action.
        identity="https://github.com/${GITHUB_WORKFLOW_REF}"
        echo "Expected signer identity: ${identity}"
        shopt -s nullglob
        envelopes=(attestations/governance/*.dsse.json attestations/khipu/*.dsse.json)
        if [ ${#envelopes[@]} -eq 0 ]; then
          echo "No signed envelopes found to verify" >&2
          exit 1
        fi
        for env in "${envelopes[@]}"; do
          echo "::group::verify ${env}"
          python scripts/verify_dsse_real.py "${env}" \
            --identity "${identity}" \
            --issuer "https://token.actions.githubusercontent.com"
          echo "::endgroup::"
        done
