name: GHCR Build + Push (uds-v0.3.0)
# Builds the root Dockerfile and pushes to ghcr.io/szl-holdings/<repo>.
# Unblocks Warhacker UDS bundle chain (FA-01).
# Uses GITHUB_TOKEN for GHCR auth (a11oy repo is PUBLIC, package creation allowed).
# Adds uds-v0.3.0 + latest tags. Cosign keyless OIDC signing.
# DCO: Signed-off-by: Yachay <yachay@szlholdings.ai>
on:
  push:
    branches: [main]
    tags: ['v*', 'uds-v*']
  workflow_dispatch:
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The published image stacks many layers; the runner's default overlay2
      # graphdriver caps lower dirs at 128 and `docker pull` fails with
      # "failed to register layer: max depth exceeded". Switch the daemon to the
      # containerd image store (no 128-layer cap) BEFORE buildx/build so we can
      # pull + boot the freshly built image for the demo-tier proof below.
      - name: Enable containerd image store (avoid overlay2 128-layer limit)
        run: |
          set -euo pipefail
          sudo mkdir -p /etc/docker
          if [ -s /etc/docker/daemon.json ]; then
            sudo jq '.features."containerd-snapshotter" = true' /etc/docker/daemon.json > /tmp/daemon.json
            sudo mv /tmp/daemon.json /etc/docker/daemon.json
          else
            echo '{"features":{"containerd-snapshotter":true}}' | sudo tee /etc/docker/daemon.json
          fi
          sudo systemctl restart docker
          for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 1; done
          docker info -f '{{ .DriverStatus }}'
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build-push
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          # PUBLISHED-IMAGE CONTRACT: enforce the hard real-local-model requirement on
          # the GHCR build (ample RAM+time). The Dockerfile defaults this to 0 so a
          # CONSTRAINED HF Spaces rebuild degrades to the honest tower-side label instead
          # of bricking; here we set 1 so a failed llama compile / missing GGUF fails the
          # published build loud (also boot-verified by the step below).
          build-args: |
            A11OY_REQUIRE_LOCAL_LLM=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/szl-holdings/${{ github.event.repository.name }}:uds-v0.3.0
            ghcr.io/szl-holdings/${{ github.event.repository.name }}:latest
      # Boot the freshly built image and PROVE the "alloy" demo tier serves genuine
      # llama.cpp output from the bundled GGUF — NOT the honest tower-side fallback.
      # Task #590 made the GGUF reliably present (pinned rev + retry + sha/size verify)
      # and pinned the prebuilt llama-cpp-python wheel; this step is the runtime proof
      # that the published image ACTUALLY answers locally. Runs BEFORE signing so a
      # broken demo tier is never cosign-signed / attested. Fails loud if the weight is
      # missing, llama.cpp can't load, or the served result is the tower-side fallback.
      - name: Demo tier serves REAL local model (not tower-side fallback)
        timeout-minutes: 8
        env:
          IMG: ghcr.io/szl-holdings/${{ github.event.repository.name }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMG}@${DIGEST}"
          docker run --rm -i --entrypoint python3 "${IMG}@${DIGEST}" - <<'PYEOF'
          import sys, json
          import szl_alloy_models as m

          errors = []

          # The demo_cpu tier is the only one that can serve locally on CPU.
          demo = [x for x in m.ALLOY_ROSTER if x.get("tier_band") == "demo_cpu"]
          if not demo:
              errors.append("no demo_cpu tier model present in ALLOY_ROSTER")

          # 1) Backend must be GENUINELY available: GGUF present + llama.cpp loads.
          path = m._gguf_path()
          avail = m.backend_available()
          sha = m._gguf_sha(path)
          print("gguf_path=%r backend_available=%s gguf_sha256_fp=%s backend_error=%r"
                % (path, avail, sha, m._LLAMA_ERR), flush=True)
          if not path:
              errors.append("no GGUF weight in image (A11OY_ALLOY_GGUF / /app/models/*.gguf missing)")
          if not avail:
              errors.append("llama.cpp backend unavailable: %s" % (m._LLAMA_ERR,))

          # 2) The demo tier must serve REAL local output, not the honest tower-side label.
          #    _local_generate is the exact serving path alloy_governed_suggest uses when the
          #    chosen model is tier_band == "demo_cpu".
          gen = m._local_generate("Write a Python function add(a, b) that returns their sum.",
                                  max_tokens=48)
          safe = {k: (v[:200] if (k == "text" and isinstance(v, str)) else v)
                  for k, v in gen.items()}
          print("generation=" + json.dumps(safe), flush=True)

          if not gen.get("served_locally"):
              errors.append("served_locally=False -> tower-side fallback was taken")
          if gen.get("tower_side"):
              errors.append("tower_side=True -> fallback path")
          if gen.get("backend") != "llama.cpp":
              errors.append("backend=%r, expected 'llama.cpp'" % gen.get("backend"))
          if gen.get("honest_label"):
              errors.append("generation carried honest_label (fallback marker): %r"
                            % gen.get("honest_label"))
          text = (gen.get("text") or "").strip()
          if not text:
              errors.append("generation text was empty")

          if errors:
              print("\n[FAIL] demo-tier local-model assertion FAILED:", flush=True)
              for e in errors:
                  print("  - " + e, flush=True)
              sys.exit(1)
          print("\n[OK] alloy demo tier served genuine llama.cpp output from the bundled "
                "GGUF (served_locally=True, backend=llama.cpp, %d chars)." % len(text), flush=True)
          PYEOF
      # Prove the demo tier is reachable OVER HTTP (not just in-process): the public
      # /v1/alloy/demo route must serve the bundled GGUF locally. Without this the
      # local-model claim is only provable in CI; this is the same path real users /
      # the a11oy-uptime smoke check exercise. Asserts backend=="llama.cpp" and
      # served_locally=True from the HTTP response (via TestClient against the real
      # registered route). Fails loud if the route falls back to the tower-side label.
      - name: Demo tier reachable over HTTP (/v1/alloy/demo serves the bundled model)
        timeout-minutes: 8
        env:
          IMG: ghcr.io/szl-holdings/${{ github.event.repository.name }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "${IMG}@${DIGEST}"
          docker run --rm -i --entrypoint python3 "${IMG}@${DIGEST}" - <<'PYEOF'
          import sys, json
          from fastapi import FastAPI
          from starlette.testclient import TestClient
          import szl_alloy_models as m

          errors = []
          app = FastAPI()
          status = m.register(app, "a11oy")
          if "demo" not in status.get("endpoints", []):
              errors.append("demo endpoint not registered: %r" % status.get("endpoints"))
          client = TestClient(app)

          # GET (bare, uptime style) and POST (with prompt) must both serve locally.
          for method, kwargs in (("GET", {}),
                                 ("POST", {"json": {"prompt": "Write a Python function add(a, b).",
                                                    "max_tokens": 48}})):
              resp = client.request(method, "/v1/alloy/demo", **kwargs)
              if resp.status_code != 200:
                  errors.append("%s /v1/alloy/demo -> HTTP %d" % (method, resp.status_code))
                  continue
              d = resp.json()
              safe = {k: (v[:120] if isinstance(v, str) else v)
                      for k, v in d.items() if k in
                      ("tier_forced", "backend", "served_locally", "live_demo", "honest_label")}
              print("%s /v1/alloy/demo -> %s" % (method, json.dumps(safe)), flush=True)
              if d.get("tier_forced") != "demo_cpu":
                  errors.append("%s: tier_forced=%r, expected demo_cpu" % (method, d.get("tier_forced")))
              if d.get("backend") != "llama.cpp":
                  errors.append("%s: backend=%r, expected 'llama.cpp'" % (method, d.get("backend")))
              if not d.get("served_locally"):
                  errors.append("%s: served_locally=False -> tower-side fallback over HTTP" % method)
              gtb = (d.get("router") or {}).get("chosen", {}).get("tier_band")
              if gtb != "demo_cpu":
                  errors.append("%s: routed tier_band=%r, expected demo_cpu" % (method, gtb))
              gen_text = ((d.get("generation") or {}).get("text") or "").strip()
              if not gen_text:
                  errors.append("%s: empty generation text" % method)

          if errors:
              print("\n[FAIL] HTTP demo-route assertion FAILED:", flush=True)
              for e in errors:
                  print("  - " + e, flush=True)
              sys.exit(1)
          print("\n[OK] /v1/alloy/demo serves the bundled GGUF over HTTP "
                "(backend=llama.cpp, served_locally=True).", flush=True)
          PYEOF
      - name: Attest build provenance (GitHub Attestations API + Rekor)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/szl-holdings/${{ github.event.repository.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v3.8.1
      - name: cosign sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/szl-holdings/${{ github.event.repository.name }}:uds-v0.3.0
          cosign sign --yes ghcr.io/szl-holdings/${{ github.event.repository.name }}:latest
      # SLSA L2: write a cosign-NATIVE provenance attestation to GHCR. The
      # actions/attest-build-provenance step above lands the attestation in the
      # GitHub Attestations API + public Rekor (verifiable via `gh attestation
      # verify`), but does NOT produce an OCI referrer that `cosign
      # verify-attestation` reads. This step closes that gap so the deployed
      # image passes `cosign verify-attestation --type slsaprovenance`.
      - name: cosign attest SLSA provenance (registry, cosign-verifiable)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMG="ghcr.io/szl-holdings/${{ github.event.repository.name }}"
          DIGEST="${{ steps.build-push.outputs.digest }}"
          # SLSA Provenance v0.2 predicate (matches `cosign ... --type slsaprovenance`,
          # which validates the v0.2 schema with a top-level `builder` field).
          cat > predicate.json <<EOF
          {
            "builder": {
              "id": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/ghcr-build-push.yml@${{ github.ref }}"
            },
            "buildType": "https://actions.github.io/buildtypes/workflow/v1",
            "invocation": {
              "configSource": {
                "uri": "git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}",
                "digest": { "sha1": "${{ github.sha }}" },
                "entryPoint": ".github/workflows/ghcr-build-push.yml"
              },
              "environment": {
                "event_name": "${{ github.event_name }}",
                "repository_id": "${{ github.repository_id }}",
                "runner_environment": "github-hosted"
              }
            },
            "metadata": {
              "buildInvocationId": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}",
              "completeness": { "parameters": true, "environment": false, "materials": false },
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}",
                "digest": { "sha1": "${{ github.sha }}" }
              }
            ]
          }
          EOF
          cosign attest --yes \
            --type slsaprovenance \
            --predicate predicate.json \
            "${IMG}@${DIGEST}"
      - name: cosign verify-attestation (SLSA L2 honesty gate)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMG="ghcr.io/szl-holdings/${{ github.event.repository.name }}"
          DIGEST="${{ steps.build-push.outputs.digest }}"
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp="github.com/szl-holdings" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${IMG}@${DIGEST}" > /dev/null
          echo "SLSA L2 verified: cosign verify-attestation passed for ${IMG}@${DIGEST}"
permissions:
  contents: read
