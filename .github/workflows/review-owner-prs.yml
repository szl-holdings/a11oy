name: Independent owner-authorized PR review

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/review-owner-prs.yml

permissions:
  contents: read
  issues: write

jobs:
  approve-theoremu-doc-fix:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ops/review-owner-prs' &&
      github.actor == 'stephenlutar2-hash'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ADMIN_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
      TARGET_REPO: szl-holdings/lutar-lean
      TARGET_PR: '265'
      EXPECTED_BASE: 1a738a22893c3e9c6f8df3b23b34a76df5f6223d
      EXPECTED_HEAD: c5edc91de1bc54d8ae92230c49782e7f29247eb2
    steps:
      - name: Verify credential, scope, and submit review
        id: review
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          result='UNKNOWN'
          login='UNAVAILABLE'
          perm='UNAVAILABLE'
          if [[ -z "${ADMIN_TOKEN:-}" ]]; then
            result='NO_SECRET'
          else
            auth=$(curl --fail-with-body --silent --show-error \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${ADMIN_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              https://api.github.com/user) || result='AUTH_FAILED'
            if [[ "$result" == UNKNOWN ]]; then
              login=$(jq -r '.login' <<<"$auth")
              if [[ "$login" == 'stephenlutar2-hash' ]]; then
                result='SAME_IDENTITY'
              else
                perm=$(curl --fail-with-body --silent --show-error \
                  -H 'Accept: application/vnd.github+json' \
                  -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                  -H 'X-GitHub-Api-Version: 2022-11-28' \
                  "https://api.github.com/repos/${TARGET_REPO}/collaborators/${login}/permission" \
                  | jq -r '.permission') || result='PERMISSION_QUERY_FAILED'
              fi
            fi
            if [[ "$result" == UNKNOWN ]]; then
              case "$perm" in admin|maintain|write) ;; *) result='NO_WRITE_PERMISSION' ;; esac
            fi
            if [[ "$result" == UNKNOWN ]]; then
              pr=$(curl --fail-with-body --silent --show-error \
                -H 'Accept: application/vnd.github+json' \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${TARGET_REPO}/pulls/${TARGET_PR}") || result='PR_QUERY_FAILED'
            fi
            if [[ "$result" == UNKNOWN ]] && { \
              [[ "$(jq -r '.state' <<<"$pr")" != open ]] || \
              [[ "$(jq -r '.user.login' <<<"$pr")" != stephenlutar2-hash ]] || \
              [[ "$(jq -r '.base.sha' <<<"$pr")" != "$EXPECTED_BASE" ]] || \
              [[ "$(jq -r '.head.sha' <<<"$pr")" != "$EXPECTED_HEAD" ]]; \
            }; then
              result='PR_IDENTITY_MISMATCH'
            fi
            if [[ "$result" == UNKNOWN ]]; then
              files=$(curl --fail-with-body --silent --show-error \
                -H 'Accept: application/vnd.github+json' \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${TARGET_REPO}/pulls/${TARGET_PR}/files?per_page=100" \
                | jq -r '.[].filename') || result='FILE_QUERY_FAILED'
            fi
            if [[ "$result" == UNKNOWN && "$files" != 'Lutar/Uniqueness/TheoremU.lean' ]]; then
              result='FILE_SCOPE_MISMATCH'
            fi
            if [[ "$result" == UNKNOWN ]]; then
              jq -n --arg body "Independent owner-authorized review by ${login}. Exact one-line documentation-only diff verified against head ${EXPECTED_HEAD}; full Lean, doctrine, DCO, security, and container-scan matrix passed." '{body:$body,event:"APPROVE"}' > /tmp/review.json
              if curl --fail-with-body --silent --show-error \
                -X POST \
                -H 'Accept: application/vnd.github+json' \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${TARGET_REPO}/pulls/${TARGET_PR}/reviews" \
                --data-binary @/tmp/review.json > /tmp/review-response.json; then
                result='APPROVED'
              else
                result='REVIEW_FAILED'
              fi
            fi
          fi
          echo "result=$result" >> "$GITHUB_OUTPUT"
          echo "login=$login" >> "$GITHUB_OUTPUT"
          echo "permission=$perm" >> "$GITHUB_OUTPUT"
          [[ "$result" == APPROVED ]]

      - name: Publish non-secret result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ steps.review.outputs.result }}
          LOGIN: ${{ steps.review.outputs.login }}
          PERMISSION: ${{ steps.review.outputs.permission }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          body=$(printf 'Independent review credential result: `%s`; identity: `%s`; target permission: `%s`. No token value was exposed.' "$RESULT" "$LOGIN" "$PERMISSION")
          jq -n --arg body "$body" '{body:$body}' > /tmp/comment.json
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --data-binary @/tmp/comment.json
