name: Trivy + Grype container vulnerability scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

permissions:
  contents: read
jobs:
  trivy-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'  # Don't fail on scan (gate in grype job)

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@cf463419fdde78c727231e445622a9ac37966f84 # v3.28.15
        with:
          sarif_file: trivy-results.sarif

    permissions:
      contents: read
      security-events: write
  grype-gate:
    name: Grype CVE gate (fail on HIGH/CRITICAL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Verify Grype gate cannot swallow scanner failure
        run: python3 tests/test_grype_gate_contract.py

      - name: Scan with Grype (fail build on HIGH/CRITICAL)
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: grype-results.sarif
          cache-db: true

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@cf463419fdde78c727231e445622a9ac37966f84 # v3.28.15
        if: always()
        continue-on-error: true  # Reporting must not replace the scanner's exit status.
        with:
          sarif_file: grype-results.sarif
    permissions:
      contents: read
      security-events: write
