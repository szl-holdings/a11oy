name: Shared-source drift guard

# a11oy and killinchu vendor many byte-identical source modules (szl_dsse.py,
# szl_be_hardening.py, szl_formula_wiring.py, a11oy_hf_assets.py, ...). When one
# repo updates a shared file and the sibling is forgotten, the two demos silently
# diverge. dockerfile-copy-check.py catches *missing* COPY sources; this guard
# catches *stale / divergent* shared sources.
#
# The shared set is derived from BOTH Dockerfiles' COPY lists (see
# .github/shared-file-drift-check.py) so it stays current automatically. It is a
# ratchet: files that are currently identical must stay identical, while the
# pre-existing accepted divergences live in .github/shared-file-drift-allow.txt.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'  # Mondays 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-drift:
    name: Shared source files in sync with killinchu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout a11oy (this repo)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: self
      - name: Checkout killinchu (sibling)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: szl-holdings/killinchu
          ref: main
          path: sibling
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Compare shared source files
        run: >-
          python3 self/.github/shared-file-drift-check.py self sibling
          --self-name=a11oy --sibling-name=killinchu
