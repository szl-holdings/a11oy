name: Shared-source drift guard

# a11oy and killinchu vendor many byte-identical source modules (szl_dsse.py,
# szl_be_hardening.py, szl_formula_wiring.py, a11oy_hf_assets.py, ...). When one
# repo updates a shared file and the sibling is forgotten, the two demos silently
# diverge. dockerfile-copy-check.py catches *missing* COPY sources; this guard
# catches *stale / divergent* shared sources.
#
# The shared set is derived from BOTH Dockerfiles' COPY lists (see
# .github/shared-file-drift-check.py) so it stays current automatically. It is a
# ratchet: files that are currently identical must stay identical, while the
# pre-existing accepted divergences live in .github/shared-file-drift-allow.txt.
# A coordinated cross-repository PR may pin the sibling's exact open-PR head in
# its body as `Shared-source-peer: owner/repo#PR@40-hex-sha`.  Branch names are
# never accepted.  Push/schedule/manual runs always compare main to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  schedule:
    - cron: '23 6 * * 1'  # Mondays 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-drift:
    name: Shared source files in sync with killinchu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout a11oy (this repo)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: self
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Self-test immutable sibling resolver
        run: python3 self/.github/test-resolve-shared-peer-ref.py
      - name: Resolve immutable sibling ref
        id: peer
        run: >-
          python3 self/.github/resolve-shared-peer-ref.py
          --expected-repository=szl-holdings/killinchu
      - name: Verify pinned peer is the declared open PR head
        if: steps.peer.outputs.source == 'pinned-peer-pr'
        env:
          GH_TOKEN: ${{ github.token }}
          PEER_REPOSITORY: ${{ steps.peer.outputs.repository }}
          PEER_PULL_REQUEST: ${{ steps.peer.outputs.pull_request }}
          PEER_REF: ${{ steps.peer.outputs.ref }}
        run: |
          actual="$(gh api "repos/${PEER_REPOSITORY}/pulls/${PEER_PULL_REQUEST}" --jq '[.state, .base.ref, .head.sha] | join(" ")')"
          expected="open main ${PEER_REF}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Pinned peer must remain the exact head of an open PR targeting main."
            printf 'expected: %s\nactual:   %s\n' "$expected" "$actual"
            exit 1
          fi
          {
            echo "### Shared-source peer pin"
            echo
            echo "- repository: \`${PEER_REPOSITORY}\`"
            echo "- pull request: \`#${PEER_PULL_REQUEST}\`"
            echo "- immutable head: \`${PEER_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Checkout killinchu (verified sibling)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ steps.peer.outputs.repository }}
          ref: ${{ steps.peer.outputs.ref }}
          path: sibling
          persist-credentials: false
      - name: Compare shared source files
        run: >-
          python3 self/.github/shared-file-drift-check.py self sibling
          --self-name=a11oy --sibling-name=killinchu
