name: Report Current A11oy Actions Runs

on:
  push:
    branches: [ops/report-actions-runs-20260722]
    paths:
      - .github/workflows/report-actions-runs-20260722.yml

permissions:
  contents: write
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/report-actions-runs-20260722
          persist-credentials: true
          fetch-depth: 0
      - name: Capture current deployment and verifier runs
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" > /tmp/runs.json
          jq '{captured_at: now | todate, runs: [.workflow_runs[] | select(
              .head_sha == "06890cb1428323e208da2e243d184db927e50c62" or
              .head_sha == "71ccc8976d282a1a5dd72d475da37a860a6bd8e0"
            ) | {
              id, name, event, status, conclusion, head_branch, head_sha, run_number,
              created_at, updated_at, html_url
            }]}' /tmp/runs.json > actions-runs-20260722.json
          git rm .github/workflows/report-actions-runs-20260722.yml
          git add actions-runs-20260722.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): record current deployment workflow runs' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/report-actions-runs-20260722
