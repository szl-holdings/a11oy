name: url secret-leak guard

# Guards a11oy's finance feeds against leaking an API key into a request URL.
#
# a11oy_vertical_feeds.py sends the Polygon.io key via an
# "Authorization: Bearer <key>" HEADER, never in the URL, because _cached_fetch
# embeds the failing URL in its error payloads ("{type}: {str(e)[:120]}") — a key
# placed in the query string would leak into returned/cached error strings.
# Until now that safety property was only enforced by manual grep. This guard
# fails the build if a POLYGON_API_KEY / api-key / token / secret value (or a
# local variable derived from one) is concatenated into a URL or query string
# in a11oy_vertical_feeds.py.
#
# See scripts/check_url_secret_leak.py for the policy and
# scripts/check_url_secret_leak.test.sh for the offline negative-fixture
# self-test that proves the guard actually fails on a key-in-URL pattern.

on:
  push:
    branches: [main]
    paths:
      - "a11oy_vertical_feeds.py"
      - "scripts/check_url_secret_leak.py"
      - "scripts/check_url_secret_leak.test.sh"
      - ".github/workflows/url-secret-leak-guard.yml"
  pull_request:
    branches: [main]
    paths:
      - "a11oy_vertical_feeds.py"
      - "scripts/check_url_secret_leak.py"
      - "scripts/check_url_secret_leak.test.sh"
      - ".github/workflows/url-secret-leak-guard.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: No finance API key in a URL / query string
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Self-test the guard (offline negative fixtures)
        run: bash scripts/check_url_secret_leak.test.sh
      - name: Verify no API key / secret reaches a URL in a11oy_vertical_feeds.py
        run: python3 scripts/check_url_secret_leak.py --file a11oy_vertical_feeds.py
