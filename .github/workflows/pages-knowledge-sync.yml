# pages-knowledge-sync.yml — keep a11oy's SERVED pages/knowledge.json consistent
# with the canonical knowledge.json AND enforce Doctrine-v11 honesty on both.
# Doctrine v11 LOCKED | SLSA L1 honest
# Signed-off-by: Forge (Replit task agent) <forge@szl-holdings>
#
# a11oy ships TWO copies of the corpus:
#   * root  knowledge.json  — CANONICAL, kernel-derived (theorems / formulas /
#                             axioms + honesty labels). killinchu mirrors it
#                             byte-for-byte (see killinchu knowledge-corpus-sync).
#   * pages/knowledge.json  — a lighter copy SERVED by the a11oy console.
#
# The killinchu guard validates ONLY the root copy. pages/knowledge.json was
# UNCOVERED: it could quietly OVERCLAIM relative to root (e.g. mark Conjecture 1 /
# Λ-uniqueness "proven" when root honestly keeps it "conjectured") or drop the
# honesty ledger, with no CI catching it. This guard closes that gap.
#
# It FAILS if:
#   * the served copy overclaims relative to root — a theorem present in BOTH must
#     carry the SAME maturity in pages as in root, and the Conjecture-1 honesty
#     ledger (proof_summary.conjecture / locked_ids / locked_count_theorem) must
#     match root, OR
#   * EITHER copy violates a Doctrine-v11 honesty invariant — Conjecture 1
#     (Λ-uniqueness / F23) must stay OPEN (never "proven"), the locked kernel count
#     must stay machine-pinned, Theorem U (if present) must stay conditional.
#
# The honesty-invariant logic is identical to killinchu's knowledge-corpus-sync
# guard, so both organs apply the SAME honesty checks.
#
# Org policy compliance: github-owned actions only, SHA-pinned; checker + self-test
# are stdlib-only Python (no pip install, no third-party action).

name: Pages knowledge consistent with canonical corpus

on:
  push:
    branches: [main]
    paths:
      - "knowledge.json"
      - "pages/knowledge.json"
      - "scripts/check_pages_knowledge_sync.py"
      - "scripts/test_check_pages_knowledge_sync.py"
      - ".github/workflows/pages-knowledge-sync.yml"
  pull_request:
    branches: [main]
    paths:
      - "knowledge.json"
      - "pages/knowledge.json"
      - "scripts/check_pages_knowledge_sync.py"
      - "scripts/test_check_pages_knowledge_sync.py"
      - ".github/workflows/pages-knowledge-sync.yml"
  schedule:
    - cron: '47 6 * * 1'  # Mondays 06:47 UTC (offset from sibling corpus guards)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    name: Validator self-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
      - name: Byte-validate the checker (ast.parse) before trusting it
        run: |
          python3 -c "import ast; ast.parse(open('scripts/check_pages_knowledge_sync.py').read()); print('checker ast OK')"
      - name: Run validator self-test (proves it catches overclaim + honesty regressions)
        run: python3 scripts/test_check_pages_knowledge_sync.py

  corpus-consistency:
    name: pages/knowledge.json consistent with knowledge.json + honest
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
      - name: Compare pages/knowledge.json to canonical + validate Doctrine-v11 honesty
        run: >-
          python3 scripts/check_pages_knowledge_sync.py
          --root knowledge.json
          --pages pages/knowledge.json
