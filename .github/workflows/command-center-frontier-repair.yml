name: Command-center frontier repair

on:
  push:
    branches:
      - frontier/command-center-readonly-20260722
    paths:
      - .github/workflows/command-center-frontier-repair.yml
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/apply_command_center_frontier.py
      - .github/workflows/command-center-frontier-repair.yml

permissions:
  contents: write

concurrency:
  group: command-center-frontier-repair-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  repair:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: frontier/command-center-readonly-20260722
          fetch-depth: 0

      - name: Apply fail-closed command-center repairs
        run: python .github/scripts/apply_command_center_frontier.py

      - name: Verify focused contracts
        id: verify
        shell: bash
        run: |
          set +e
          mkdir -p reports
          {
            set -x
            python -m py_compile \
              szl_brain_hub.py \
              szl_brain_command.py \
              szl_ecosystem_routes.py \
              szl_rosie_companion.py \
              organs/amaru/szl_rosie_companion.py \
              organs/sentra/szl_rosie_companion.py \
              serve.py \
              tests/test_command_center_readonly_contract.py
            node --check tools/readiness-harness/probe_runner.mjs
            python -m pytest -q tests/test_command_center_readonly_contract.py
            python szl_brain_hub.py
            python szl_brain_command.py
            git diff --check
            test "$(sha256sum szl_rosie_companion.py | cut -d' ' -f1)" = \
                 "$(sha256sum organs/amaru/szl_rosie_companion.py | cut -d' ' -f1)"
            test "$(sha256sum szl_rosie_companion.py | cut -d' ' -f1)" = \
                 "$(sha256sum organs/sentra/szl_rosie_companion.py | cut -d' ' -f1)"
          } > reports/command-center-verification.log 2>&1
          code=$?
          set +x
          cat reports/command-center-verification.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload exact verification log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: command-center-verification-${{ github.run_id }}
          path: reports/command-center-verification.log
          if-no-files-found: error
          retention-days: 30

      - name: Commit verified product changes and remove bootstrap
        if: steps.verify.outputs.exit_code == '0'
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/scripts/apply_command_center_frontier.py \
            .github/workflows/command-center-frontier-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            szl_brain_hub.py \
            szl_brain_command.py \
            szl_ecosystem_routes.py \
            szl_rosie_companion.py \
            organs/amaru/szl_rosie_companion.py \
            organs/sentra/szl_rosie_companion.py \
            serve.py \
            static/3d/holographic.html \
            tools/readiness-harness/probe_runner.mjs \
            tests/test_command_center_readonly_contract.py \
            .github/scripts/apply_command_center_frontier.py \
            .github/workflows/command-center-frontier-repair.yml
          git commit \
            -m "fix(frontier): make command-center reads non-mutating" \
            -m "Keep Brain and ecosystem GET contracts read-only, require an external verified two-person gate for evolution, make unattended readiness probes GET/HEAD-only, add the compact readiness view, and add a mobile keyboard-accessible evidence rail across every holographic surface." \
            -m "Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin HEAD:frontier/command-center-readonly-20260722

      - name: Enforce fail-closed verification
        if: always()
        run: |
          code="${{ steps.verify.outputs.exit_code }}"
          if [ -z "$code" ] || [ "$code" -ne 0 ]; then
            echo "::error::Command-center verification failed; inspect the retained artifact."
            exit 1
          fi
