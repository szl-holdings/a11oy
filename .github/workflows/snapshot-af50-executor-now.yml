name: Snapshot af50 Executor Now

on:
  push:
    branches: [ops/report-actions-runs-20260722]
    paths:
      - .github/workflows/snapshot-af50-executor-now.yml

permissions:
  contents: write
  actions: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: ops/verify-a11oy-af50a2
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/report-actions-runs-20260722
          persist-credentials: true
          fetch-depth: 0
      - name: Capture current run and jobs
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/actions/runs?branch=${TARGET_BRANCH}&per_page=100" > /tmp/runs.json
          run_id="$(jq -r '[.workflow_runs[] | select(.name == "Verify Exact Merged A11oy af50a2")][0].id // empty' /tmp/runs.json)"
          if [ -n "$run_id" ]; then
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" > /tmp/jobs.json
          else
            printf '{"jobs":[]}' > /tmp/jobs.json
          fi
          jq -n --slurpfile runs /tmp/runs.json --slurpfile jobs /tmp/jobs.json --arg branch "$TARGET_BRANCH" '{
            captured_at: now | todate,
            target_branch: $branch,
            runs: [$runs[0].workflow_runs[] | select(.name == "Verify Exact Merged A11oy af50a2") | {
              id, name, event, status, conclusion, head_branch, head_sha,
              run_number, created_at, updated_at, html_url
            }],
            jobs: [$jobs[0].jobs[] | {id, name, status, conclusion, started_at, completed_at, steps}]
          }' > actions-af50-current.json
          git rm .github/workflows/snapshot-af50-executor-now.yml
          git add actions-af50-current.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): record current af50 executor snapshot' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/report-actions-runs-20260722
