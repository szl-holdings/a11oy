name: Repair SDA branch SDK sync

on:
  push:
    branches: [agent/hf-space-api-route-repair-20260722]
    paths:
      - .github/workflows/repair-sda-sdk-sync.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: agent/hf-space-api-route-repair-20260722
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Restore verified static SDK classifications and exact inventory tests
        shell: python
        run: |
          from pathlib import Path

          replacements_by_path = {
              Path('szl_spaces_surface.py'): {
                  '"name": "energy-attested-runs", "slug": "energy-attested-runs", "title": "Energy-Attested Inference Runs", "sdk": "gradio"':
                  '"name": "energy-attested-runs", "slug": "energy-attested-runs", "title": "Energy-Attested Inference Runs", "sdk": "static"',
                  '"name": "guardrail-receipt", "slug": "guardrail-receipt", "title": "Guardrail Decision-Receipt", "sdk": "gradio"':
                  '"name": "guardrail-receipt", "slug": "guardrail-receipt", "title": "Guardrail Decision-Receipt", "sdk": "static"',
                  '"name": "szl-forge-lab", "slug": "szl-forge-lab", "title": "SZL Forge Lab", "sdk": "gradio"':
                  '"name": "szl-forge-lab", "slug": "szl-forge-lab", "title": "SZL Forge Lab", "sdk": "static"',
              },
              Path('tests/test_szl_spaces_inventory.py'): {
                  '("energy-attested-runs", "energy-attested-runs", "Energy-Attested Inference Runs", "gradio")':
                  '("energy-attested-runs", "energy-attested-runs", "Energy-Attested Inference Runs", "static")',
                  '("guardrail-receipt", "guardrail-receipt", "Guardrail Decision-Receipt", "gradio")':
                  '("guardrail-receipt", "guardrail-receipt", "Guardrail Decision-Receipt", "static")',
                  '("szl-forge-lab", "szl-forge-lab", "SZL Forge Lab", "gradio")':
                  '("szl-forge-lab", "szl-forge-lab", "SZL Forge Lab", "static")',
              },
          }
          for path, replacements in replacements_by_path.items():
              text = path.read_text(encoding='utf-8')
              for old, new in replacements.items():
                  if text.count(old) != 1:
                      raise SystemExit(f'expected exactly one occurrence in {path}: {old}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8', newline='\n')
      - name: Restore canonical shared-source drift workflow
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git show origin/main:.github/workflows/shared-file-drift.yml > .github/workflows/shared-file-drift.yml
      - name: Verify exact Space inventory contract
        run: python -m pytest -q tests/test_szl_spaces_inventory.py
      - name: Commit repair and remove temporary workflow
        run: |
          set -euo pipefail
          rm .github/workflows/repair-sda-sdk-sync.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add szl_spaces_surface.py tests/test_szl_spaces_inventory.py \
            .github/workflows/shared-file-drift.yml .github/workflows/repair-sda-sdk-sync.yml
          git commit -m 'fix(spaces): preserve verified static SDK inventory' \
            -m 'Keep the exact SDA contract probes while retaining the three live static Space classifications already merged in #1027, and restore the canonical shared-source guard. Full protected CI remains authoritative.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:agent/hf-space-api-route-repair-20260722
