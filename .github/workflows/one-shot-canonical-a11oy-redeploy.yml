name: One-shot — redeploy and attest sole canonical A11oy

on:
  push:
    branches: [ops/redeploy-canonical-a11oy-20260722]
    paths:
      - .github/workflows/one-shot-canonical-a11oy-redeploy.yml

permissions:
  contents: read
  issues: write

concurrency:
  group: one-shot-canonical-a11oy-redeploy
  cancel-in-progress: false

jobs:
  sync-runtime-identity:
    name: Bind canonical runtime to current protected main
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Checkout current protected main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 1
      - name: Resolve exact source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set the canonical Space source identity
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_ID: SZLHOLDINGS/a11oy
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail
          test -n "${HF_TOKEN:-}" || { echo '::error::HF_TOKEN is not configured'; exit 2; }
          python -m pip install --disable-pip-version-check --quiet "huggingface_hub>=1.3,<2"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["SPACE_ID"]
          expected = os.environ["SOURCE_SHA"]
          current = None
          try:
              value = api.get_space_variables(repo_id=repo_id).get("SZL_GIT_SHA")
              current = getattr(value, "value", value)
          except Exception as exc:
              print("space-variable readback warning:", type(exc).__name__, str(exc)[:200])
          if current != expected:
              api.add_space_variable(
                  repo_id=repo_id,
                  key="SZL_GIT_SHA",
                  value=expected,
                  description=(
                      "Exact protected-main source revision serving the sole canonical "
                      "A11oy Space; maintained by governed deployment automation."
                  ),
              )
              print("updated SZL_GIT_SHA", current, "->", expected)
          else:
              print("SZL_GIT_SHA already current:", expected)
          PY

  deploy:
    name: Deploy exact protected main and attest every Dockerfile-derived file
    needs: sync-runtime-identity
    uses: szl-holdings/.github/.github/workflows/reusable-hf-deploy.yml@5b0d38fadadc073812bfc6175a1e823cd529939f
    with:
      hf-repo: SZLHOLDINGS/a11oy
      ref: main
      prune: true
      wait-running: 1200
      smoke-paths: '["/", "/api/livez", "/api/build-info", "/api/a11oy/v1/verify/receipt", "/api/a11oy/v1/brain/capabilities"]'
    secrets: inherit

  verify-single-topology:
    name: Verify canonical runtime, routes, collections, and clone absence
    needs: [sync-runtime-identity, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_SOURCE_SHA: ${{ needs.sync-runtime-identity.outputs.source_sha }}
      REPORT_ISSUE_TITLE: '[hf-live-verification] sole canonical A11oy'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact protected main for critical-byte readback
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.EXPECTED_SOURCE_SHA }}
          persist-credentials: false
          fetch-depth: 1
      - name: Install verification client
        run: |
          python -m pip install --disable-pip-version-check --quiet \
            "huggingface_hub>=1.3,<2" \
            "requests>=2.32,<3"
      - name: Verify live single-Space contract
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import time
          from pathlib import Path

          import requests
          from huggingface_hub import HfApi, hf_hub_download

          ORG = "SZLHOLDINGS"
          CANONICAL = f"{ORG}/a11oy"
          CLONES = [f"{ORG}/a11oy-clone-{index}" for index in range(1, 5)]
          APP = "https://szlholdings-a11oy.hf.space"
          EXPECTED_SOURCE = os.environ["EXPECTED_SOURCE_SHA"]
          SHA40 = re.compile(r"^[0-9a-f]{40}$")
          api = HfApi(token=os.environ.get("HF_TOKEN") or None)

          def stage_of(info):
              raw = getattr(getattr(info, "runtime", None), "stage", None)
              raw = getattr(raw, "value", raw)
              return str(raw or "UNKNOWN").split(".")[-1].upper()

          def probe_json(path, marker, timeout=45):
              last = None
              for attempt in range(12):
                  try:
                      response = requests.get(
                          APP + path,
                          headers={
                              "Accept": "application/json",
                              "Cache-Control": "no-cache",
                              "User-Agent": "szl-single-a11oy-live-verifier/1",
                          },
                          timeout=timeout,
                          allow_redirects=False,
                      )
                      if response.status_code != 200:
                          raise RuntimeError(f"HTTP {response.status_code}")
                      payload = response.json()
                      for key, expected in marker.items():
                          if payload.get(key) != expected:
                              raise RuntimeError(
                                  f"{key} expected {expected!r}, observed {payload.get(key)!r}"
                              )
                      return {
                          "url": APP + path,
                          "http_status": response.status_code,
                          "marker": marker,
                          "payload": payload,
                      }
                  except Exception as exc:  # noqa: BLE001
                      last = f"{type(exc).__name__}: {exc}"
                      if attempt < 11:
                          time.sleep(10)
              raise RuntimeError(f"route {path} did not validate: {last}")

          info = api.space_info(CANONICAL)
          stage = stage_of(info)
          canonical_sha = str(getattr(info, "sha", "") or "")
          canonical_private = getattr(info, "private", None)
          canonical_sdk = str(getattr(info, "sdk", "") or "").lower()
          files = set(api.list_repo_files(CANONICAL, repo_type="space"))
          assert stage == "RUNNING", (stage, canonical_sha)
          assert SHA40.fullmatch(canonical_sha), canonical_sha
          assert canonical_private is False, canonical_private
          assert canonical_sdk == "docker", canonical_sdk
          assert "Dockerfile" in files

          clone_presence = {
              clone_id: bool(api.repo_exists(clone_id, repo_type="space"))
              for clone_id in CLONES
          }
          assert not any(clone_presence.values()), clone_presence

          collection_validation = {}
          clone_refs = []
          for summary in api.list_collections(owner=ORG, limit=100):
              collection = api.get_collection(summary.slug)
              refs = [
                  item.item_id
                  for item in collection.items
                  if item.item_type == "space" and item.item_id in CLONES
              ]
              collection_validation[summary.slug] = {
                  "items": len(collection.items),
                  "clone_references": refs,
              }
              clone_refs.extend(f"{summary.slug}:{item}" for item in refs)
          assert clone_refs == [], clone_refs

          routes = {
              "livez": probe_json("/api/livez", {"status": "LIVE"}),
              "build_info": probe_json("/api/build-info", {"status": "OBSERVED"}),
              "receipt_verifier": probe_json(
                  "/api/a11oy/v1/verify/receipt",
                  {"schema": "szl.public-receipt-verifier/manifest/v1"},
              ),
              "brain_capabilities": probe_json(
                  "/api/a11oy/v1/brain/capabilities",
                  {"schema": "szl.brain-capabilities.v1"},
              ),
          }
          build = routes["build_info"]["payload"].get("build") or {}
          assert build.get("state") == "OBSERVED", build
          assert build.get("revision") == EXPECTED_SOURCE, {
              "expected": EXPECTED_SOURCE,
              "observed": build,
          }

          critical_paths = [
              "Dockerfile",
              "serve.py",
              "szl_brain_capabilities.py",
              "szl_brain_memory_schema.py",
              "szl_brain_quantum_evidence.py",
              "szl_spaces_surface.py",
              "spaces/sda/assets/szl_verify_widget.js",
          ]
          critical_readback = {}
          for relative in critical_paths:
              source = Path(relative).read_bytes()
              remote_path = hf_hub_download(
                  repo_id=CANONICAL,
                  repo_type="space",
                  filename=relative,
                  revision=canonical_sha,
                  token=os.environ.get("HF_TOKEN") or None,
                  force_download=True,
              )
              remote = Path(remote_path).read_bytes()
              source_hash = hashlib.sha256(source).hexdigest()
              remote_hash = hashlib.sha256(remote).hexdigest()
              assert source_hash == remote_hash, {
                  "path": relative,
                  "source": source_hash,
                  "remote": remote_hash,
              }
              critical_readback[relative] = source_hash

          report = {
              "schema": "szl.single-a11oy-live-verification/v1",
              "expected_github_source_sha": EXPECTED_SOURCE,
              "canonical_space": {
                  "repo_id": CANONICAL,
                  "sha": canonical_sha,
                  "stage": stage,
                  "private": canonical_private,
                  "sdk": canonical_sdk,
                  "dockerfile_present": True,
                  "file_count": len(files),
              },
              "clone_presence": clone_presence,
              "collection_validation": collection_validation,
              "clone_collection_references": clone_refs,
              "routes": {
                  key: {
                      "url": value["url"],
                      "http_status": value["http_status"],
                      "marker": value["marker"],
                  }
                  for key, value in routes.items()
              },
              "runtime_build": build,
              "critical_file_sha256": critical_readback,
              "full_deploy_attestation": (
                  "The prerequisite reusable-hf-deploy job derived the complete "
                  "deploy set from Dockerfile COPY sources, deployed protected main, "
                  "waited for the exact HF commit to reach RUNNING, and re-fetched "
                  "every deployed path for SHA-256 equality."
              ),
              "ok": True,
          }
          Path("single-a11oy-live-verification.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          PY
      - name: Upload immutable live-verification receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: single-a11oy-live-verification-${{ github.run_id }}
          path: single-a11oy-live-verification.json
          if-no-files-found: error
          retention-days: 90
      - name: Persist deterministic public verification issue
        run: |
          set -euo pipefail
          {
            echo '<!-- szl-single-a11oy-live-verification -->'
            echo '# Sole canonical A11oy — live verification'
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Protected source: \`${EXPECTED_SOURCE_SHA}\`"
            echo
            echo '```json'
            cat single-a11oy-live-verification.json
            echo '```'
          } > /tmp/body.md
          issue="$(gh issue list --state all --search "${REPORT_ISSUE_TITLE} in:title" --json number,title --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" | head -n1)"
          if [ -n "$issue" ]; then
            gh issue edit "$issue" --body-file /tmp/body.md
            gh issue close "$issue" --reason completed --comment 'Canonical A11oy deployment and single-Space topology verified.' || true
          else
            gh issue create --title "$REPORT_ISSUE_TITLE" --body-file /tmp/body.md >/dev/null
            issue="$(gh issue list --state all --search "${REPORT_ISSUE_TITLE} in:title" --json number,title --jq ".[] | select(.title == env.REPORT_ISSUE_TITLE) | .number" | head -n1)"
            gh issue close "$issue" --reason completed --comment 'Canonical A11oy deployment and single-Space topology verified.' || true
          fi
