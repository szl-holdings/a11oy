name: Capture exact shared-source drift blocker

on:
  push:
    branches:
      - fix/nemo-v3-materialize-recovery-20260722
    paths:
      - .github/workflows/diagnose-shared-drift-recovery.yml

permissions:
  contents: write

concurrency:
  group: diagnose-shared-drift-recovery
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact A11oy recovery branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/a11oy
          ref: fix/nemo-v3-materialize-recovery-20260722
          path: self
          fetch-depth: 0

      - name: Checkout exact Killinchu main revision used by the guard
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: szl-holdings/killinchu
          ref: 36128c0bc87c1b6b73cef34b4fe520098ed60241
          path: sibling
          persist-credentials: false

      - name: Capture only the actionable blocking paths
        shell: bash
        run: |
          set -uo pipefail
          set +e
          python3 self/.github/shared-file-drift-check.py self sibling \
            --self-name=a11oy --sibling-name=killinchu > /tmp/shared-drift.log 2>&1
          status=$?
          set -e
          STATUS="$status" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          text = Path('/tmp/shared-drift.log').read_text(encoding='utf-8', errors='replace')
          blocking = []
          for line in text.splitlines():
              marker = '::error::  drift:'
              if marker in line:
                  value = line.split(marker, 1)[1].split('  (sync', 1)[0].strip()
                  if value:
                      blocking.append(value)
          summary = [
              line.strip()
              for line in text.splitlines()
              if 'Dockerfile-shipped files:' in line
              or 'shared candidates' in line
              or 'identical:' in line
          ]
          payload = {
              'schema': 'szl.shared-source-drift-diagnostic/v1',
              'a11oy_ref': 'fix/nemo-v3-materialize-recovery-20260722',
              'killinchu_revision': '36128c0bc87c1b6b73cef34b4fe520098ed60241',
              'exit_status': int(os.environ['STATUS']),
              'blocking_paths': sorted(set(blocking)),
              'summary': summary,
          }
          if payload['exit_status'] != 0 and not payload['blocking_paths']:
              payload['unclassified_tail'] = text.splitlines()[-30:]
          Path('self/.github/shared-drift-diagnostic.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Commit diagnostic and remove bootstrap
        shell: bash
        run: |
          set -euo pipefail
          git -C self rm .github/workflows/diagnose-shared-drift-recovery.yml
          git -C self add .github/shared-drift-diagnostic.json
          git -C self config user.name 'github-actions[bot]'
          git -C self config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C self diff --cached --check
          git -C self commit \
            -m 'chore(ci): record exact shared-source drift blocker' \
            -m 'Capture the immutable peer revision and only the blocking paths so the cross-repository repair can be made without weakening the ratchet.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git -C self push origin HEAD:fix/nemo-v3-materialize-recovery-20260722
