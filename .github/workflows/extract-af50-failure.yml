name: Extract Exact af50 Deployment Failure

on:
  push:
    branches: [ops/report-actions-runs-20260722]
    paths:
      - .github/workflows/extract-af50-failure.yml

permissions:
  contents: write
  actions: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_ID: '29946791524'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/report-actions-runs-20260722
          persist-credentials: true
          fetch-depth: 0
      - name: Capture bounded failure context
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/full.log 2>&1 || true
          {
            echo "run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
            echo '--- error matches ---'
            grep -Ein -C 12 '::error::|traceback|runtimeerror|assertionerror|failed|failure|mismatch|http [45][0-9][0-9]|build_error|timeout|not running|missing|404|405|smoke' /tmp/full.log | tail -n 650 || true
            echo '--- final 260 lines ---'
            tail -n 260 /tmp/full.log
          } > actions-af50-failure.txt
          git rm .github/workflows/extract-af50-failure.yml
          git add actions-af50-failure.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): record exact af50 deployment failure' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/report-actions-runs-20260722
