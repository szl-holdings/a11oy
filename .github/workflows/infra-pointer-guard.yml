name: infra pointer guard

# Keeps a11oy's infra/ directory pointer-only.
#
# Tasks #547 and #682 removed the full vendored copies of other szl-holdings
# repos from infra/ and replaced each with a small pointer README that links to
# the canonical repo. The only a11oy-original dir left is infra/receipts-samples/.
#
# This guard fails a PR if any directory under infra/ other than the explicitly
# allowlisted a11oy-original dirs contains more than a single pointer README.md
# (i.e. an external repo was vendored back in). It is stricter than, and
# complements, infra-vendoring-guard.yml.
#
# See scripts/check_infra_pointer.py for the policy / allowlist and
# scripts/check_infra_pointer.test.sh for the negative-fixture self-test.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: infra/ stays pointer-only
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Self-test the guard (negative fixtures)
        run: bash scripts/check_infra_pointer.test.sh
      - name: Check infra/ is pointer-only
        run: python3 scripts/check_infra_pointer.py --infra infra
