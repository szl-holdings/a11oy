name: Relock current canonical A11oy deployment

on:
  push:
    branches:
      - ops/relock-current-a11oy-20260722
    paths:
      - .github/workflows/relock-current-a11oy.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/relock-current-a11oy.yml
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: relock-current-canonical-a11oy
  cancel-in-progress: true

jobs:
  bind-source:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
    env:
      HF_PUBLISH_TOKEN: ${{ secrets.HF_ORG_TOKEN1 || secrets.HF_ORG_TOKEN || secrets.HF_TOKEN }}
    steps:
      - name: Checkout protected A11oy main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Bind exact protected source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git -C source rev-parse HEAD)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]]
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Protected source: $sha"

      - name: Bind runtime build identity
        shell: bash
        run: |
          set -euo pipefail
          test -n "${HF_PUBLISH_TOKEN:-}" || { echo '::error::No Hugging Face write token is configured'; exit 2; }
          python -m pip install --disable-pip-version-check --quiet "huggingface_hub>=1.3,<2"
          SOURCE_SHA="${{ steps.source.outputs.sha }}" python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_PUBLISH_TOKEN"])
          api.add_space_variable(
              repo_id="SZLHOLDINGS/a11oy",
              key="SZL_GIT_SHA",
              value=os.environ["SOURCE_SHA"],
              description="Exact protected szl-holdings/a11oy main revision serving the sole canonical Space.",
          )
          print("Bound SZL_GIT_SHA to", os.environ["SOURCE_SHA"])
          PY

  deploy:
    needs: bind-source
    uses: szl-holdings/.github/.github/workflows/reusable-hf-deploy.yml@5b0d38fadadc073812bfc6175a1e823cd529939f
    with:
      hf-repo: SZLHOLDINGS/a11oy
      ref: main
      dockerfile-path: Dockerfile
      include-readme: true
      prune: true
      wait-running: 1200
    secrets: inherit

  verify-and-relock:
    needs:
      - bind-source
      - deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      HF_PUBLISH_TOKEN: ${{ secrets.HF_ORG_TOKEN1 || secrets.HF_ORG_TOKEN || secrets.HF_TOKEN }}
      EXPECTED_SOURCE_SHA: ${{ needs.bind-source.outputs.source_sha }}
      GH_TOKEN: ${{ github.token }}
      REPORT_TITLE: '[hf-deployment-relock] current canonical A11oy'
    steps:
      - name: Checkout relock branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/relock-current-a11oy-20260722
          fetch-depth: 0

      - name: Verify live runtime and write exact lock
        shell: bash
        run: |
          set -euo pipefail
          test -n "${HF_PUBLISH_TOKEN:-}" || { echo '::error::No Hugging Face write token is configured'; exit 2; }
          python -m pip install --disable-pip-version-check --quiet "huggingface_hub>=1.3,<2" "requests>=2.32,<3"
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          import time
          from datetime import datetime, timezone
          from pathlib import Path
          from typing import Any

          import requests
          from huggingface_hub import HfApi

          SPACE = "SZLHOLDINGS/a11oy"
          APP = "https://szlholdings-a11oy.hf.space"
          HUB_DETAIL = "https://huggingface.co/api/spaces/SZLHOLDINGS/a11oy"
          EXPECTED = os.environ["EXPECTED_SOURCE_SHA"]
          SHA40 = re.compile(r"^[0-9a-f]{40}$")
          token = os.environ["HF_PUBLISH_TOKEN"]
          api = HfApi(token=token)

          def normalize_stage(value: Any) -> str:
              return str(getattr(value, "value", value) or "UNKNOWN").split(".")[-1].upper()

          def contains_value(value: Any, expected: str) -> bool:
              if isinstance(value, dict):
                  return any(contains_value(item, expected) for item in value.values())
              if isinstance(value, (list, tuple)):
                  return any(contains_value(item, expected) for item in value)
              return str(value) == expected

          def get_json(url: str, attempts: int = 30):
              last = None
              for attempt in range(1, attempts + 1):
                  try:
                      response = requests.get(
                          url,
                          headers={
                              "Accept": "application/json",
                              "Authorization": f"Bearer {token}" if url.startswith("https://huggingface.co/") else "",
                              "Cache-Control": "no-cache, no-store, max-age=0",
                              "Pragma": "no-cache",
                              "User-Agent": "szl-a11oy-relock/2",
                          },
                          timeout=45,
                      )
                      response.raise_for_status()
                      payload = response.json()
                      if not isinstance(payload, dict):
                          raise RuntimeError("response is not a JSON object")
                      return payload
                  except Exception as exc:  # noqa: BLE001
                      last = f"{type(exc).__name__}: {exc}"
                      if attempt < attempts:
                          time.sleep(10)
              raise RuntimeError(f"{url} did not converge: {last}")

          info = api.space_info(SPACE)
          detail = get_json(HUB_DETAIL)
          runtime_detail = detail.get("runtime") or {}
          info_runtime = getattr(info, "runtime", None)
          repository_sha = str(detail.get("sha") or getattr(info, "sha", "") or "")
          runtime_sha = str(
              runtime_detail.get("sha")
              or runtime_detail.get("revision")
              or getattr(info_runtime, "sha", "")
              or ""
          )
          stage = normalize_stage(
              runtime_detail.get("stage") or getattr(info_runtime, "stage", None)
          )
          sdk = str(detail.get("sdk") or getattr(info, "sdk", "") or "").lower()
          private = detail.get("private")
          if private is None:
              private = getattr(info, "private", None)
          files = set(api.list_repo_files(SPACE, repo_type="space", revision=repository_sha))

          if not SHA40.fullmatch(repository_sha):
              raise RuntimeError(f"invalid repository SHA: {repository_sha!r}")
          if runtime_sha and not SHA40.fullmatch(runtime_sha):
              raise RuntimeError(f"invalid runtime SHA: {runtime_sha!r}")
          if runtime_sha and repository_sha != runtime_sha:
              raise RuntimeError(f"repository/runtime mismatch: {repository_sha} != {runtime_sha}")
          if stage != "RUNNING":
              raise RuntimeError(f"runtime is not RUNNING: {stage}")
          if sdk != "docker":
              raise RuntimeError(f"Space is not Docker-backed: {sdk!r}")
          if private is not False:
              raise RuntimeError(f"Space is not public: private={private!r}")
          if "Dockerfile" not in files:
              raise RuntimeError("canonical Space is missing Dockerfile")

          build_info = get_json(APP + "/api/build-info")
          if not contains_value(build_info, EXPECTED):
              raise RuntimeError(
                  f"build-info lacks exact protected source {EXPECTED}: {build_info}"
              )

          livez = get_json(APP + "/api/livez")
          if str(livez.get("status") or "").upper() != "LIVE":
              raise RuntimeError(f"livez did not report LIVE: {livez}")

          capabilities = get_json(APP + "/api/a11oy/v1/brain/capabilities")
          quantum = get_json(APP + "/api/a11oy/v1/brain/quantum-evidence")
          if capabilities.get("schema") != "szl.brain-capabilities.v1":
              raise RuntimeError(f"Brain capabilities schema mismatch: {capabilities}")
          if quantum.get("schema") != "szl.brain-quantum-evidence.v1":
              raise RuntimeError(f"Brain quantum schema mismatch: {quantum}")

          clones = {
              f"SZLHOLDINGS/a11oy-clone-{index}": api.repo_exists(
                  f"SZLHOLDINGS/a11oy-clone-{index}", repo_type="space"
              )
              for index in range(1, 5)
          }
          if any(clones.values()):
              raise RuntimeError(f"historical A11oy clone reappeared: {clones}")

          lock = {
              "schema": 1,
              "github_repo": "szl-holdings/a11oy",
              "github_source_sha": EXPECTED,
              "hf_repo": SPACE,
              "hf_commit_sha": repository_sha,
          }
          Path(".github/hf-deployment-lock.json").write_text(
              json.dumps(lock, indent=2, sort_keys=False) + "\n",
              encoding="utf-8",
          )

          report = {
              "schema": "szl.a11oy-deployment-relock/v2",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "github_source_sha": EXPECTED,
              "hf_repository_sha": repository_sha,
              "hf_runtime_sha": runtime_sha or repository_sha,
              "runtime_stage": stage,
              "sdk": sdk,
              "public": private is False,
              "dockerfile_present": True,
              "managed_file_count": len(files),
              "build_identity_contains_source": True,
              "brain_capabilities_schema": capabilities.get("schema"),
              "brain_quantum_schema": quantum.get("schema"),
              "clone_presence": clones,
              "status": "PASS",
          }
          Path("a11oy-deployment-relock.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Commit verified lock and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/relock-current-a11oy.yml
          git add .github/hf-deployment-lock.json
          git commit -s -m "fix(ci): relock current verified Hugging Face deployment"
          git push origin HEAD:ops/relock-current-a11oy-20260722

      - name: Persist deployment evidence
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '<!-- szl-current-a11oy-relock -->'
            echo '# Current canonical A11oy deployment relock'
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```json'
            cat a11oy-deployment-relock.json
            echo '```'
          } > /tmp/relock.md
          number="$(gh issue list --state all --search "${REPORT_TITLE} in:title" --json number,title --jq '.[] | select(.title == env.REPORT_TITLE) | .number' | head -n1)"
          if [ -n "$number" ]; then
            gh issue edit "$number" --body-file /tmp/relock.md
            gh issue close "$number" --reason completed --comment 'Exact protected source and live canonical Hugging Face revision are relocked.' || true
          else
            gh issue create --title "$REPORT_TITLE" --body-file /tmp/relock.md >/dev/null
          fi
