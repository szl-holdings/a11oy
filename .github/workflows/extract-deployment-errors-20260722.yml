name: Extract Bounded A11oy Deployment Errors

on:
  push:
    branches: [ops/report-actions-runs-20260722]
    paths:
      - .github/workflows/extract-deployment-errors-20260722.yml

permissions:
  contents: write
  actions: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/report-actions-runs-20260722
          persist-credentials: true
          fetch-depth: 0
      - name: Extract bounded failure context
        run: |
          set -euo pipefail
          mkdir -p actions-errors-20260722
          for run in 29942913436 29943501010 29942913409; do
            full="/tmp/${run}.log"
            gh run view "$run" --repo "$GITHUB_REPOSITORY" --log-failed > "$full" 2>&1 || true
            {
              echo "run=${run}"
              echo '--- error matches ---'
              grep -Ein -C 8 '::error::|traceback|runtimeerror|assertionerror|failed|failure|mismatch|http [45][0-9][0-9]|build_error|timeout|not running|missing|404|405' "$full" | tail -n 500 || true
              echo '--- final 220 lines ---'
              tail -n 220 "$full"
            } > "actions-errors-20260722/${run}.txt"
          done
          git rm .github/workflows/extract-deployment-errors-20260722.yml
          git add actions-errors-20260722
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): record bounded deployment error context' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/report-actions-runs-20260722
