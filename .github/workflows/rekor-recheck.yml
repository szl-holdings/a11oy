# rekor-recheck.yml — Continuously re-verify PUBLISHED governance receipts.
#
# Issue #195. dsse-receipts.yml verifies a receipt at MINT time (same job that
# signs it). That proves signing works, but gives no ongoing assurance that
# receipts published in the past still verify against the public Sigstore trust
# root + Rekor transparency log over time — which is what gives the signatures
# their long-term audit value.
#
# This scheduled monitor walks every published envelope under
# attestations/governance/*.dsse.json and re-runs the SAME independent
# verification (Fulcio cert chain + Rekor inclusion + DSSE signature, pinned to
# the signer identity) via scripts/recheck_rekor_receipts.py. If any receipt no
# longer verifies it fails LOUDLY and raises a rolling incident issue.
#
# HONESTY: this re-checks SIGNATURES only; the SLSA claim is unchanged (L1).
# PLACEHOLDER envelopes are reported and skipped (never claimed verifiable).
#
# Org policy: only github-owned / verified actions are allowed, and Sigstore is
# driven by `pip install sigstore` + the repo's own scripts (no third-party
# signing/verification action). Action SHAs are pinned.
# Signed-off-by: Yachay <yachay@szlholdings.ai>

name: Rekor Receipt Re-check

on:
  schedule:
    - cron: '17 6 * * *'  # daily at 06:17 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual re-check'

permissions:
  contents: read
  issues: write

concurrency:
  group: rekor-recheck
  cancel-in-progress: false

jobs:
  recheck:
    name: Re-verify published receipts against Rekor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install sigstore SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install "sigstore>=2.0.0"

      # Published receipts live on the dedicated `governance-receipts` ledger
      # branch (dsse-receipts.yml appends them there; main's branch ruleset
      # blocks the in-CI token from committing to main). Pull them into the
      # working tree. Tolerant of the branch / path not existing yet (no
      # receipts published => nothing to re-check => honest soft pass).
      - name: Fetch published receipts ledger
        run: |
          set +e
          mkdir -p attestations/governance
          git fetch origin governance-receipts >/dev/null 2>&1
          if [ $? -eq 0 ]; then
            git checkout origin/governance-receipts -- attestations/governance >/dev/null 2>&1 \
              && echo "Ledger fetched." || echo "Ledger branch present but no receipts yet."
          else
            echo "No governance-receipts ledger branch yet — nothing published to re-check."
          fi
          echo "Receipts present:"
          ls -1 attestations/governance/*.dsse.json 2>/dev/null || echo "  (none)"

      - name: Re-verify all published governance receipts
        id: recheck
        run: |
          set +e
          python scripts/recheck_rekor_receipts.py \
            --dir attestations/governance \
            --summary-out attestations/governance/.rekor-recheck-summary.json \
            | tee recheck.out
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"

          # Surface a structured object for the issue-manager step + a human
          # summary on the run page.
          if [ -f attestations/governance/.rekor-recheck-summary.json ]; then
            checked=$(python -c "import json;print(json.load(open('attestations/governance/.rekor-recheck-summary.json'))['checked'])")
            passed=$(python -c "import json;print(json.load(open('attestations/governance/.rekor-recheck-summary.json'))['passed'])")
            failed=$(python -c "import json;print(json.load(open('attestations/governance/.rekor-recheck-summary.json'))['failed'])")
            skipped=$(python -c "import json;print(json.load(open('attestations/governance/.rekor-recheck-summary.json'))['skipped'])")
          else
            checked=0; passed=0; failed=0; skipped=0
          fi
          echo "checked=${checked}" >> "$GITHUB_OUTPUT"
          echo "passed=${passed}"   >> "$GITHUB_OUTPUT"
          echo "failed=${failed}"   >> "$GITHUB_OUTPUT"
          echo "skipped=${skipped}" >> "$GITHUB_OUTPUT"

          {
            echo "## Rekor receipt re-check"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Checked | ${checked} |"
            echo "| Verified | ${passed} |"
            echo "| **Failed** | ${failed} |"
            echo "| Skipped (placeholder) | ${skipped} |"
            echo ""
            echo '```'
            cat recheck.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0  # never abort here; the explicit gate below owns pass/fail

      - name: Upload re-check summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rekor-recheck-summary
          path: attestations/governance/.rekor-recheck-summary.json
          if-no-files-found: ignore

      - name: Reconcile rolling re-check incident issue
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXIT_CODE: ${{ steps.recheck.outputs.exit_code }}
          CHECKED: ${{ steps.recheck.outputs.checked }}
          FAILED: ${{ steps.recheck.outputs.failed }}
          PASSED: ${{ steps.recheck.outputs.passed }}
          SKIPPED: ${{ steps.recheck.outputs.skipped }}
        with:
          script: |
            const failed = Number(process.env.FAILED || '0') > 0 ||
                           Number(process.env.EXIT_CODE || '0') === 1;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- rekor-recheck-incident -->';

            // Find the single rolling incident (open or closed) by stable marker.
            const q = `repo:${context.repo.owner}/${context.repo.repo} in:body "${marker}" label:rekor-recheck`;
            const res = await github.rest.search.issuesAndPullRequests({ q, sort: 'created', order: 'desc', per_page: 5 });
            const existing = res.data.items.find(i => !i.pull_request) || null;

            const stats = `checked=${process.env.CHECKED} verified=${process.env.PASSED} failed=${process.env.FAILED} skipped=${process.env.SKIPPED}`;
            const now = new Date().toISOString();

            if (failed) {
              const body = `## Rekor Re-check Incident\n\n${marker}\n` +
                `**State:** FAILING\n**Detected:** ${now}\n**Run:** ${runUrl}\n\n` +
                `One or more PUBLISHED governance receipts no longer verify against the ` +
                `public Rekor transparency log.\n\n\`${stats}\`\n\n` +
                `See the run summary for the per-receipt breakdown. This is a single ` +
                `rolling incident; it updates in place and auto-closes on recovery.`;
              if (existing) {
                if (existing.state === 'closed') {
                  await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'open' });
                }
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number,
                  body: `Still FAILING as of ${now}.\n\n\`${stats}\`\nRun: ${runUrl}` });
              } else {
                await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo,
                  title: '[REKOR] Published governance receipt(s) no longer verify', body, labels: ['rekor-recheck', 'incident'] });
              }
            } else if (existing && existing.state === 'open') {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number,
                body: `Recovered: all published receipts verify against Rekor again as of ${now}.\n\n\`${stats}\`\nAuto-closing this rolling incident.\nRun: ${runUrl}` });
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'closed' });
            }

      - name: Fail the run if any published receipt no longer verifies
        if: always()
        run: |
          code="${{ steps.recheck.outputs.exit_code }}"
          if [ "${code}" = "1" ]; then
            echo "::error::One or more published governance receipts no longer verify against Rekor."
            exit 1
          fi
          if [ "${code}" != "0" ]; then
            echo "::error::Re-check script errored (exit ${code})."
            exit 1
          fi
          echo "All published receipts still verify against Rekor (or none published yet)."
