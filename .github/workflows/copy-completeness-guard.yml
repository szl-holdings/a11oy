name: COPY-Completeness Guard

# Root-cause fix for the recurring "module in repo but not in image → silent 404"
# pattern documented in DEEP_WIRING_SYNTHESIS.md (hit 4+ times in szl-holdings/a11oy).
#
# This guard parses serve.py (+ other entrypoints) for locally-imported root
# .py modules, then verifies every one appears in the Dockerfile COPY set.
# It is ADDITIVE to the existing dockerfile-copy-guard (which checks COPY sources
# exist in the repo). This guard checks the complementary direction: imports
# exist in the repo AND are present in COPY.
#
# Required-style: added to branch-protection required checks (see NOTES below).
# Runs on every PR + push to main; no external secrets required.
#
# NOTES FOR BRANCH PROTECTION
# ----------------------------
# Add "COPY completeness / import-vs-copy check" to the required status checks
# list in GitHub → Settings → Branches → Branch protection rules → main.
# This makes the guard required (not just advisory).

on:
  push:
    branches: [main]
    paths:
      - 'serve.py'
      - 'wayra_serve.py'
      - 'ayni_os_serve.py'
      - 'kipu_qillqaq_serve.py'
      - 'Dockerfile'
      - '.github/scripts/copy_completeness.py'
      - 'tests/test_copy_completeness_transitive.py'
      - '**.py'
  pull_request:
    branches: [main]
    paths:
      - 'serve.py'
      - 'wayra_serve.py'
      - 'ayni_os_serve.py'
      - 'kipu_qillqaq_serve.py'
      - 'Dockerfile'
      - '.github/scripts/copy_completeness.py'
      - '**.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  import-vs-copy:
    name: COPY completeness / import-vs-copy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Run COPY-completeness guard (TRANSITIVE closure)
        run: |
          # Default mode follows the TRANSITIVE local-import closure, so a module
          # imported by a registered submodule (e.g. szl_energy_measured via
          # a11oy_harvest_endpoints) is ALSO required in the Dockerfile COPY set.
          # This closes the recurring "forgot to COPY module X" class that bit
          # a11oy 3x while the old direct-only guard stayed green.
          python3 .github/scripts/copy_completeness.py \
            --dockerfile Dockerfile \
            --root . \
            --entrypoints serve.py wayra_serve.py ayni_os_serve.py kipu_qillqaq_serve.py
        # Exit 1 = missing modules detected → fails the build.
        # Exit 0 = every module REACHABLE from an entrypoint is present in COPY.

      - name: Run built-in self-test (guard catches deliberate omission)
        # This verifies the guard itself has no false-negative blind spots.
        # Creates a synthetic dummy module, checks the guard flags it as missing,
        # then cleans up. Must PASS (exit 0) for the CI step to pass.
        run: |
          python3 .github/scripts/copy_completeness.py \
            --dockerfile Dockerfile \
            --root . \
            --missing-test

      - name: Run transitive-closure regression tests (pytest)
        # Proves the guard CATCHES a deliberately-missing transitive COPY
        # (the szl_energy_measured class) and does NOT flag covered modules.
        run: |
          pip install --quiet --require-hashes -r .github/requirements/ci-core.txt
          python3 -m pytest tests/test_copy_completeness_transitive.py -q
