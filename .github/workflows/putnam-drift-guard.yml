name: putnam drift guard

# Keeps a11oy's Putnam 2025 claims page honest against the canonical Lean set.
#
# a11oy ships an embedded, transcribed verdict for the canonical Putnam 2025
# problems (szl_putnam.py _PUTNAM/_SZL + the console putnam-2025-tab-patch
# fallback FB_PROBS/FB_SZL) plus headline "N REAL / M DEMO / K OPEN" counts in
# prose. The single source of truth is szl-holdings/lutar-lean branch
# putnam-2025-canonical-set, where each Lutar/Putnam/P_*.lean carries an
# "**Honest status: REAL|DEMO|OPEN**" label and the SZL/*.lean originals declare
# "All proofs are REAL" in their docstrings.
#
# This guard fails the build when the a11oy embedded data drifts from that
# canonical source: any per-problem label mismatch, any REAL/DEMO/OPEN count
# mismatch (loader block, console fallback, literal count phrases, or named
# "X and Y are OPEN" prose), any missing/extra problem file, or any disagreement
# between the loader and the console fallback. This stops the page from quietly
# overclaiming (or underclaiming) as the Lean proofs advance.
#
# See scripts/check_putnam_drift.py for the policy and
# scripts/check_putnam_drift.test.sh for the offline negative-fixture self-test.

on:
  push:
    branches: [main]
    paths:
      - "szl_putnam.py"
      - "pages/console.html"
      - "scripts/check_putnam_drift.py"
      - "scripts/check_putnam_drift.test.sh"
      - ".github/workflows/putnam-drift-guard.yml"
  pull_request:
    branches: [main]
    paths:
      - "szl_putnam.py"
      - "pages/console.html"
      - "scripts/check_putnam_drift.py"
      - "scripts/check_putnam_drift.test.sh"
      - ".github/workflows/putnam-drift-guard.yml"
  schedule:
    - cron: "37 7 * * 1"   # weekly sweep (Mon 07:37 UTC) — catches lutar-lean drift
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Putnam 2025 page matches lutar-lean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Self-test the guard (offline negative fixtures)
        run: bash scripts/check_putnam_drift.test.sh
      - name: Verify a11oy Putnam 2025 page matches canonical Lean labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_putnam_drift.py --root .
