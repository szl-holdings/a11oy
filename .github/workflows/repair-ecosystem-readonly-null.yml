name: Repair ecosystem read-only null boundary

on:
  push:
    branches:
      - frontier/command-center-readonly-20260722
    paths:
      - .github/workflows/repair-ecosystem-readonly-null.yml

permissions:
  contents: write

concurrency:
  group: repair-ecosystem-readonly-null
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: frontier/command-center-readonly-20260722
          fetch-depth: 0

      - name: Repair and verify null-safe read-only contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('szl_ecosystem_routes.py')
          text = path.read_text(encoding='utf-8')
          old = '''    chapaq_lambda = None
    if chapaq and isinstance(chapaq.get("data", {}).get("lambda_value"), (int, float)):
        chapaq_lambda = float(chapaq["data"]["lambda_value"])
'''
          new = '''    chapaq_lambda = None
    chapaq_data = chapaq.get("data") if isinstance(chapaq, dict) else None
    if isinstance(chapaq_data, dict) and isinstance(chapaq_data.get("lambda_value"), (int, float)):
        chapaq_lambda = float(chapaq_data["lambda_value"])
'''
          if text.count(old) != 1:
              raise SystemExit('expected exact CHAPAQ null-unsafe block once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          python -m py_compile szl_ecosystem_routes.py
          python - <<'PY'
          import szl_ecosystem_routes as module

          def observed(url: str, timeout: float = 12.0):
              if url.endswith('/api/a11oy/v1/honest'):
                  return {'doctrine_lock': {'locked_formula_ids': module.LOCKED8, 'locked_formula_count': 8}}
              if url.endswith('/api/a11oy/v1/lambda'):
                  return {'lambda': 0.7, 'axes': [{'score': 0.95}]}
              if url.endswith('/api/a11oy/v1/restraint/kpi'):
                  return {'tile': 'restraint', 'label': 'CACHED'}
              if url.endswith('/api/killinchu/v1/gov/chapaq-verdict'):
                  return None
              if url.endswith('/api/a11oy/v1/provenance/ledger'):
                  return {'count': 4}
              if url.endswith('/api/killinchu/v1/receipt/ledger'):
                  return {'count': 3}
              return None

          module._get_json = observed
          board = module.build_kpi_board('a11oy')
          assert board['chapaq_verdict'] is None
          assert board['chapaq_source'].startswith('NOT_EVALUATED')
          assert board['lambda']['raw_chapaq'] is None
          ledger = module.build_ledger('a11oy')
          assert ledger['read_only'] is True
          assert ledger['cross_app_verify']['same_cosign_chain'] is None
          assert ledger['cross_app_verify']['killinchu_env_on_a11oy'] == 'NOT_EVALUATED'
          assert 'does not mint, sign, POST, or persist' in ledger['cross_app_verify']['note']
          PY
          ! grep -Fq 'def _post_json' szl_ecosystem_routes.py
          ! grep -Fq 'method="POST"' szl_ecosystem_routes.py
          git diff --check

      - name: Commit repair and remove bootstrap
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/repair-ecosystem-readonly-null.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add szl_ecosystem_routes.py .github/workflows/repair-ecosystem-readonly-null.yml
          git commit \
            -m 'fix(frontier): handle unevaluated CHAPAQ data safely' \
            -m 'Keep ecosystem GET routes read-only while treating a null policy-decision payload as NOT_EVALUATED instead of raising during KPI assembly.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:frontier/command-center-readonly-20260722
