name: Verify Exact Merged A11oy af50a2

on:
  push:
    branches: [ops/verify-a11oy-af50a2]
    paths:
      - .github/workflows/verify-a11oy-af50a2.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-relock-canonical-a11oy
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ github.token }}
  CANONICAL_SPACE: SZLHOLDINGS/a11oy
  CANONICAL_ORIGIN: https://szlholdings-a11oy.hf.space
  SOURCE_SHA: af50a267943c61b37c3971b4ea6a3d469a5def1a
  RELOCK_ISSUE: '1043'
  REPORT_PATH: reports/canonical-a11oy-relock-v4.json

jobs:
  deploy:
    name: Execute permanent source-bound deployer at exact merged SHA
    uses: szl-holdings/.github/.github/workflows/reusable-hf-deploy.yml@9aa36ed914e88bdef2873b26c022e0cecb1e6ec8
    with:
      hf-repo: SZLHOLDINGS/a11oy
      ref: af50a267943c61b37c3971b4ea6a3d469a5def1a
      dockerfile-path: Dockerfile
      include-readme: true
      prune: true
      wait-running: 1200
      source-revision-variable: SZL_GIT_SHA
      source-revision-probe-path: /api/build-info
      smoke-paths: '["/","/api/livez","/api/build-info","/api/a11oy/v1/brain/capabilities","/api/a11oy/v1/readiness/tab-matrix?view=summary","/static/3d/holographic.html"]'
    secrets:
      HF_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_TOKEN }}

  relock:
    name: Execute permanent A11oy terminal verifier
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HF_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_TOKEN }}
    steps:
      - name: Checkout exact protected source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: af50a267943c61b37c3971b4ea6a3d469a5def1a
          persist-credentials: false
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Install exact read-only verification clients
        run: >-
          python -m pip install --disable-pip-version-check
          'huggingface_hub==1.19.0'
          'requests==2.32.5'
      - name: Verify exact source, current runtime, all routes, and singleton topology
        run: |
          set -euo pipefail
          python .github/scripts/verify_canonical_a11oy.py \
            --repo-id "$CANONICAL_SPACE" \
            --origin "$CANONICAL_ORIGIN" \
            --source-sha "$SOURCE_SHA" \
            --source-variable SZL_GIT_SHA \
            --output "$REPORT_PATH" \
            --attempts 18 \
            --retry-seconds 10
      - name: Persist deterministic protected-main authority
        run: |
          set -euo pipefail
          {
            echo '<!-- szl-current-a11oy-relock -->'
            echo '# Current canonical A11oy deployment relock'
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Protected source: \`${SOURCE_SHA}\`"
            echo
            echo '```json'
            cat "$REPORT_PATH"
            echo '```'
          } > /tmp/relock.md
          gh issue edit "$RELOCK_ISSUE" --repo "$GITHUB_REPOSITORY" --body-file /tmp/relock.md
          gh issue close "$RELOCK_ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed \
            --comment 'Exact merged source, reusable source binding, immutable current runtime, all HEAD/GET contracts, holographic surface, and singleton topology passed.' || true
      - name: Upload immutable relock evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: canonical-a11oy-relock-${{ github.run_id }}
          path: ${{ env.REPORT_PATH }}
          if-no-files-found: error
          retention-days: 90

  cleanup:
    name: Remove one-shot exact-SHA executor
    needs: relock
    if: needs.relock.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout trigger branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/verify-a11oy-af50a2
          persist-credentials: true
          fetch-depth: 0
      - name: Self-remove after verified execution
        run: |
          set -euo pipefail
          git rm .github/workflows/verify-a11oy-af50a2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): remove completed exact A11oy executor' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/verify-a11oy-af50a2
