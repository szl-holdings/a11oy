name: Inspect Exact Holographic Registration Wiring

on:
  push:
    branches: [ops/report-actions-runs-20260722]
    paths:
      - .github/workflows/inspect-holographic-registration.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: af50a267943c61b37c3971b4ea6a3d469a5def1a
          persist-credentials: false
          fetch-depth: 1
          path: source
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/report-actions-runs-20260722
          persist-credentials: true
          fetch-depth: 0
          path: report
      - name: Inspect source registration and image paths
        run: |
          set -euo pipefail
          {
            echo '=== serve.py exact matches ==='
            grep -nEi -C 12 'szl3d_holographic|holographic|register\(' source/serve.py || true
            echo
            echo '=== module registration signature ==='
            grep -nEi -C 8 'def register|add_api_route|front_move|static/3d' source/szl3d_holographic.py || true
            echo
            echo '=== Dockerfile source/image path matches ==='
            grep -nEi -C 10 'console/|static/3d|szl3d_holographic' source/Dockerfile || true
            echo
            echo '=== source files ==='
            find source/console/3d source/static/3d -maxdepth 2 -type f -printf '%p\n' 2>/dev/null | sort | head -n 300
            echo
            echo '=== all Python callers of module register ==='
            grep -RInE --include='*.py' 'szl3d_holographic|\.register\(app.*holographic|holographic.*register' source | head -n 500 || true
          } > report/holographic-registration-inspection.txt
          cd report
          git rm .github/workflows/inspect-holographic-registration.yml
          git add holographic-registration-inspection.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): record exact holographic registration wiring' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/report-actions-runs-20260722
