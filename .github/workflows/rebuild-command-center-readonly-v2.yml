name: Rebuild command-center read-only frontier on current main

on:
  push:
    branches:
      - frontier/command-center-readonly-v2-20260722
    paths:
      - .github/workflows/rebuild-command-center-readonly-v2.yml

permissions:
  contents: write

concurrency:
  group: rebuild-command-center-readonly-v2
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOURCE_BRANCH: frontier/command-center-readonly-20260722
      SOURCE_HEAD: 7043b6a9fe663341d15200b5d532c203172c3bc5
      EXPECTED_MAIN: 99038ff7c0388f7e31d43cde00b154d3d5933e9e
      TARGET_BRANCH: frontier/command-center-readonly-v2-20260722
    steps:
      - name: Checkout exact target branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: frontier/command-center-readonly-v2-20260722
          fetch-depth: 0

      - name: Verify source and replay exact ten-file product tree
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main "${SOURCE_BRANCH}"
          test "$(git rev-parse origin/main)" = "$EXPECTED_MAIN" || {
            echo "::error::protected main moved from ${EXPECTED_MAIN}"
            exit 1
          }
          test "$(git rev-parse origin/${SOURCE_BRANCH})" = "$SOURCE_HEAD" || {
            echo "::error::source branch moved from ${SOURCE_HEAD}"
            exit 1
          }
          cat > /tmp/allowed.txt <<'EOF'
          organs/amaru/szl_rosie_companion.py
          organs/sentra/szl_rosie_companion.py
          serve.py
          static/3d/holographic.html
          szl_brain_command.py
          szl_brain_hub.py
          szl_ecosystem_routes.py
          szl_rosie_companion.py
          tests/test_command_center_readonly_contract.py
          tools/readiness-harness/probe_runner.mjs
          EOF
          git diff --name-only "$EXPECTED_MAIN" "$SOURCE_HEAD" | sort > /tmp/observed.txt
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          diff -u /tmp/allowed.txt /tmp/observed.txt
          mapfile -t paths < /tmp/allowed.txt
          git checkout "$SOURCE_HEAD" -- "${paths[@]}"
          test "$(git hash-object szl_ecosystem_routes.py)" = 9564c47daf79c86815b2544ec51b06debc30d354
          git diff --name-only HEAD | sort > /tmp/replayed.txt
          diff -u /tmp/allowed.txt /tmp/replayed.txt

      - name: Verify front-end and back-end contracts
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            serve.py \
            szl_brain_command.py \
            szl_brain_hub.py \
            szl_ecosystem_routes.py \
            szl_rosie_companion.py \
            organs/amaru/szl_rosie_companion.py \
            organs/sentra/szl_rosie_companion.py
          python -m pytest -q tests/test_command_center_readonly_contract.py
          node --check tools/readiness-harness/probe_runner.mjs
          python - <<'PY'
          import szl_ecosystem_routes as module

          def observed(url: str, timeout: float = 12.0):
              if url.endswith('/api/a11oy/v1/honest'):
                  return {'doctrine_lock': {'locked_formula_ids': module.LOCKED8, 'locked_formula_count': 8}}
              if url.endswith('/api/a11oy/v1/lambda'):
                  return {'lambda': 0.7, 'axes': [{'score': 0.95}]}
              if url.endswith('/api/a11oy/v1/restraint/kpi'):
                  return {'tile': 'restraint', 'label': 'CACHED'}
              if url.endswith('/api/killinchu/v1/gov/chapaq-verdict'):
                  return None
              if url.endswith('/api/a11oy/v1/provenance/ledger'):
                  return {'count': 4}
              if url.endswith('/api/killinchu/v1/receipt/ledger'):
                  return {'count': 3}
              return None

          module._get_json = observed
          board = module.build_kpi_board('a11oy')
          assert board['chapaq_verdict'] is None
          assert board['chapaq_source'].startswith('NOT_EVALUATED')
          assert board['lambda']['raw_chapaq'] is None
          ledger = module.build_ledger('a11oy')
          assert ledger['read_only'] is True
          assert ledger['cross_app_verify']['same_cosign_chain'] is None
          assert ledger['cross_app_verify']['killinchu_env_on_a11oy'] == 'NOT_EVALUATED'
          PY
          grep -Fq 'id="evidence-rail"' static/3d/holographic.html
          grep -Fq 'aria-expanded="false"' static/3d/holographic.html
          grep -Fq 'view=summary' static/3d/holographic.html
          ! grep -Fq 'def _post_json' szl_ecosystem_routes.py
          ! grep -Fq 'method="POST"' szl_ecosystem_routes.py
          git diff --check

      - name: Commit clean product replay and remove bootstrap
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/rebuild-command-center-readonly-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            organs/amaru/szl_rosie_companion.py \
            organs/sentra/szl_rosie_companion.py \
            serve.py \
            static/3d/holographic.html \
            szl_brain_command.py \
            szl_brain_hub.py \
            szl_ecosystem_routes.py \
            szl_rosie_companion.py \
            tests/test_command_center_readonly_contract.py \
            tools/readiness-harness/probe_runner.mjs \
            .github/workflows/rebuild-command-center-readonly-v2.yml
          git commit \
            -m 'fix(frontier): finish command-center read-only contracts' \
            -m 'Replay the exact reviewed ten-file frontend/backend tree on protected main, including null-safe NOT_EVALUATED handling, mobile keyboard evidence rail, summary readiness, read-only GET contracts, and verified-identity approval boundaries.' \
            -m 'Shared-module-blob: 9564c47daf79c86815b2544ec51b06debc30d354' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin "HEAD:${TARGET_BRANCH}"
