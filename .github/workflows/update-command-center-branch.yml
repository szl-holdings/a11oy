name: Update command-center branch to protected main

on:
  push:
    branches:
      - frontier/command-center-readonly-20260722
    paths:
      - .github/workflows/update-command-center-branch.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-command-center-branch
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PR_NUMBER: "1038"
      TARGET_BRANCH: frontier/command-center-readonly-20260722
      EXPECTED_MAIN: 99038ff7c0388f7e31d43cde00b154d3d5933e9e
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify exact head and protected main
        shell: bash
        run: |
          set -euo pipefail
          pr="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
          actual_head="$(jq -r .head.sha <<<"$pr")"
          actual_base="$(jq -r .base.ref <<<"$pr")"
          actual_main="$(gh api "repos/${GITHUB_REPOSITORY}/branches/main" --jq .commit.sha)"
          test "$actual_head" = "$GITHUB_SHA" || {
            echo "::error::PR head moved: expected ${GITHUB_SHA}, observed ${actual_head}"
            exit 1
          }
          test "$actual_base" = main || { echo "::error::PR no longer targets main"; exit 1; }
          test "$actual_main" = "$EXPECTED_MAIN" || {
            echo "::error::protected main moved: expected ${EXPECTED_MAIN}, observed ${actual_main}"
            exit 1
          }

      - name: Use normal exact-head update-branch operation
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            --method PUT \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/update-branch" \
            -f expected_head_sha="${GITHUB_SHA}"
          for _ in $(seq 1 40); do
            observed="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .head.sha)"
            if [ "$observed" != "$GITHUB_SHA" ]; then
              echo "UPDATED_HEAD=$observed" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 3
          done
          echo "::error::PR branch did not update within timeout"
          exit 1

      - name: Remove bootstrap from the updated product branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: frontier/command-center-readonly-20260722
          fetch-depth: 0

      - name: Verify ancestry, remove workflow, and commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main "${TARGET_BRANCH}"
          git reset --hard "origin/${TARGET_BRANCH}"
          test "$(git rev-parse HEAD)" = "$UPDATED_HEAD"
          git merge-base --is-ancestor "$EXPECTED_MAIN" HEAD || {
            echo "::error::updated branch does not contain expected protected main"
            exit 1
          }
          rm -f .github/workflows/update-command-center-branch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/update-command-center-branch.yml
          git commit \
            -m 'chore(frontier): remove completed branch-update bootstrap' \
            -m 'The command-center branch now contains protected main 99038ff7c0388f7e31d43cde00b154d3d5933e9e through GitHub normal update-branch semantics.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin "HEAD:${TARGET_BRANCH}"
