name: Recover Exact A11oy HF Baseline

on:
  push:
    branches: [ops/recover-hf-baseline-f63e5e]
    paths:
      - .github/workflows/recover-hf-baseline-f63e5e.yml

permissions:
  contents: write

concurrency:
  group: recover-exact-a11oy-hf-baseline-f63e5e
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy and attest exact protected-main baseline
    uses: szl-holdings/.github/.github/workflows/reusable-hf-deploy.yml@9aa36ed914e88bdef2873b26c022e0cecb1e6ec8
    with:
      hf-repo: SZLHOLDINGS/a11oy
      ref: f63e5eea9ac5f0a42c31b16ce9e1b94fcb7c32a2
      dockerfile-path: Dockerfile
      include-readme: true
      prune: true
      wait-running: 1200
      source-revision-variable: SZL_GIT_SHA
      source-revision-probe-path: /api/build-info
      smoke-paths: '["/","/api/livez","/api/build-info","/api/a11oy/v1/brain/capabilities","/api/a11oy/v1/readiness/tab-matrix?view=summary","/static/3d/holographic.html"]'
    secrets:
      HF_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_TOKEN }}

  cleanup:
    name: Remove one-shot recovery controller
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ops/recover-hf-baseline-f63e5e
          persist-credentials: true
          fetch-depth: 0
      - name: Self-remove after successful immutable reconciliation
        run: |
          set -euo pipefail
          git rm .github/workflows/recover-hf-baseline-f63e5e.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): remove completed exact baseline recovery' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/recover-hf-baseline-f63e5e
