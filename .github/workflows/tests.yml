name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # CI-HYGIENE 2026-06-03: pnpm/action-setup removed — pnpm is not a GitHub-verified
      # marketplace creator (isVerifiedOwner=false) and is blocked by the szl-holdings org
      # allowed_actions policy (github_owned_allowed=true, verified_allowed=true,
      # patterns_allowed=[]). Replaced with corepack (Node.js built-in, no external action)
      # and npm scripts. Node.js setup uses github-owned actions/setup-node only.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Enable corepack and install pnpm 10.33.3
        run: |
          corepack enable
          corepack install -g pnpm@10.33.3
      - name: Install dependencies
        run: npm ci
      - name: Install policy package deps (published @szl-holdings/a11oy-receipt-substrate from GHCR)
        working-directory: packages/policy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # packages/policy is not a pnpm-workspace member, so the root install does not
          # link its runtime dep. The policy gate test transitively imports gates/receipt.ts
          # which now imports the published @szl-holdings/a11oy-receipt-substrate. Install it
          # in-place (package-local .npmrc points @szl-holdings at npm.pkg.github.com).
          npm install --no-save --no-package-lock
      - name: Run policy gate tests
        run: npm run test:policy-gates

  python-operator-reason:
    name: Operator & reason endpoint tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install test deps (serve.py boots in-process via Starlette TestClient)
        run: |
          python -m pip install --upgrade pip
          # serve.py imports fastapi/starlette; httpx backs Starlette TestClient.
          pip install fastapi starlette httpx pytest
      - name: Run operator & reason endpoint tests
        # Scoped to this module only: it boots serve.py in-process with no network
        # and guards the Task #516 governed operator/reason surface against 404
        # regressions and envelope-stripping. Other tests/ modules may need extra
        # deps and are out of scope for this guard.
        run: pytest tests/test_operator_reason_envelope.py -q

  python-formula-registry-guard:
    name: Proof-carrying formula registry — no overclaims (pytest, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions policy). setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pytest (guard + _INDEX import are stdlib-only)
        run: |
          python -m pip install --upgrade pip
          # a11oy_formula_registry_guard is pure stdlib; importing a11oy_formula_endpoints
          # does not require FastAPI (the framework import is lazy inside register()).
          pip install pytest
      - name: Verify every served formula is corpus-backed or honestly experimental
        # PROOF-CARRYING FORMULA REGISTRY GUARD: a11oy_formula_registry_guard.py checks
        # every wired formula (a11oy_formula_endpoints._INDEX) against the bundled
        # canonical corpus (corpus/ + proofs/). A non-experimental formula whose claimed
        # Lean theorem is ABSENT is an overclaim -> status "unbacked" -> this job FAILS,
        # turning a silent phantom-proof claim into a red gate. Formulas honestly marked
        # tier=experimental/live-data are reported but allowed. Λ stays Conjecture 1.
        run: pytest tests/test_formula_registry_guard.py -q

  python-lambda-kernel-parity:
    name: Λ parity — flagship inline vs published universal kernel (pytest, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pytest (test + szl_formulas are stdlib-only; no torch)
        run: |
          python -m pip install --upgrade pip
          # The flagship Λ path (szl_formulas.lambda_aggregate) is pure-stdlib and the
          # test re-derives the published szl-lambda-gate kernel's OWN canonical
          # reference in-file — so NO torch and NO Hugging Face Hub download are needed.
          pip install pytest
      - name: Assert flagship Λ has not drifted from the published kernel
        # WIRING-DRIFT GUARD: the universal HF kernel szl-lambda-gate is a torch port of
        # a canonical pure-Python Λ reference; the flagship keeps its own stdlib inline
        # copy (adding torch + a Hub download to the live Λ gate would be a regression).
        # This test pins the inline copy to the published kernel's math across the shared
        # valid domain (incl. zero-pin edge cases + the 13-axis Yuyay preset), so any
        # future divergence between the flagship Λ and the published universal kernel
        # becomes a red gate instead of a fifth silent copy. Λ stays Conjecture 1.
        run: pytest tests/test_lambda_kernel_parity.py -q

  python-demo-critical-routes:
    name: Demo-critical route-table regression guard (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install test deps (serve.py boots in-process via Starlette TestClient)
        run: |
          python -m pip install --upgrade pip
          # serve.py imports fastapi/starlette; httpx backs Starlette TestClient.
          pip install fastapi starlette httpx pytest
      - name: Run demo-critical route-table guard
        # RECURRING REGRESSION GUARD: szl_* route REGISTRATIONS keep getting dropped
        # from serve.py during mesh/rebrand refactors while the handler modules stay
        # in-image but unwired — so the live endpoints 404 (energy/operator/status #460,
        # PNT routes, and energy/ledger + energy/projection + restraint/info on
        # 2026-06-16). This guard boots the REAL app in-process (no mocks, no network)
        # and FAILS if ANY demo-critical route is missing from the assembled route
        # table — turning a silent live 404 into a red CI gate before the demo.
        run: pytest tests/test_demo_critical_routes.py -q

  python-energy-autostart-readyz:
    name: Energy-operator autostart + /readyz redeploy-stall guard (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install test deps (serve.py boots in-process via Starlette TestClient)
        run: |
          python -m pip install --upgrade pip
          # serve.py imports fastapi/starlette; httpx backs Starlette TestClient.
          pip install fastapi starlette httpx pytest
      - name: Run energy-operator autostart + /readyz guard
        # REDEPLOY-STALL GUARD: on every box redeploy the service restarted with the
        # energy operator loop STOPPED even though the GPU lungs stayed reachable, so
        # joules froze until a manual POST /energy/operator/start. The fix auto-presses
        # play on boot (lung-gated, env A11OY_ENERGY_AUTOSTART default ON, never faked)
        # and makes /readyz return 503 in exactly that lung-up-but-loop-stopped state.
        # These tests boot the REAL app in-process (no mocks; a local fake lung only)
        # so a future edit dropping the autostart hook or the readiness wiring becomes
        # a red CI gate instead of a silent stall. The operator unit suite also covers
        # the lung-reachability + autostart-gating + readiness logic at module level.
        run: pytest test_szl_energy_operator.py tests/test_energy_autostart_readyz.py -q

  python-be-hardening:
    name: Backend hardening surface tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install test deps (FastAPI TestClient over a real hardened app)
        run: |
          python -m pip install --upgrade pip
          # szl_be_hardening builds a FastAPI app; httpx backs Starlette TestClient.
          pip install fastapi starlette httpx pytest
      - name: Run backend hardening surface tests
        # Real HTTP tests (no mocks) over a freshly hardened app: health/readiness
        # probes, pydantic input validation, error envelopes, trace headers, the real
        # OpenAPI schema, durable Khipu persistence across a simulated restart, the
        # honest v11 footer, AND rate limiting. The rate-limit test hammers the metered
        # data surface (POST /api/<organ>/v1/be/echo) keyed off RATE_LIMIT_PER_MIN and
        # asserts /healthz stays exempt — so a regression that throttles a health probe,
        # drops the limiter, or breaks an envelope becomes a red gate.
        run: pytest tests/test_be_hardening.py -q

  python-energy-egress-scrub:
    name: Energy /metrics private-address egress guard (pytest, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pytest (the guard imports szl_energy_sovereign; stdlib-only otherwise)
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run energy /metrics egress-scrub guard
        # PRIVATE-IP EGRESS-LEAK GUARD: /api/a11oy/v1/energy/metrics must never render the
        # raw private joule-meter address in the served JSON `exporter` field (same private-IP
        # leak class scrubbed from compute-pool). The served panel surfaces an honest
        # non-revealing descriptor (_JOULE_METER_PUBLIC) while the internal probe URL stays
        # the probe target only. test_energy_sovereign_egress.py existed but referenced a STALE
        # constant name (_JOULE_METER_LABEL) so it errored out AND was never wired into CI — a
        # dormant, broken guard. This job runs the corrected test so a future re-leak of the
        # address becomes a red gate, not a silent leak.
        run: pytest test_energy_sovereign_egress.py -q

  evidence-autorefresh-surface:
    name: Evidence tab auto-refresh surface guard (pytest, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pytest (the guard only reads files; no network, no deps)
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run Evidence auto-refresh surface guard
        # Task #878: locks the Evidence & Research tab's "auto-refreshing" pill +
        # genuine 180s background re-probe (marker evidence-autorecheck-539) into
        # pages/console.html so a concurrent edit / rebuild can't silently drop it.
        # Pure string-surface check (no serve.py boot, no network); includes a
        # negative-fixture self-test so the guard can't rot into an always-pass.
        run: pytest tests/test_evidence_autorefresh_surface.py -q

  python-receipt-monitor:
    name: Receipt-monitor verifier tests (pytest, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pytest (these tests are stdlib-only otherwise)
        run: |
          python -m pip install --upgrade pip
          # The receipt-monitor verifier tests are fully offline: every Sigstore/Rekor
          # round-trip is monkeypatched and no receipt body is actually verified, so no
          # sigstore/cryptography SDK, network, or org key is ever needed — only pytest.
          pip install pytest
      - name: Run receipt-monitor verifier tests
        # Enforces the safety contracts of the scheduled receipt re-checkers on every
        # push/PR so a regression can't merge green:
        #   - test_recheck_rekor_baseline.py: the emptied-ledger guard (issue #320) —
        #     an empty ledger is a soft pass ONLY before a baseline exists; once a
        #     baseline > 0 is recorded an empty/below-baseline ledger fails loudly.
        #   - test_verify_release_receipts.py: the release-asset verifier (issues
        #     #241/#403) — placeholders are UNVERIFIABLE not silent passes, the signer
        #     SAN must name an allowed producing workflow, and every release tag is
        #     re-checked (not just the latest).
        # Scoped to these two modules: the rest of tests/ pulls in fastapi+serve.py,
        # packages.inference voters, or the sigstore SDK and is covered by other jobs.
        run: pytest tests/test_recheck_rekor_baseline.py tests/test_verify_release_receipts.py -q

  hf-sync-backend-selftest:
    name: hf-sync-backend push-path self-test (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only. actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run hf-sync-backend self-test
        # Proves the auto-push path of .github/scripts/hf_sync_backend.py: the OID-diff
        # selection commits ONLY files whose content differs from the Space and leaves
        # byte-identical files untouched. Pure stdlib (unittest) with injected fakes for
        # HfApi/CommitOperationAdd — no network, no HF_TOKEN, the live Space is never
        # touched. Run by file path: the .github/scripts dir is not an importable package.
        run: python3 .github/scripts/test_hf_sync_backend.py

  theorem-manifest-honesty-selftest:
    name: Theorem-manifest honesty-guard self-test (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run theorem-manifest validator honesty-guard self-test
        # Negative-fixture self-test that gates scripts/validate_theorem_runtime_manifest.py:
        # feeds the REAL validator tampered staged-advisory manifests (stagedAdvisory:false,
        # missing/empty caveat, a "proven" leanStatus) and asserts it FAILS on each, plus an
        # honest fixture that must PASS. Proves the SZL Doctrine v11 honesty guard can't be
        # silently loosened to let a not-yet-proven claim be promoted to "proven". Pure stdlib
        # (unittest), no network, no live manifest touched. Run by file path: the scripts dir
        # is not an importable package.
        run: python3 scripts/test_validate_theorem_runtime_manifest.py

  theorem-manifest-real-validate:
    name: Theorem-manifest validator runs against the REAL manifest (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate committed docs/theorem-runtime-manifest.json with the real validator
        # The honesty-guard self-test above proves the validator's RULES work against
        # tampered fixtures, but nothing ran the validator against the REAL committed
        # manifest — so a dishonest/malformed docs/theorem-runtime-manifest.json could
        # still merge unnoticed. This job applies the guard: it runs the validator from
        # the repo root (REPO_ROOT = cwd; default --manifest = docs/theorem-runtime-manifest.json)
        # and fails the build on any non-zero exit (invalid claimStatus, duplicate id,
        # missing runtime/export/test path, or a staged-advisory promoted past its caveat).
        # Pure stdlib (json + pathlib), no network, no deps.
        run: python3 scripts/validate_theorem_runtime_manifest.py

  release-receipt-tamper-rejection:
    name: Release-receipt tamper-rejection integration test (real Sigstore verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install Sigstore SDK + pytest
        run: |
          python -m pip install --upgrade pip
          # Same verify path the production rekor-recheck / release-receipt-verify
          # workflows use. No signing, so no id-token: write — this only VERIFIES an
          # already-signed receipt against the public Sigstore trust root.
          python -m pip install "sigstore>=2.0.0" pytest
      - name: Genuine receipt verifies AND a tampered copy is rejected (no monkeypatch)
        # Integration negative-proof (issue #408): runs scripts/tamper_release_receipt.py
        # on a committed GENUINE receipt fixture and asserts scripts/verify_release_receipts.py
        # REJECTS the byte-flipped copy via the REAL Sigstore DSSE verify (exit 1, status FAIL
        # "DSSE: invalid signature"), while the untouched fixture PASSES (symmetric control).
        # SZL_RELEASE_RECEIPT_REAL_VERIFY=1 enables the network-gated module (it skips off-CI).
        env:
          SZL_RELEASE_RECEIPT_REAL_VERIFY: "1"
        run: pytest tests/test_verify_release_receipts_real.py -q

  action-contract-manifest-selftest:
    name: Action-contract manifest validator self-test (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # github-owned actions only (org allowed_actions: github_owned_allowed=true,
      # verified_allowed=true, patterns_allowed=[]). actions/setup-python is github-owned.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run action-contract manifest validator self-test
        # Negative-fixture self-test gating scripts/validate_action_contract_manifest.py:
        # feeds the REAL validator tampered contracts (egress defaultDeny off, a dropped
        # denied capability, copyingRule not pattern-only, emptied UDS forbiddenClaims,
        # non-hash-chain receipts) and asserts it FAILS on each, plus the committed contract
        # which must PASS. Proves the clean-room/least-privilege guard can't be silently
        # loosened. Pure stdlib (unittest), no network, no live manifest touched. Run by
        # file path: the scripts dir is not an importable package.
        run: python3 scripts/test_validate_action_contract_manifest.py

  anatomy-map-selftest:
    name: Anatomy/formula/runtime map validator self-test (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run anatomy/formula/runtime map validator self-test
        # Negative-fixture self-test gating scripts/validate_anatomy_formula_runtime_map.py:
        # asserts the REAL validator FAILS when the autonomous-learning doctrine is loosened
        # (promotionModel not human_promotion_required, a dropped self_approve/self_promote/
        # deploy/publish forbiddenMode, canonicalHub changed, bad organ claimStatus) and PASSES
        # on the committed map. Pure stdlib (unittest), no network. Run by file path.
        run: python3 scripts/test_validate_anatomy_formula_runtime_map.py

  benchmark-map-selftest:
    name: Benchmark map validator self-test (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run benchmark map validator self-test
        # Negative-fixture self-test gating scripts/validate_benchmark_map.py: asserts the REAL
        # validator FAILS on overclaim/doctrine tampering (publishMode canonical, mathcomp not
        # raw_points, dropped "solved/beat/AGI proven" disallowedClaim, an allowedClaim that says
        # "solved/cracked", receipts not required / not hash_chain) and PASSES on the committed
        # map. Pure stdlib (unittest), no network. Run by file path.
        run: python3 scripts/test_validate_benchmark_map.py

  controls-evidence-map-selftest:
    name: Controls-evidence map validator self-test (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run controls-evidence map validator self-test
        # Negative-fixture self-test gating scripts/validate_controls_evidence_map.py: asserts the
        # REAL validator FAILS when the clean-room/honest-exposure contract is loosened (dropped
        # clean-room rule, hfExposure canonical/source-of-truth, udsExposure endorsed/catalog,
        # bad controlId or claimStatus, verified-runtime without a runtime-available receipt hook)
        # and PASSES on the committed map. Pure stdlib (unittest), no network. Run by file path.
        run: python3 scripts/test_validate_controls_evidence_map.py

  cross-repo-handoff-selftest:
    name: Cross-repo handoff manifest validator self-test (stdlib, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run cross-repo handoff manifest validator self-test
        # Negative-fixture self-test gating scripts/validate_cross_repo_handoff_manifest.py:
        # asserts the REAL validator FAILS on "not complete until target evidence" tampering
