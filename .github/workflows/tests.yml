name: Tests

# Runs the full test suite — all test files that exist in the repo.
# This was missing: ci.yml was docs-only, doctrine.yml runs only
# doctrine package tests. This workflow runs ALL tests so the
# claimed test count is grep-able, runnable, and CI-verified.
#
# Real test files (verified 2026-05-29):
#   24 .test.ts files across __tests__/, packages/, web/packages/
#   Scripts: npm test (jest __tests__/), test:qec, test:knowledge, test:core
#   Combined via: pnpm test:all

on:
  push:
    branches: [main]
    paths:
      - '**/*.test.ts'
      - '**/*.test.js'
      - '**/*.spec.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'packages/**'
      - 'web/packages/**'
      - '__tests__/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.test.ts'
      - '**/*.test.js'
      - '**/*.spec.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'packages/**'
      - 'web/packages/**'
      - '__tests__/**'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  count-tests:
    name: Verify Test Count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Count real test files
        run: |
          COUNT=$(find . -path ./node_modules -prune -o -type f \( -name "*.test.ts" -o -name "*.test.js" -o -name "*.spec.ts" \) -print | wc -l)
          echo "Real test files: $COUNT"
          echo "TEST_FILE_COUNT=$COUNT" >> "$GITHUB_ENV"
          if [ "$COUNT" -lt 20 ]; then
            echo "::warning::Test file count ($COUNT) is below expected minimum of 20"
          fi

  unit-tests:
    name: Unit Tests (jest — __tests__/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Run jest unit tests (__tests__/)
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: jest-results
          path: coverage/
          retention-days: 7

  doctrine-tests:
    name: Doctrine Tests (pnpm — a11oy-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run doctrine tests (a11oy-core vitest)
        run: pnpm test:doctrine

  qec-tests:
    name: QEC Integrity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Run QEC lineage tests
        run: npm run test:qec

  tests-gate:
    name: Tests Gate
    runs-on: ubuntu-latest
    needs: [count-tests, unit-tests, doctrine-tests, qec-tests]
    if: always()
    steps:
      - name: Check all test jobs passed
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.doctrine-tests.result }}" != "success" ]] || \
             [[ "${{ needs.qec-tests.result }}" != "success" ]]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs passed"
