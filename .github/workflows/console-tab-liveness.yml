name: console-tab-liveness
# Honest dashboards guard: every a11oy /console tab must resolve to a live loader
# or an honest label, the doctrine v11 honesty invariants must hold, and the 3D/2D
# views must keep their visibility-gated 30s auto-refresh. Non-blocking signal
# (not a required check) so it never gates sibling merges; red = real regression.
on:
  push:
    branches: [main]
    paths: ['pages/console.html', 'ops/check_console_tab_liveness.py']
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: a11oy console liveness + honesty guard
        run: python3 ops/check_console_tab_liveness.py
