name: Recover governed SZL-Nemo v3 curriculum materialization

on:
  push:
    branches:
      - fix/nemo-v3-materialize-recovery-20260722
    paths:
      - .github/workflows/materialize-nemo-v3-recovery.yml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: recover-nemo-v3-materialization
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact recovery branch with complete history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: fix/nemo-v3-materialize-recovery-20260722
          fetch-depth: 0

      - name: Materialize and independently verify the frozen curriculum
        shell: bash
        run: |
          set -euo pipefail
          python model_release/szl-nemo-v3/build_curriculum.py
          python model_release/szl-nemo-v3/build_curriculum.py --check
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('model_release/szl-nemo-v3')
          files = {
              'train.jsonl': 36,
              'holdout-original-v2.jsonl': 8,
              'holdout-shadow-v2.jsonl': 10,
              'holdout-challenge-v3.jsonl': 12,
          }
          rows = {}
          for name, expected in files.items():
              value = (root / name).read_bytes()
              parsed = [json.loads(line) for line in value.decode('utf-8').splitlines() if line.strip()]
              assert len(parsed) == expected, (name, len(parsed), expected)
              rows[name] = parsed

          assert hashlib.sha256((root / 'holdout-original-v2.jsonl').read_bytes()).hexdigest() == 'caeb07c94929c24a47fd12f35cbc9021523308dc9fcc684bd444ffcf4a367b0d'
          assert hashlib.sha256((root / 'holdout-shadow-v2.jsonl').read_bytes()).hexdigest() == '1b8578051b7b829595493615bdf11e24d01a1837a23d6191c8e88e21cce990ac'

          all_rows = [row for group in rows.values() for row in group]
          ids = [row['record_id'] for row in all_rows]
          assert len(ids) == len(set(ids)) == 66

          training_prompts = {
              hashlib.sha256(row['messages'][-2]['content'].encode()).hexdigest()
              for row in rows['train.jsonl']
          }
          holdout_prompts = {
              hashlib.sha256(row['messages'][-1]['content'].encode()).hexdigest()
              for name in ('holdout-original-v2.jsonl', 'holdout-shadow-v2.jsonl', 'holdout-challenge-v3.jsonl')
              for row in rows[name]
          }
          assert training_prompts.isdisjoint(holdout_prompts)

          prereg = json.loads((root / 'preregistration.json').read_text(encoding='utf-8'))
          assert prereg['training']['rows'] == 36
          assert prereg['decision_rule']['required_pass_rate'] == 1.0
          assert prereg['decision_rule']['max_degenerate_rate'] == 0.0
          assert prereg['decision_rule']['automatic_retry'] is False
          assert prereg['source_v2_failure_commit'] == '383d9ffa79e257e3acc02d0eaaac2e1fba8eb49e'

          manifest = json.loads((root / 'dataset-manifest.json').read_text(encoding='utf-8'))
          assert manifest['record_counts'] == {
              'train': 36,
              'original_v2': 8,
              'shadow_v2': 10,
              'challenge_v3': 12,
          }
          for name, meta in manifest['files'].items():
              value = (root / name).read_bytes()
              assert meta['bytes'] == len(value), name
              assert meta['sha256'] == hashlib.sha256(value).hexdigest(), name
          print('SZL-Nemo v3 recovery materialization: PASS')
          PY
          git diff --check

      - name: Commit exact artifacts and remove one-shot workflows
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/materialize-nemo-v3-recovery.yml
          git rm .github/workflows/materialize-nemo-v3-curriculum.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add model_release/szl-nemo-v3
          git diff --cached --check
          git commit \
            -m 'feat(nemo-v3): materialize governed curriculum and frozen holdouts' \
            -m 'Generate 36 project-authored training rows, preserve the original 8-row and shadow 10-row v2 holdouts byte-for-byte, add a distinct 12-row preregistered challenge suite, record immutable hashes, and remove both one-shot materializer workflows.' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:fix/nemo-v3-materialize-recovery-20260722
