name: Doctrine Build

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'web/packages/a11oy-core/**'
      - 'web/packages/a11oy-connection/**'
      - 'deploy/**'
      - 'docs/huggingface.md'
      - 'docs/ECOSYSTEM.md'
      - 'docs/PROVENANCE.md'
      - 'docs/ecosystem-registry.json'
      - 'docs/ecosystem-readiness-report.json'
      - 'docs/INVESTOR_DEMO.md'
      - 'docs/WARHACKER_UDS_PROOF_POINT.md'
      - 'huggingface/**'
      - 'scripts/*.py'
      - '.github/workflows/doctrine.yml'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'web/packages/a11oy-core/**'
      - 'web/packages/a11oy-connection/**'
      - 'deploy/**'
      - 'docs/huggingface.md'
      - 'docs/ECOSYSTEM.md'
      - 'docs/PROVENANCE.md'
      - 'docs/ecosystem-registry.json'
      - 'docs/ecosystem-readiness-report.json'
      - 'docs/INVESTOR_DEMO.md'
      - 'docs/WARHACKER_UDS_PROOF_POINT.md'
      - 'huggingface/**'
      - 'scripts/*.py'
      - '.github/workflows/doctrine.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine:
    name: Doctrine package validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run doctrine tests
        run: pnpm test:doctrine

      - name: Typecheck doctrine packages
        run: pnpm typecheck:doctrine

      - name: Build doctrine packages
        run: pnpm build:doctrine

      - name: Audit ecosystem registry
        run: pnpm ecosystem:audit

      - name: Verify ecosystem readiness report
        run: pnpm ecosystem:readiness

      - name: Verify deploy payload manifest
        run: pnpm payload:verify

      - name: Build operational payload bundle
        run: pnpm payload:bundle

      - name: Verify operational payload bundle
        run: pnpm payload:bundle:verify

      - name: Upload operational payload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11oy-operational-payload
          path: |
            dist/payload/a11oy-operational-payload.tar.gz
            dist/payload/a11oy-operational-payload.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
