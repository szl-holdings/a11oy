name: Doctrine Build

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'web/packages/a11oy-core/**'
      - 'web/packages/a11oy-connection/**'
      - 'deploy/**'
      - 'scripts/build-payload-manifest.mjs'
      - '.github/workflows/doctrine.yml'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'web/packages/a11oy-core/**'
      - 'web/packages/a11oy-connection/**'
      - 'deploy/**'
      - 'scripts/build-payload-manifest.mjs'
      - '.github/workflows/doctrine.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine:
    name: Doctrine package validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run doctrine tests
        run: pnpm test:doctrine

      - name: Typecheck doctrine packages
        run: pnpm typecheck:doctrine

      - name: Build doctrine packages
        run: pnpm build:doctrine

      - name: Verify deploy payload manifest
        run: pnpm payload:verify
