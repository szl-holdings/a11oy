name: Sync and Relock Canonical Hugging Face Space

# Permanent source-derived deployment path. The pinned reusable controller derives
# the exact Space file set from Dockerfile COPY sources, publishes and byte-attests
# the immutable runtime, binds the exact checked-out Git SHA, and verifies the live
# build-info contract. This caller retains only A11oy-specific terminal evidence.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "serve.py"
      - "**/*.py"
      - "console/**"
      - "pages/**"
      - "web/**"
      - "static/**"
      - "static-vendor/**"
      - "numerics/**"
      - "src/**"
      - "schemas/**"
      - "corpus/**"
      - "model_release/**"
      - "*.html"
      - "knowledge.json"
      - "README.md"
      - ".github/scripts/verify_canonical_a11oy.py"
      - ".github/workflows/hf-sync.yml"
      - "tests/test_canonical_a11oy_relock.py"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: sync-relock-canonical-a11oy
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ github.token }}
  CANONICAL_SPACE: SZLHOLDINGS/a11oy
  CANONICAL_ORIGIN: https://szlholdings-a11oy.hf.space
  RELOCK_ISSUE: "1043"
  REPORT_PATH: reports/canonical-a11oy-relock-v4.json

jobs:
  deploy:
    name: Deploy, source-bind, and attest exact surface
    uses: szl-holdings/.github/.github/workflows/reusable-hf-deploy.yml@9aa36ed914e88bdef2873b26c022e0cecb1e6ec8
    with:
      hf-repo: SZLHOLDINGS/a11oy
      ref: ${{ github.sha }}
      dockerfile-path: Dockerfile
      include-readme: true
      prune: true
      wait-running: 1200
      source-revision-variable: SZL_GIT_SHA
      source-revision-probe-path: /api/build-info
      smoke-paths: '["/","/api/livez","/api/build-info","/api/a11oy/v1/brain/capabilities","/api/a11oy/v1/readiness/tab-matrix?view=summary","/static/3d/holographic.html"]'
    secrets:
      HF_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_TOKEN }}

  relock:
    name: Prove exact live source, runtime, routes, and singleton state
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HF_TOKEN: ${{ secrets.HF_ORG_TOKEN || secrets.HF_TOKEN }}
      SOURCE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout exact protected source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install exact read-only verification clients
        run: >-
          python -m pip install --disable-pip-version-check
          "huggingface_hub==1.19.0"
          "requests==2.32.5"

      - name: Evaluate the canonical application contract
        id: verify
        shell: bash
        run: |
          set +e
          python .github/scripts/verify_canonical_a11oy.py \
            --repo-id "$CANONICAL_SPACE" \
            --origin "$CANONICAL_ORIGIN" \
            --source-sha "$SOURCE_SHA" \
            --source-variable SZL_GIT_SHA \
            --output "$REPORT_PATH" \
            --attempts 12 \
            --retry-seconds 10
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload immutable relock evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: canonical-a11oy-relock-${{ github.run_id }}
          path: ${{ env.REPORT_PATH }}
          if-no-files-found: error
          retention-days: 90

      - name: Persist the canonical deployment authority
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.verify.outputs.exit_code }}
        run: |
          set -euo pipefail
          test -f "$REPORT_PATH"
          {
            echo '<!-- szl-current-a11oy-relock -->'
            echo '# Current canonical A11oy deployment relock'
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo '```json'
            cat "$REPORT_PATH"
            echo '```'
          } > /tmp/relock.md
          gh issue edit "$RELOCK_ISSUE" --repo "$GITHUB_REPOSITORY" --body-file /tmp/relock.md
          if [ "${EXIT_CODE:-2}" = '0' ]; then
            gh issue close "$RELOCK_ISSUE" --repo "$GITHUB_REPOSITORY" --reason completed \
              --comment 'Protected source, reusable source binding, immutable current runtime, exact HEAD/GET contracts, holographic surface, and singleton topology all passed.' || true
          else
            gh issue reopen "$RELOCK_ISSUE" --repo "$GITHUB_REPOSITORY" || true
          fi

      - name: Enforce exact live state
        if: always()
        env:
          EXIT_CODE: ${{ steps.verify.outputs.exit_code }}
        run: |
          code="${EXIT_CODE:-2}"
          if [ "$code" -ne 0 ]; then
            echo "::error::Canonical A11oy relock failed with exit ${code}."
            exit "$code"
          fi
          echo 'Canonical A11oy is source-bound, singleton, and route-operational.'
