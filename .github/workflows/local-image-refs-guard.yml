name: local image refs guard

# Catches broken LOCAL image references in the docs/site documentation site
# before they ship.
#
# The broken footer avatar / navbar logo from #719 went unnoticed for a long
# time because nothing verified that locally-referenced images actually exist as
# committed files. The VitePress build does NOT fail on a missing logo, a missing
# hero image, or a broken ![](...) ref in a README that lives OUTSIDE its srcDir
# (docs/site/docs/) — so "extend docs/site CI to run vitepress build" CANNOT
# catch this class of bug. Only an asset-link checker over the whole docs/site
# tree can.
#
# scripts/check_local_image_refs.py scans docs/site for markdown ![](...),
# inline <img>/<source> src, and config/frontmatter logo:/thumbnail:/favicon:/
# image:/src: image values, and fails when any of them does not resolve to a
# committed (git-tracked) file. Remote (http/https/data:) refs are ignored; a
# file that exists on disk but was never committed still fails. This is about
# local IMAGE assets resolving to committed files — distinct from hyperlink /
# anchor link checking.
#
# See scripts/check_local_image_refs.py for the policy and
# scripts/check_local_image_refs.test.sh for the offline negative-fixture
# self-test.

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "scripts/check_local_image_refs.py"
      - "scripts/check_local_image_refs.test.sh"
      - ".github/workflows/local-image-refs-guard.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/site/**"
      - "scripts/check_local_image_refs.py"
      - "scripts/check_local_image_refs.test.sh"
      - ".github/workflows/local-image-refs-guard.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: No broken local image references in docs/site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Self-test the guard (offline negative fixtures)
        run: bash scripts/check_local_image_refs.test.sh
      - name: Verify every local image ref in docs/site is committed
        run: python3 scripts/check_local_image_refs.py --root .
