name: DSSE Receipts (Sigstore keyless)

# Issue #203, Tier B: mint a GENUINE Sigstore keyless DSSE signature over the
# governance decision log and independently verify it. This is the live evidence
# that receipt signing is real (Fulcio ephemeral ECDSA-P256 cert + Rekor
# transparency entry), not a placeholder.
#
# HONESTY: this only upgrades the receipt SIGNATURE; the SLSA claim is unchanged
# (still L1). Outside this CI context there is no ambient OIDC token, so every
# other runtime keeps the honest dsse_envelope() placeholder.
#
# Org policy note: only github-owned / verified actions are allowed
# (patterns_allowed=[]). Sigstore signing is therefore driven by `pip install
# sigstore` + the repo's own scripts, NOT a third-party signing action.

on:
  push:
    branches: [main]
    paths:
      - "governed_loop_E4.json"
      - "szl_formulas.py"
      - "scripts/sign_governance_receipts.py"
      - "scripts/verify_dsse_real.py"
      - ".github/workflows/dsse-receipts.yml"
  pull_request:
    branches: [main]
    paths:
      - "governed_loop_E4.json"
      - "szl_formulas.py"
      - "scripts/sign_governance_receipts.py"
      - "scripts/verify_dsse_real.py"
      - ".github/workflows/dsse-receipts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sign-and-verify:
    name: Sign + independently verify governance receipt
    runs-on: ubuntu-latest
    permissions:
      contents: write # publish (commit) the signed receipt so it can be re-checked over time
      id-token: write # REQUIRED: mints the ambient OIDC token Fulcio exchanges for a cert
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install sigstore SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install "sigstore>=2.0.0"
      - name: Sign governance decision log (real Sigstore keyless)
        run: |
          python scripts/sign_governance_receipts.py --log governed_loop_E4.json
      - name: Locate signed envelope
        id: locate
        run: |
          envelope="$(ls attestations/governance/*.dsse.json | head -n1)"
          echo "envelope=${envelope}" >> "$GITHUB_OUTPUT"
          echo "Signed envelope: ${envelope}"
      - name: Independently verify (Fulcio chain + Rekor inclusion + DSSE sig)
        run: |
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/dsse-receipts.yml@${GITHUB_REF}"
          echo "Expected signer identity: ${identity}"
          python scripts/verify_dsse_real.py "${{ steps.locate.outputs.envelope }}" \
            --identity "${identity}" \
            --issuer "https://token.actions.githubusercontent.com"
      - name: Upload signed receipt as evidence
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: governance-dsse-receipt
          path: attestations/governance/*.dsse.json
          if-no-files-found: error

      # Persist the signed receipt into a durable, public ledger so it becomes a
      # permanently published artifact that the scheduled rekor-recheck.yml
      # monitor can re-verify against Rekor over time (issue #195). The uploaded
      # artifact above expires; a committed receipt does not.
      #
      # We publish to a dedicated, UNPROTECTED `governance-receipts` branch — NOT
      # main — because main's branch ruleset requires the "check" status, which
      # the in-CI GITHUB_TOKEN (not an org owner) cannot satisfy/bypass for a
      # contents-API write. The ledger branch carries no such rule, so the
      # default token can append receipts to it directly. The signer identity is
      # embedded so the monitor verifies each receipt against the exact workflow
      # SAN + issuer (the dsse-receipts.yml cert is minted on refs/heads/main)
      # that produced it.
      #
      # continue-on-error: persistence is best-effort and must NEVER fail the
      # core sign+verify job — if it can't write the ledger, the worst case is
      # the monitor simply has nothing new to re-check (an honest soft pass).
      - name: Publish signed receipt to ledger branch
        id: publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          ENVELOPE: ${{ steps.locate.outputs.envelope }}
        with:
          script: |
            const fs = require('fs');
            const branch = 'governance-receipts';
            const { owner, repo } = context.repo;
            const path = process.env.ENVELOPE;
            const envelope = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (envelope._mode !== 'SIGSTORE-KEYLESS') {
              core.info(`Envelope mode is '${envelope._mode}', not a real signature — not publishing.`);
              core.setOutput('skipped', 'true');
              return;
            }
            core.setOutput('skipped', 'false');
            // Record the signer identity so the re-check monitor verifies each
            // receipt against the exact workflow SAN + issuer that produced it.
            envelope._signer_identity =
              `https://github.com/${owner}/${repo}/.github/workflows/dsse-receipts.yml@${context.ref}`;
            envelope._signer_issuer = 'https://token.actions.githubusercontent.com';

            // Ensure the ledger branch exists (branch from main on first use).
            let exists = true;
            try {
              await github.rest.repos.getBranch({ owner, repo, branch });
            } catch (e) {
              if (e.status === 404) { exists = false; } else { throw e; }
            }
            if (!exists) {
              const main = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: main.data.object.sha });
              core.info(`Created ledger branch '${branch}'.`);
            }

            // Ledger naming: <contenthash>__rekor-<logIndex>.dsse.json
            //
            // Each push-to-main signing is a DISTINCT Sigstore minting event with
            // its own Rekor transparency-log entry, even when the governance-log
            // CONTENT (and therefore its hash) is unchanged. Naming the receipt
            // after the content hash alone overwrote the previous receipt in place,
            // so only the latest signing survived on the ledger. Appending the
            // unique Rekor log index keeps every distinct minting event — matching
            // the convention used by the task #249 backfill of the receipts already
            // on this branch. The scheduled rekor-recheck.yml monitor globs
            // attestations/governance/*.dsse.json, so it re-verifies the full set.
            const baseName = path.split('/').pop(); // <contenthash>.dsse.json
            const logIndex = envelope?._sigstore?.bundle
              ?.verificationMaterial?.tlogEntries?.[0]?.logIndex;
            const fileName = logIndex
              ? baseName.replace(/\.dsse\.json$/, `__rekor-${logIndex}.dsse.json`)
              : baseName; // no Rekor index (not expected for a real keyless receipt)
            if (!logIndex) {
              core.warning('No Rekor logIndex on the envelope — falling back to the content-hash name, which may overwrite a prior receipt.');
            }
            const repoPath = `attestations/governance/${fileName}`;
            // Record what we are about to write so the follow-up verification step
            // can confirm this exact receipt actually landed on the ledger branch.
            core.setOutput('repo_path', repoPath);
            core.setOutput('file_name', fileName);
            const content = Buffer.from(JSON.stringify(envelope, null, 2) + '\n', 'utf8').toString('base64');

            // The Rekor index is unique per minting, so distinct signings never
            // collide; this lookup only makes an exact re-publish idempotent.
            let sha;
            try {
              const cur = await github.rest.repos.getContent({ owner, repo, path: repoPath, ref: branch });
              sha = cur.data.sha;  // receipt already published (re-run); update in place
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const writeResp = await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: repoPath, branch, sha,
              message: `chore(receipts): publish signed governance receipt ${fileName}\n\nSigned-off-by: Yachay <yachay@szlholdings.ai>`,
              content,
            });
            core.setOutput('published', 'true');
            // The blob SHA of exactly what we wrote, so the verify step can confirm
            // the receipt PRESENT on the branch is the one we signed this run — not a
            // stale file left by a prior run under a colliding content-hash name (the
            // no-Rekor-logIndex fallback path), which would otherwise pass green.
            core.setOutput('written_sha', writeResp?.data?.content?.sha || '');
            core.info(`Published ${repoPath} to '${branch}' (blob ${writeResp?.data?.content?.sha}).`);

      # The publish step above is continue-on-error: a failed ledger write must
      # never fail the core sign+verify job. But before this step that meant a
      # dropped write passed GREEN silently — the signed receipt simply never
      # reached the monitor. This step closes that gap: it confirms the exact
      # receipt we just signed is actually present on the governance-receipts
      # branch. Honest soft-pass is preserved for the two legitimate no-ops:
      #   - non-push events (the whole step is push/main-gated, like publish), and
      #   - placeholder envelopes (publish set skipped=true and wrote nothing).
      # Anything else — a 404 for the receipt, an errored publish that produced
      # no target path, or an API error checking the branch — is a REAL failure
      # we surface (annotation + alert + red run), never swallow.
      - name: Verify the signed receipt actually recorded on the ledger
        id: verifyledger
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          SKIPPED: ${{ steps.publish.outputs.skipped }}
          REPO_PATH: ${{ steps.publish.outputs.repo_path }}
          WRITTEN_SHA: ${{ steps.publish.outputs.written_sha }}
        with:
          script: |
            const branch = 'governance-receipts';
            const { owner, repo } = context.repo;
            const skipped = process.env.SKIPPED;
            const repoPath = process.env.REPO_PATH;
            const writtenSha = process.env.WRITTEN_SHA;

            // Honest soft-pass: a placeholder (non-SIGSTORE-KEYLESS) envelope was
            // intentionally not published, so there is nothing to verify.
            if (skipped === 'true') {
              core.info('Publish was intentionally skipped (placeholder envelope) — nothing to verify. Honest soft pass.');
              core.setOutput('verify_failed', 'false');
              return;
            }

            // The publish step errored before it could even compute a target path
            // (e.g. could not read/parse the envelope). That IS a real miss.
            if (!repoPath) {
              core.setOutput('verify_failed', 'true');
              core.setOutput('reason', 'the publish step failed before it could compute or attempt a ledger write (no target path was produced)');
              core.error('The signed receipt was NOT recorded on the governance-receipts branch: publish produced no target path.');
              return;
            }

            // The publish step computed a target path but never confirmed a
            // successful write (it set no blob SHA) — the createOrUpdateFileContents
            // call failed. A pre-existing file at this path (e.g. a stale receipt
            // left by a prior run under the no-Rekor-logIndex content-hash fallback
            // name) must NOT mask that. Treat "no confirmed write" as a real miss
            // regardless of whether something already sits at repoPath.
            if (!writtenSha) {
              core.setOutput('verify_failed', 'true');
              core.setOutput('reason', `the publish step computed ${repoPath} but did not confirm a successful write (no blob SHA) — the ledger write failed`);
              core.error(`The signed receipt ${repoPath} was NOT confirmed written to '${branch}' (publish reported no blob SHA).`);
              return;
            }

            // Confirm the receipt on the ledger branch is EXACTLY the one we signed
            // this run by matching its blob SHA (existence alone is not enough — a
            // stale file under a colliding name could otherwise pass green). Retry a
            // few times to absorb read-after-write replication lag and avoid a flaky
            // false alarm on a write that genuinely succeeded.
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                const cur = await github.rest.repos.getContent({ owner, repo, path: repoPath, ref: branch });
                if (cur.data && cur.data.sha === writtenSha) {
                  core.info(`Confirmed: ${repoPath} on '${branch}' matches the receipt signed this run (blob ${writtenSha}, attempt ${attempt}). Ledger write verified.`);
                  core.setOutput('verify_failed', 'false');
                  return;
                }
                // Present but a different blob — most likely replication lag still
                // serving the prior version. Retry, then fail if it never converges.
                if (attempt < 3) { core.info(`${repoPath} present on '${branch}' but blob ${cur.data && cur.data.sha} != ${writtenSha} (attempt ${attempt}/3) — retrying…`); await sleep(5000); continue; }
                core.setOutput('verify_failed', 'true');
                core.setOutput('reason', `receipt ${repoPath} on '${branch}' has blob ${cur.data && cur.data.sha}, not the ${writtenSha} signed this run`);
                core.error(`The receipt on '${branch}' does not match the one signed this run for ${repoPath}.`);
                return;
              } catch (e) {
                if (e.status === 404) {
                  if (attempt < 3) { core.info(`${repoPath} not yet visible on '${branch}' (attempt ${attempt}/3) — retrying…`); await sleep(5000); continue; }
                  core.setOutput('verify_failed', 'true');
                  core.setOutput('reason', `signed receipt ${repoPath} is missing from the '${branch}' branch after publish (checked 3×)`);
                  core.error(`The signed receipt ${repoPath} is NOT on '${branch}' after publish — the transparency monitor will have nothing new to re-check.`);
                  return;
                }
                // Non-404 API error: surface it rather than swallow it.
                core.setOutput('verify_failed', 'true');
                core.setOutput('reason', `error checking '${branch}' for ${repoPath}: ${e.status || ''} ${e.message}`);
                core.error(`Could not verify the ledger write for ${repoPath}: ${e.status || ''} ${e.message}`);
                return;
              }
            }

      # Keep the re-check baseline (high-water mark) current as receipts grow.
      #
      # The scheduled rekor-recheck.yml monitor enforces a minimum receipt floor
      # so a wiped ledger branch / silently-broken fetch can't pass green with
      # nothing to re-check. That floor used to be a single hand-maintained value
      # in main's .github/rekor-recheck-baseline.json (issue #320), so until
      # someone bumped it by hand it only caught a near-total wipe — not a partial
      # regression after the ledger had grown. This step keeps it tight
      # automatically: after a real receipt is published it raises a high-water
      # mark to the new TOTAL number of receipts on the ledger and records it on
      # the governance-receipts branch (the in-CI token can write that branch; it
      # cannot write main). It NEVER lowers the value — the ledger is append-only
      # — and the genuine empty-on-first-use state stays a soft pass because the
      # mark is simply absent until the first publish. rekor-recheck.yml then
      # enforces the larger of this dynamic mark and main's static floor.
      #
      # continue-on-error: like the publish step, maintaining the baseline is
      # best-effort and must never fail the core sign+verify job.
      - name: Raise the re-check baseline high-water mark
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.publish.outputs.skipped == 'false' && steps.verifyledger.outputs.verify_failed != 'true' }}
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const branch = 'governance-receipts';
            const baselinePath = '.github/rekor-recheck-baseline.json';
            const { owner, repo } = context.repo;

            // Count every published receipt currently on the ledger branch. The
            // receipt we just published + verified is included. The directory
            // listing is flat and small; cap-safe for the foreseeable ledger size.
            let total = 0;
            try {
              const dir = await github.rest.repos.getContent({ owner, repo, path: 'attestations/governance', ref: branch });
              if (!Array.isArray(dir.data)) { core.warning('Ledger path is not a directory listing — skipping baseline update.'); return; }
              total = dir.data.filter((e) => e.type === 'file' && e.name.endsWith('.dsse.json')).length;
            } catch (e) {
              core.warning(`Could not list the ledger to count receipts (${e.status || ''} ${e.message}) — skipping baseline update.`);
              return;
            }

            // Read the current recorded high-water mark on the ledger branch.
            let currentMin = 0;
            let sha;
            try {
              const cur = await github.rest.repos.getContent({ owner, repo, path: baselinePath, ref: branch });
              sha = cur.data.sha;
              const parsed = JSON.parse(Buffer.from(cur.data.content, 'base64').toString('utf8'));
              currentMin = Number(parsed.min_receipts || 0) || 0;
            } catch (e) {
              if (e.status !== 404) { core.warning(`Could not read the ledger baseline (${e.status || ''} ${e.message}) — skipping.`); return; }
            }

            // Append-only ledger: never lower, and don't rewrite when unchanged.
            const newMin = Math.max(currentMin, total);
            if (newMin <= currentMin) {
              core.info(`Baseline high-water mark unchanged (recorded ${currentMin}, ledger holds ${total}).`);
              return;
            }

            const payload = {
              min_receipts: newMin,
              recorded: new Date().toISOString().slice(0, 10),
              source: 'auto: dsse-receipts.yml high-water mark on publish',
              note: "Auto-maintained high-water mark of published *.dsse.json receipts on the governance-receipts ledger branch. Raised by .github/workflows/dsse-receipts.yml after each successful publish; never lowered (the ledger is append-only). The static floor in main's .github/rekor-recheck-baseline.json (issue #320) is the manual minimum; rekor-recheck.yml enforces the larger of the two.",
            };
            const content = Buffer.from(JSON.stringify(payload, null, 2) + '\n', 'utf8').toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: baselinePath, branch, sha,
              message: `chore(receipts): raise re-check baseline high-water mark to ${newMin}\n\nSigned-off-by: Yachay <yachay@szlholdings.ai>`,
              content,
            });
            core.info(`Raised re-check baseline high-water mark ${currentMin} -> ${newMin} on '${branch}'.`);

      # Direct push notification, mirroring rekor-recheck.yml: a silently-dropped
      # ledger write is noticed immediately, not just buried in a red run. Posts
      # to a Slack-compatible incoming webhook via curl (no third-party action, so
      # it stays within the org github-owned/verified-actions-only policy). If no
      # webhook secret is configured it logs a notice and soft-skips — the red run
      # + annotation still stand.
      - name: Alert the team directly if the receipt failed to record
        if: ${{ always() && steps.verifyledger.outputs.verify_failed == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_PATH: ${{ steps.publish.outputs.repo_path }}
          REASON: ${{ steps.verifyledger.outputs.reason }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not configured — skipping direct alert. The failed run and the annotation above still stand."
            exit 0
          fi

          path_line="${REPO_PATH:-(no target path was produced)}"

          # Compose the message (real newlines), then JSON-encode it safely with
          # jq (preinstalled on ubuntu-latest) so quotes/newlines can't break the
          # payload. Slack renders \n and *bold* in the `text` field.
          text=":rotating_light: *Signed governance receipt failed to record on the ledger* in ${REPO}.
          *Receipt:* ${path_line}
          *Ledger branch:* governance-receipts
          *Reason:* ${REASON}
          *Failing run:* ${RUN_URL}"

          payload=$(jq -n --arg text "$text" '{text: $text}')

          echo "Posting ledger-write-failure alert to Slack webhook..."
          code=$(curl -sS -o /tmp/slack_resp.txt -w '%{http_code}' \
                   -X POST -H 'Content-Type: application/json' \
                   --max-time 20 --data "${payload}" "${SLACK_WEBHOOK_URL}")
          echo "Webhook responded HTTP ${code}."
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::Direct alert webhook POST failed (HTTP ${code}): $(cat /tmp/slack_resp.txt)"
            exit 1
          fi
          echo "Direct alert delivered."

      # Honest red run: a real signing whose receipt never reached the ledger is a
      # failure, not a green pass. This fires ONLY for genuine misses — non-push
      # events and placeholder envelopes set verify_failed=false above and never
      # reach here.
      - name: Fail the run if the signed receipt did not record on the ledger
        if: ${{ always() && steps.verifyledger.outputs.verify_failed == 'true' }}
        run: |
          echo "::error::A signed governance receipt was minted but did NOT record on the governance-receipts ledger (${{ steps.verifyledger.outputs.reason }}). See the alert/annotation above."
          exit 1
