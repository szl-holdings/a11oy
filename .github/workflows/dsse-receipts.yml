name: DSSE Receipts (Sigstore keyless)

# Issue #203, Tier B: mint a GENUINE Sigstore keyless DSSE signature over the
# governance decision log and independently verify it. This is the live evidence
# that receipt signing is real (Fulcio ephemeral ECDSA-P256 cert + Rekor
# transparency entry), not a placeholder.
#
# HONESTY: this only upgrades the receipt SIGNATURE; the SLSA claim is unchanged
# (still L1). Outside this CI context there is no ambient OIDC token, so every
# other runtime keeps the honest dsse_envelope() placeholder.
#
# Org policy note: only github-owned / verified actions are allowed
# (patterns_allowed=[]). Sigstore signing is therefore driven by `pip install
# sigstore` + the repo's own scripts, NOT a third-party signing action.

on:
  push:
    branches: [main]
    paths:
      - "governed_loop_E4.json"
      - "szl_formulas.py"
      - "scripts/sign_governance_receipts.py"
      - "scripts/verify_dsse_real.py"
      - ".github/workflows/dsse-receipts.yml"
  pull_request:
    branches: [main]
    paths:
      - "governed_loop_E4.json"
      - "szl_formulas.py"
      - "scripts/sign_governance_receipts.py"
      - "scripts/verify_dsse_real.py"
      - ".github/workflows/dsse-receipts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sign-and-verify:
    name: Sign + independently verify governance receipt
    runs-on: ubuntu-latest
    permissions:
      contents: write # publish (commit) the signed receipt so it can be re-checked over time
      id-token: write # REQUIRED: mints the ambient OIDC token Fulcio exchanges for a cert
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install sigstore SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install "sigstore>=2.0.0"
      - name: Sign governance decision log (real Sigstore keyless)
        run: |
          python scripts/sign_governance_receipts.py --log governed_loop_E4.json
      - name: Locate signed envelope
        id: locate
        run: |
          envelope="$(ls attestations/governance/*.dsse.json | head -n1)"
          echo "envelope=${envelope}" >> "$GITHUB_OUTPUT"
          echo "Signed envelope: ${envelope}"
      - name: Independently verify (Fulcio chain + Rekor inclusion + DSSE sig)
        run: |
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/dsse-receipts.yml@${GITHUB_REF}"
          echo "Expected signer identity: ${identity}"
          python scripts/verify_dsse_real.py "${{ steps.locate.outputs.envelope }}" \
            --identity "${identity}" \
            --issuer "https://token.actions.githubusercontent.com"
      - name: Upload signed receipt as evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: governance-dsse-receipt
          path: attestations/governance/*.dsse.json
          if-no-files-found: error

      # Persist the signed receipt into a durable, public ledger so it becomes a
      # permanently published artifact that the scheduled rekor-recheck.yml
      # monitor can re-verify against Rekor over time (issue #195). The uploaded
      # artifact above expires; a committed receipt does not.
      #
      # We publish to a dedicated, UNPROTECTED `governance-receipts` branch — NOT
      # main — because main's branch ruleset requires the "check" status, which
      # the in-CI GITHUB_TOKEN (not an org owner) cannot satisfy/bypass for a
      # contents-API write. The ledger branch carries no such rule, so the
      # default token can append receipts to it directly. The signer identity is
      # embedded so the monitor verifies each receipt against the exact workflow
      # SAN + issuer (the dsse-receipts.yml cert is minted on refs/heads/main)
      # that produced it.
      #
      # continue-on-error: persistence is best-effort and must NEVER fail the
      # core sign+verify job — if it can't write the ledger, the worst case is
      # the monitor simply has nothing new to re-check (an honest soft pass).
      - name: Publish signed receipt to ledger branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ENVELOPE: ${{ steps.locate.outputs.envelope }}
        with:
          script: |
            const fs = require('fs');
            const branch = 'governance-receipts';
            const { owner, repo } = context.repo;
            const path = process.env.ENVELOPE;
            const envelope = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (envelope._mode !== 'SIGSTORE-KEYLESS') {
              core.info(`Envelope mode is '${envelope._mode}', not a real signature — not publishing.`);
              return;
            }
            // Record the signer identity so the re-check monitor verifies each
            // receipt against the exact workflow SAN + issuer that produced it.
            envelope._signer_identity =
              `https://github.com/${owner}/${repo}/.github/workflows/dsse-receipts.yml@${context.ref}`;
            envelope._signer_issuer = 'https://token.actions.githubusercontent.com';

            // Ensure the ledger branch exists (branch from main on first use).
            let exists = true;
            try {
              await github.rest.repos.getBranch({ owner, repo, branch });
            } catch (e) {
              if (e.status === 404) { exists = false; } else { throw e; }
            }
            if (!exists) {
              const main = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: main.data.object.sha });
              core.info(`Created ledger branch '${branch}'.`);
            }

            const repoPath = `attestations/governance/${path.split('/').pop()}`;
            const content = Buffer.from(JSON.stringify(envelope, null, 2) + '\n', 'utf8').toString('base64');

            let sha;
            try {
              const cur = await github.rest.repos.getContent({ owner, repo, path: repoPath, ref: branch });
              sha = cur.data.sha;  // receipt already published (re-run); update in place
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: repoPath, branch, sha,
              message: `chore(receipts): publish signed governance receipt ${path.split('/').pop()}\n\nSigned-off-by: Yachay <yachay@szlholdings.ai>`,
              content,
            });
            core.info(`Published ${repoPath} to '${branch}'.`);
