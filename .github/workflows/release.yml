name: Release artifacts — SBOM + DSSE attestation + build provenance
on:
  release:
    types: [created]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  provider-gate:
    name: Provider release honesty gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install provider-gate test dependencies
        run: python -m pip install --require-hashes -r .github/requirements/ci-core.txt
      - name: Prove provider honesty, durable receipts, and HTTP boundaries
        run: >-
          python -m pytest -q
          tests/test_provider_release_gate.py
          test_provider_http.py
          test_sovereign_registry_dev2.py
          tests/test_sovereign_backend.py

  attach:
    needs: provider-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.9
        with:
          format: cyclonedx-json
          output-file: ${{ github.event.repository.name }}-sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            ${{ github.event.repository.name }}-sbom.cdx.json
          push-to-registry: false

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-path: '${{ github.event.repository.name }}-sbom.cdx.json'
          sbom-path: '${{ github.event.repository.name }}-sbom.cdx.json'

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Attest SBOM (DSSE/in-toto)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest-blob --yes \
            --predicate ${{ github.event.repository.name }}-sbom.cdx.json \
            --type cyclonedx \
            --output-attestation ${{ github.event.repository.name }}-attestation.intoto.jsonl \
            ${{ github.event.repository.name }}-sbom.cdx.json

      - name: Upload SBOM + attestation to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        if: github.event_name == 'release'
        with:
          files: |
            ${{ github.event.repository.name }}-sbom.cdx.json
            ${{ github.event.repository.name }}-attestation.intoto.jsonl
        env:
          COSIGN_EXPERIMENTAL: "1"

  # Issue #194: every release also carries a REAL Sigstore keyless DSSE signature
  # over the governance decision log AND the vessels Khipu-ingest consumer receipt,
  # not just the dedicated dsse-receipts.yml demo run. Signature-only upgrade — the
  # SLSA claim is unchanged (still L1).
    permissions:
      id-token: write
      contents: write
      packages: write
      attestations: write
  sign-receipts:
    needs: provider-gate
    name: Sign governance + Khipu receipts (Sigstore keyless)
    runs-on: ubuntu-latest
    permissions:
      contents: write     # upload signed envelope as a release asset
      id-token: write     # REQUIRED: mints the ambient OIDC token Fulcio exchanges for a cert
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Sign + verify receipts
        uses: ./.github/actions/sign-receipts
      - name: Upload signed receipts to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mapfile -t FILES < <(ls attestations/governance/*.dsse.json attestations/khipu/*.dsse.json attestations/khipu/*.node.json 2>/dev/null)
          echo "Uploading ${#FILES[@]} signed receipt files to release ${TAG}"
          gh release upload "${TAG}" "${FILES[@]}" --clobber --repo szl-holdings/a11oy
      - name: Upload signed receipts as a workflow artifact (dispatch runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-receipts
          path: attestations/**/*.json
          if-no-files-found: error
