name: HF Space module-drift guard

# szl-holdings/a11oy's live Hugging Face Space (SZLHOLDINGS/a11oy) is built by
# Dockerfile COPY from this repo, but the Space's files can also be edited
# directly on HF, so a COPY'd module can silently diverge between this source of
# truth and the live Space -- in EITHER direction.
#
# The checker now lives ONCE in szl-holdings/.github (alongside the org-wide
# license/lockfile/dead-link guards) and this repo delegates to the reusable
# workflow instead of vendoring its own copy -- so a fix to the guard reaches
# every HF-backed repo at once. This repo keeps only its own ratchet allowlist
# (.github/hf-module-drift-allow.json): known drift warns, any NEW drift fails.
# The org-wide scheduled sweep (szl-holdings/.github hf-module-drift-check.yml)
# is the catch-all safety net.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'  # Mondays 06:37 UTC (HF-side edits land with no GitHub push)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hf-module-drift:
    uses: szl-holdings/.github/.github/workflows/reusable-hf-module-drift-check.yml@79cb06b79d6a3156a5796948295617ff6b207683  # main
    with:
      hf-repo: SZLHOLDINGS/a11oy
      # Pull requests must validate the proposed head, not the base branch. Push, schedule,
      # and manual runs continue to validate the exact commit that triggered the workflow.
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
