name: HF Space module-drift guard

# szl-holdings/a11oy's live Hugging Face Space (SZLHOLDINGS/a11oy) is built by
# Dockerfile COPY from this repo, but the Space's files can also be edited
# directly on HF, so a COPY'd module can silently diverge between this source of
# truth and the live Space -- in EITHER direction.
#
# The checker now lives ONCE in szl-holdings/.github (alongside the org-wide
# license/lockfile/dead-link guards) and this repo delegates to the reusable
# workflow instead of vendoring its own copy -- so a fix to the guard reaches
# every HF-backed repo at once. This repo keeps only its own ratchet allowlist
# (.github/hf-module-drift-allow.json): known drift warns, any NEW drift fails.
# The org-wide scheduled sweep (szl-holdings/.github hf-module-drift-check.yml)
# is the catch-all safety net.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'  # Mondays 06:37 UTC (HF-side edits land with no GitHub push)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hf-module-drift:
    uses: szl-holdings/.github/.github/workflows/reusable-hf-module-drift-check.yml@4c5f39bcde92e2fdc1652072cf6ab8e2b3ab5b21  # LFS content-identity guard
    with:
      hf-repo: SZLHOLDINGS/a11oy
      # GitHub and Hugging Face revisions are independent namespaces. Pull
      # requests compare the exact proposed source with the exact reconciled
      # Space deployment; main/scheduled runs compare each live main.
      github-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      # Space main reconciled with this tree after the 2026-07-16 outage: the
      # Dockerfile is the shrunk copy (HF hard-kills Space builds pre-log once
      # the Dockerfile exceeds 128 KiB -- see docs/DOCKERFILE_NOTES.md) and the
      # two LFS assets deleted during outage debugging are restored. Pin the
      # immutable HF commit, never the movable branch name.
      hf-ref: ${{ github.event_name == 'pull_request' && '881ea105d97e0c8322885609ae94ba8b6803b68a' || 'main' }}
