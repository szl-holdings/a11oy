name: HF Deployment Relock Evidence

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/hf-deployment-lock.json"
      - ".github/workflows/hf-relock-evidence.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hf-relock-evidence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lock-contract:
    name: Lock candidate matches evidence pair
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout lock candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate exact GitHub and Hugging Face revisions
        env:
          EXPECTED_GITHUB_SHA: de84b1ed5a0f8fc5c6218ab7e2a7949d0ea374e9
          EXPECTED_HF_SHA: 3e53f98615a5219664f05de2b4f0d67f3cbb5afb
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          lock = json.loads(Path('.github/hf-deployment-lock.json').read_text())
          expected = {
              'schema': 1,
              'github_repo': 'szl-holdings/a11oy',
              'github_source_sha': os.environ['EXPECTED_GITHUB_SHA'],
              'hf_repo': 'SZLHOLDINGS/a11oy',
              'hf_commit_sha': os.environ['EXPECTED_HF_SHA'],
          }
          if lock != expected:
              raise SystemExit(f'lock candidate does not match evidence pair: {lock!r}')
          print('lock candidate exactly matches the evidence pair')
          PY

  source-parity:
    name: Exact source pair has zero managed drift
    needs: lock-contract
    uses: szl-holdings/.github/.github/workflows/reusable-hf-module-drift-check.yml@3625b7e22d38b795f1b628420607c65066082b31
    with:
      hf-repo: SZLHOLDINGS/a11oy
      mode: direct
      github-ref: de84b1ed5a0f8fc5c6218ab7e2a7949d0ea374e9
      hf-ref: 3e53f98615a5219664f05de2b4f0d67f3cbb5afb
      dockerfile-path: Dockerfile

  live-api:
    name: Running HF Space serves governed API contracts
    needs: source-parity
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout exact GitHub source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: de84b1ed5a0f8fc5c6218ab7e2a7949d0ea374e9
          persist-credentials: false
      - name: Prove live Hugging Face runtime revision
        env:
          EXPECTED_HF_SHA: 3e53f98615a5219664f05de2b4f0d67f3cbb5afb
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              'https://huggingface.co/api/spaces/SZLHOLDINGS/a11oy',
              headers={'User-Agent': 'a11oy-hf-relock-evidence/1.0'},
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              metadata = json.load(response)
          expected = os.environ['EXPECTED_HF_SHA']
          observed_repo = metadata.get('sha')
          runtime = metadata.get('runtime') or {}
          observed_runtime = runtime.get('sha')
          stage = runtime.get('stage')
          if observed_repo != expected or observed_runtime != expected or stage != 'RUNNING':
              raise SystemExit(
                  'live HF revision mismatch: expected=%s repo=%s runtime=%s stage=%s'
                  % (expected, observed_repo, observed_runtime, stage)
              )
          print('live HF repository and runtime revisions match the lock')
          PY
      - name: Prove the health validator fails closed
        run: python3 scripts/test_check_a11oy_api_health.py
      - name: Probe governed API contracts on the live HF Space
        run: |
          python3 scripts/check_a11oy_api_health.py \
            --target "hf=https://szlholdings-a11oy.hf.space" \
            --summary-file /tmp/a11oy-hf-relock-health.json
          cat /tmp/a11oy-hf-relock-health.json
