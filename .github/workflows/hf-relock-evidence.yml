name: HF Deployment Relock Evidence

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/hf-deployment-lock.json"
      - ".github/workflows/hf-relock-evidence.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hf-relock-evidence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lock-contract:
    name: Lock candidate matches evidence pair
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout lock candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate exact GitHub and Hugging Face revisions
        env:
          EXPECTED_GITHUB_SHA: 187fe0a0504a751d2cf2c17d4863f43149714122
          EXPECTED_HF_SHA: cfc251db369dd14a798c8dee23f01215ffdd1afc
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          lock = json.loads(Path('.github/hf-deployment-lock.json').read_text())
          expected = {
              'schema': 1,
              'github_repo': 'szl-holdings/a11oy',
              'github_source_sha': os.environ['EXPECTED_GITHUB_SHA'],
              'hf_repo': 'SZLHOLDINGS/a11oy',
              'hf_commit_sha': os.environ['EXPECTED_HF_SHA'],
          }
          if lock != expected:
              raise SystemExit(f'lock candidate does not match evidence pair: {lock!r}')
          print('lock candidate exactly matches the evidence pair')
          PY

  source-parity:
    name: Exact source pair has zero managed drift
    needs: lock-contract
    uses: szl-holdings/.github/.github/workflows/reusable-hf-module-drift-check.yml@3625b7e22d38b795f1b628420607c65066082b31
    with:
      hf-repo: SZLHOLDINGS/a11oy
      mode: direct
      github-ref: a7c1646a51a43c6d754a73f82d36459f7f9663f9
      hf-ref: 918d41d1728c47c0c467dfc20e0086a88df9f43a
      dockerfile-path: Dockerfile

  live-api:
    name: Running HF Space serves governed API contracts
    needs: source-parity
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout exact GitHub source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: a7c1646a51a43c6d754a73f82d36459f7f9663f9
          persist-credentials: false
      - name: Prove the health validator fails closed
        run: python3 scripts/test_check_a11oy_api_health.py
      - name: Probe governed API contracts on the live HF Space
        run: |
          python3 scripts/check_a11oy_api_health.py \
            --target "hf=https://szlholdings-a11oy.hf.space" \
            --summary-file /tmp/a11oy-hf-relock-health.json
          cat /tmp/a11oy-hf-relock-health.json
