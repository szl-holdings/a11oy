# hf-corpus-guards-selftest.yml — Negative-fixture self-tests that GATE the
# HF verifiable-corpus guard layer (Task #775).
#
# The three guards (freshness / re-verify / card-honesty) are only trustworthy
# if their own checkers are proven to FAIL on the conditions they exist to catch
# (staleness, floor regression, tamper, signature failure, overclaim, dropped
# honesty anchor) and to PASS on honest inputs. These stdlib self-tests assert
# exactly that, offline, with a real-crypto ECDSA path when `cryptography` is
# present. A red here means a guard could silently miss a regression, so it is a
# hard gate on every change to the guard scripts / config.
#
# Org policy: only github-owned / SHA-pinned actions.
# Signed-off-by: Forge (Replit task agent) <forge@szl-holdings>

name: HF Corpus Guards — Self-test

on:
  push:
    paths:
      - 'scripts/szl_corpus_guard_common.py'
      - 'scripts/check_hf_corpus_*.py'
      - 'scripts/test_check_hf_corpus_*.py'
      - '.github/hf-corpus-guards.json'
      - '.github/workflows/hf-corpus-guards-selftest.yml'
  pull_request:
    paths:
      - 'scripts/szl_corpus_guard_common.py'
      - 'scripts/check_hf_corpus_*.py'
      - 'scripts/test_check_hf_corpus_*.py'
      - '.github/hf-corpus-guards.json'
      - '.github/workflows/hf-corpus-guards-selftest.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hf-corpus-guards-selftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    name: Run the corpus-guard negative-fixture self-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # The freshness + card self-tests are pure stdlib. The re-verify self-test
      # exercises a REAL ECDSA-P256 DSSE sign+verify path when cryptography is
      # installed (and self-skips otherwise); install it so CI runs the real
      # path, not just the stubbed-crypto chain logic.
      - name: Install cryptography (real-crypto re-verify path)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cryptography>=42.0.0"

      - name: Self-test — freshness guard
        run: python3 scripts/test_check_hf_corpus_freshness.py

      - name: Self-test — re-verify guard
        run: python3 scripts/test_check_hf_corpus_reverify.py

      - name: Self-test — card-honesty guard
        run: python3 scripts/test_check_hf_corpus_card_honesty.py
