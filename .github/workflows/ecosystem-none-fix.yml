name: Ecosystem null-safe read-only repair

on:
  pull_request:
    branches: [main]
    paths:
      - .github/scripts/apply_ecosystem_none_fix.py
      - .github/workflows/ecosystem-none-fix.yml

permissions:
  contents: write

concurrency:
  group: ecosystem-none-fix
  cancel-in-progress: false

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: frontier/command-center-readonly-20260722
          fetch-depth: 0

      - name: Apply fail-closed null-safe repair
        run: python .github/scripts/apply_ecosystem_none_fix.py

      - name: Verify focused command-center contracts
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile szl_ecosystem_routes.py tests/test_command_center_readonly_contract.py
          python -m pytest -q tests/test_command_center_readonly_contract.py
          git diff --check

      - name: Commit product correction and remove bootstrap
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/scripts/apply_ecosystem_none_fix.py \
            .github/workflows/ecosystem-none-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            szl_ecosystem_routes.py \
            tests/test_command_center_readonly_contract.py \
            .github/scripts/apply_ecosystem_none_fix.py \
            .github/workflows/ecosystem-none-fix.yml
          git commit \
            -m "fix(frontier): handle unevaluated CHAPAQ data safely" \
            -m "Keep the read-only ecosystem KPI contract non-crashing when no authorized CHAPAQ decision exists, and pin the behavior with a focused regression." \
            -m "Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin HEAD:frontier/command-center-readonly-20260722
