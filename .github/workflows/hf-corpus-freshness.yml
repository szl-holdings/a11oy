# hf-corpus-freshness.yml — Continuously prove BOTH flagship public HF datasets
# are LIVE: each chain head advanced within its expected cadence and the record
# count has not fallen below its append-only floor (Task #775).
#
# Covers SZLHOLDINGS/a11oy-verifiable-corpus + SZLHOLDINGS/killinchu-osint-corpus
# in one config-driven run (.github/hf-corpus-guards.json). A stale head or an
# emptied/rolled-back dataset fails LOUDLY: it opens/updates a single rolling
# incident issue (edge-triggered — opened on first failure, auto-closed on
# recovery) and posts a direct alert through the Slack-compatible webhook that
# routes to szl-alert-relay -> ntfy. Auth/unreachable is exit 2 (never silent
# green). Honest soft-pass only when a prefix has no floor and no head yet.
#
# Org policy: only github-owned / SHA-pinned actions; webhook via curl (no
# third-party action). workflow_dispatch runs only from the default branch.
# Signed-off-by: Forge (Replit task agent) <forge@szl-holdings>

name: HF Corpus Freshness

on:
  schedule:
    - cron: '23 */6 * * *'  # every 6h at :23
  push:
    paths:
      - 'scripts/check_hf_corpus_freshness.py'
      - 'scripts/szl_corpus_guard_common.py'
      - '.github/hf-corpus-guards.json'
      - '.github/workflows/hf-corpus-freshness.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual freshness check'

permissions:
  contents: read
  issues: write

concurrency:
  group: hf-corpus-freshness
  cancel-in-progress: false

jobs:
  freshness:
    name: Check HF corpus freshness (both datasets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run freshness guard
        id: guard
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ORG_TOKEN: ${{ secrets.HF_ORG_TOKEN }}
        run: |
          set +e
          python3 scripts/check_hf_corpus_freshness.py \
            --summary-out freshness-summary.json | tee guard.out
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"

          {
            echo "failed_items<<__EOF__"
            python3 scripts/emit_corpus_guard_findings.py freshness-summary.json
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## HF corpus freshness"
            echo ""
            echo '```'
            cat guard.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0  # the explicit gate below owns pass/fail

      - name: Upload freshness summary
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: hf-corpus-freshness-summary
          path: freshness-summary.json
          if-no-files-found: ignore

      - name: Reconcile rolling freshness incident issue
        id: incident
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          EXIT_CODE: ${{ steps.guard.outputs.exit_code }}
          FAILED_ITEMS: ${{ steps.guard.outputs.failed_items }}
        with:
          script: |
            const failed = Number(process.env.EXIT_CODE || '0') !== 0;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- hf-corpus-freshness-incident -->';
            const items = (process.env.FAILED_ITEMS || '').trim() || '(see run summary)';
            const now = new Date().toISOString();

            const q = `repo:${context.repo.owner}/${context.repo.repo} in:body "${marker}" label:hf-corpus-guard`;
            const res = await github.rest.search.issuesAndPullRequests({ q, sort: 'created', order: 'desc', per_page: 5 });
            const existing = res.data.items.find(i => !i.pull_request) || null;

            if (failed) {
              const body = `## HF Corpus Freshness Incident\n\n${marker}\n` +
                `**State:** FAILING\n**Detected:** ${now}\n**Run:** ${runUrl}\n\n` +
                `One or more flagship HF datasets are stale or have dropped below ` +
                `their append-only floor (or are unreachable / auth-failing):\n\n` +
                `${items}\n\n` +
                `Single rolling incident; updates in place and auto-closes on recovery.`;
              let incident = existing;
              if (existing) {
                if (existing.state === 'closed') {
                  await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'open' });
                }
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number,
                  body: `Still FAILING as of ${now}.\n\n${items}\nRun: ${runUrl}` });
              } else {
                const created = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo,
                  title: '[HF-CORPUS] Flagship dataset stale or below floor', body, labels: ['hf-corpus-guard', 'incident'] });
                incident = created.data;
              }
              if (incident) {
                core.setOutput('issue_number', String(incident.number));
                core.setOutput('issue_url', incident.html_url);
              }
            } else if (existing && existing.state === 'open') {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number,
                body: `Recovered: all flagship datasets are fresh and above floor again as of ${now}.\nAuto-closing this rolling incident.\nRun: ${runUrl}` });
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'closed' });
            }

      - name: Alert the team directly on freshness failure
        if: ${{ always() && steps.guard.outputs.exit_code != '0' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ISSUE_URL: ${{ steps.incident.outputs.issue_url }}
          ISSUE_NUMBER: ${{ steps.incident.outputs.issue_number }}
          REPO: ${{ github.repository }}
          EXIT_CODE: ${{ steps.guard.outputs.exit_code }}
          FAILED_ITEMS: ${{ steps.guard.outputs.failed_items }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not configured — skipping direct alert. The failed run and the rolling incident issue still stand."
            exit 0
          fi
          if [ -n "${ISSUE_URL}" ]; then
            issue_line="Incident issue: #${ISSUE_NUMBER} ${ISSUE_URL}"
          else
            issue_line="Incident issue: (could not be resolved this run)"
          fi
          if [ "${EXIT_CODE}" = "2" ]; then
            headline="a flagship HF dataset is UNREACHABLE or auth-failing (could not verify freshness)"
          else
            headline="a flagship HF dataset is STALE or below its append-only floor"
          fi
          items="${FAILED_ITEMS}"
          [ -z "${items}" ] && items="(see run summary)"
          text=":rotating_light: *HF corpus freshness FAILED* — ${headline} in ${REPO}.
          *Affected:*
          ${items}
          *Failing run:* ${RUN_URL}
          *${issue_line}*"
          payload=$(jq -n --arg text "$text" '{text: $text}')
          code=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' \
                   -X POST -H 'Content-Type: application/json' \
                   --max-time 20 --data "${payload}" "${SLACK_WEBHOOK_URL}")
          echo "Webhook responded HTTP ${code}."
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::Direct alert webhook POST failed (HTTP ${code}): $(cat /tmp/resp.txt)"
            exit 1
          fi
          echo "Direct alert delivered."

      - name: Fail the run on any freshness violation or error
        if: always()
        run: |
          code="${{ steps.guard.outputs.exit_code }}"
          if [ "${code}" = "1" ]; then
            echo "::error::A flagship HF dataset is stale or below its append-only floor."
            exit 1
          fi
          if [ "${code}" != "0" ]; then
            echo "::error::Freshness guard errored (exit ${code}) — auth/unreachable/malformed."
            exit 1
          fi
          echo "All flagship HF datasets are fresh and above floor."
