name: Sync backend to HuggingFace Space

# hf-sync-backend (drift-fix, Task: auto-sync backend serve.py to the HF Space):
# The HF Space Dockerfile COPYs serve.py and ~100 other backend .py modules FROM
# the Space repo, but the sibling hf-sync.yml only mirrors README.md + the
# plain-text front-door files (pages/*.html, console/*.{html,js}). So any backend
# change (serve.py, a szl_*.py module, a new endpoint) had to be pushed to the
# Space MANUALLY via huggingface_hub create_commit, or the Space kept building from
# a STALE backend (new /console endpoints 404'd there). This workflow closes that
# gap: on a push to main that touches any .py or the Dockerfile, it parses the
# Dockerfile's COPY directives, expands them to the exact set of .py files the image
# is built from (plus serve.py and the Dockerfile itself), and mirrors ONLY the
# files whose content differs from the Space's current copy (git-blob-OID compare,
# so an unchanged set is a true no-op and never triggers a needless Space rebuild).
#
# It is the AUTO-PUSH companion to hf-module-drift-check.yml (which only DETECTS
# GitHub<->Space drift). It deliberately mirrors ONLY .py source + the Dockerfile;
# the built SPA bundles / vendor blobs are large/possibly-LFS and are handled
# elsewhere (front-door sync) or already baked on the Space — re-syncing them here
# would reintroduce the documented LFS/pre-receive failures.
#
# delete-aware backend sync (drift-fix): the mirror used to be add/update-only, so a
# backend module DELETED from the repo AND dropped from the Dockerfile COPY set left a
# stale .py lingering in the Space tree forever (harmless to the built image, but the
# Space tree drifts from GitHub and confuses hf-module-drift-check). hf_sync_backend.py
# now also diffs the Space's current .py tree against the computed mirror set and emits
# a delete (in the SAME create_commit) for any backend .py no longer in the mirror.
# Deletion is scoped to backend .py ONLY — files whose directory this sync actually
# populates (derived from the mirror set itself) OR whose directory is not a protected
# front-door/built-asset/vendor location. The latter sweeps a backend .py whose ENTIRE
# directory was removed from the repo + Dockerfile COPY set (so the dir no longer appears
# in the mirror at all): the orphan is still cleaned up instead of lingering. It never
# touches README, the front-door pages/*.{html,js} + console/*.{html,js} owned by
# hf-sync.yml, the built SPA bundles (console/assets, console/static), or LFS/vendor
# blobs (static/, static-vendor/, static/vendor3d, etc.). An in-sync repo stays a true
# no-op (no changes + no deletions => no commit).
#
# The push logic lives in .github/scripts/hf_sync_backend.py (extracted from the old
# inline heredoc) so the SAME code is exercised by the network-free self-test
# .github/scripts/test_hf_sync_backend.py (run in tests.yml). The self-test proves
# the OID-diff selection only pushes changed files — the push path is no longer
# observed solely on the "already in sync -> no-op" branch.
#
# Credential: the SAME repo secret hf-sync.yml uses (HF_TOKEN — HF write token with
# org write to SZLHOLDINGS). Git-free create_commit path (no LFS, no git history).

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "*.py"
      - "Dockerfile"
      - ".github/workflows/hf-sync-backend.yml"
      - ".github/scripts/hf_sync_backend.py"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync-backend-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          lfs: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.25"
      - name: Mirror Dockerfile-COPY'd backend .py files to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_ID: SZLHOLDINGS/a11oy
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::HF_TOKEN secret is not set on this repo — cannot push to the HuggingFace Space."
            echo "::error::Founder action required: add repo secret HF_TOKEN (HF write token with org write to SZLHOLDINGS)."
            exit 1
          fi
          python3 .github/scripts/hf_sync_backend.py
