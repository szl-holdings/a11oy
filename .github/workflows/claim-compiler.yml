name: Claim Compiler contract

on:
  push:
    branches: [main]
    paths:
      - "serve.py"
      - "szl_claim_rupture_gate.py"
      - "szl_public_claim_manifest.py"
      - "schemas/evidenceos/claim-*.v1.schema.json"
      - "schemas/evidenceos/public-claim-*.v1.schema.json"
      - "scripts/check_public_claim_manifest.py"
      - "scripts/verify_public_claim_github_job.py"
      - "artifacts/evidenceos/manifests/**"
      - "artifacts/evidenceos/receipts/**"
      - "static/3d/surfaces/integritycontrol.js"
      - "tests/test_claim_rupture_gate.py"
      - "tests/test_claim_compiler_routes.py"
      - "tests/test_integrity_control_surface.py"
      - "tests/test_public_claim_manifest.py"
      - ".github/requirements/ci-core.txt"
      - ".github/requirements/ci-core.in"
      - ".github/workflows/release.yml"
      - ".github/workflows/claim-compiler.yml"
  pull_request:
    branches: [main, agent/evidenceos-claim-wave36]
    paths:
      - "serve.py"
      - "szl_claim_rupture_gate.py"
      - "szl_public_claim_manifest.py"
      - "schemas/evidenceos/claim-*.v1.schema.json"
      - "schemas/evidenceos/public-claim-*.v1.schema.json"
      - "scripts/check_public_claim_manifest.py"
      - "scripts/verify_public_claim_github_job.py"
      - "artifacts/evidenceos/manifests/**"
      - "artifacts/evidenceos/receipts/**"
      - "static/3d/surfaces/integritycontrol.js"
      - "tests/test_claim_rupture_gate.py"
      - "tests/test_claim_compiler_routes.py"
      - "tests/test_integrity_control_surface.py"
      - "tests/test_public_claim_manifest.py"
      - ".github/requirements/ci-core.txt"
      - ".github/requirements/ci-core.in"
      - ".github/workflows/release.yml"
      - ".github/workflows/claim-compiler.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claim-compiler:
    name: bounded route and core contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install pinned test dependencies
        run: python -m pip install --require-hashes -r .github/requirements/ci-core.txt
      - name: Compile owned Python boundaries
        run: python -m py_compile szl_claim_rupture_gate.py szl_public_claim_manifest.py serve.py scripts/check_public_claim_manifest.py scripts/verify_public_claim_github_job.py tests/test_claim_compiler_routes.py
      - name: Validate owned JSON schemas and JavaScript syntax
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          paths = {
              *Path("schemas/evidenceos").glob("claim-*.v1.schema.json"),
              *Path("schemas/evidenceos").glob("public-claim-*.v1.schema.json"),
          }
          for path in sorted(paths):
              schema = json.loads(path.read_text(encoding="utf-8"))
              Draft202012Validator.check_schema(schema)
          PY
          node --check static/3d/surfaces/integritycontrol.js
      - name: Run Claim Compiler contract suite
        run: >-
          python -m pytest -q
          tests/test_claim_rupture_gate.py
          tests/test_claim_compiler_routes.py
          tests/test_integrity_control_surface.py
          tests/test_public_claim_manifest.py
