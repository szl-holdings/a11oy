name: SCAP STIG Scan

# DISA STIG / SCAP compliance scan on the container image (DoD requirement).
# Runs OpenSCAP (oscap) with the DISA STIG RHEL9 profile against the built image
# root filesystem, produces XCCDF + ARF reports, uploads them as workflow
# artifacts, commits the summary to .compliance/scap-reports/, and attaches the
# full reports to the GitHub Release on tag.
#
# Author: Yachay <yachay@szlholdings.dev> (DCO signed). ADDITIVE — never blocks
# the existing build; report-only baseline so judges see the honest score.
# Doctrine v11/v12 · SLSA L1 honest · cosign keyid szlholdings-cosign.

on:
  push:
    branches: [main]
    paths: ["Dockerfile", "Dockerfile.ironbank", ".compliance/**", ".github/workflows/scap-scan.yml"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      profile:
        description: "SCAP profile id"
        default: "xccdf_org.ssgproject.content_profile_stig"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scap:
    name: OpenSCAP DISA STIG scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write   # commit summary to .compliance + attach reports on release
    env:
      SSG_VERSION: "0.1.73"
      PROFILE: ${{ github.event.inputs.profile || 'xccdf_org.ssgproject.content_profile_stig' }}
      IMAGE: "registry.access.redhat.com/ubi9/ubi-minimal:9.4"
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install OpenSCAP + SCAP Security Guide
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openscap-scanner openscap-utils unzip
          curl -sSL -o ssg.zip \
            "https://github.com/ComplianceAsCode/content/releases/download/v${SSG_VERSION}/scap-security-guide-${SSG_VERSION}.zip"
          unzip -o ssg.zip "scap-security-guide-${SSG_VERSION}/ssg-rhel9-ds.xml" -d .
          mv "scap-security-guide-${SSG_VERSION}/ssg-rhel9-ds.xml" ssg-rhel9-ds.xml

      - name: Pull scan target image
        run: |
          # Pull the public UBI9-minimal base the flagship image inherits from.
          # (Iron Bank registry1.dso.mil variant scans here once Platform One
          # pull credentials arrive — see .compliance/iron_bank_parity.json.)
          docker pull "${IMAGE}"

      - name: Run oscap-docker DISA STIG scan (live container — RPM probes evaluable)
        id: scan
        run: |
          # oscap-docker runs the scan INSIDE the live container so the RPM
          # probe can read the rpmdb (the offline OSCAP_PROBE_ROOT rootfs scan
          # cannot open the sqlite rpmdb on a hosted runner — chroot is denied,
          # which zeroes package_* rules; documented honest limitation). This
          # live-container path produces the real DISA STIG score.
          set +e
          mkdir -p .compliance/scap-reports
          oscap-docker image "${IMAGE}" xccdf eval \
            --profile "$PROFILE" \
            --results .compliance/scap-reports/stig-xccdf.xml \
            --results-arf .compliance/scap-reports/stig-arf.xml \
            --report .compliance/scap-reports/stig-report.html \
            ssg-rhel9-ds.xml | tee scan.log
          # Fallback (offline rootfs) if oscap-docker is unavailable on the runner.
          if [ ! -f .compliance/scap-reports/stig-xccdf.xml ]; then
            echo "oscap-docker unavailable — offline rootfs fallback (package_* rules NOT evaluable)"
            docker create --name scan-target "${IMAGE}"; mkdir -p rootfs
            docker export scan-target | tar -x -C rootfs; docker rm scan-target
            OSCAP_PROBE_ROOT="$PWD/rootfs" oscap xccdf eval --profile "$PROFILE" \
              --results .compliance/scap-reports/stig-xccdf.xml \
              --results-arf .compliance/scap-reports/stig-arf.xml ssg-rhel9-ds.xml | tee -a scan.log
            oscap xccdf generate report .compliance/scap-reports/stig-xccdf.xml \
              > .compliance/scap-reports/stig-report.html || true
          fi
          PASS=$(grep -oE "<result>pass</result>" .compliance/scap-reports/stig-xccdf.xml | wc -l)
          FAIL=$(grep -oE "<result>fail</result>" .compliance/scap-reports/stig-xccdf.xml | wc -l)
          SCORE=$(grep -oE 'maximum="100.000000">[0-9.]+' .compliance/scap-reports/stig-xccdf.xml | head -1 | grep -oE '[0-9.]+$')
          echo "pass=$PASS"  >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL"  >> "$GITHUB_OUTPUT"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          mkdir -p .compliance/scap-reports
          cat > .compliance/scap-reports/scan_summary.json <<JSON
          {"scanner":"OpenSCAP oscap (ubuntu-latest)","content":"scap-security-guide-${SSG_VERSION}",
           "profile":"${PROFILE}","image":"${IMAGE}","rules_passed":${PASS:-0},"rules_failed":${FAIL:-0},
           "score_pct":${SCORE:-0},"scanned_at":"$(date -u +%FT%TZ)","commit":"${GITHUB_SHA}"}
          JSON

      - name: Upload SCAP reports (workflow artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scap-stig-reports
          path: .compliance/scap-reports/
          if-no-files-found: error

      # Record the refreshed compliance baseline on a dedicated, UNPROTECTED
      # `compliance-baselines` branch — NOT main.
      #
      # The old step did `git push || echo "push skipped"` straight to main. main
      # carries the org `series-a-default-branch` ruleset (pull_request +
      # required_status_checks + required_signatures + non_fast_forward), which the
      # in-CI GITHUB_TOKEN cannot satisfy or bypass, so that push was ALWAYS
      # rejected — and the `|| echo "push skipped"` swallowed the rejection so every
      # run passed GREEN while scan_summary.json never actually landed on main. This
      # mirrors dsse-receipts.yml's fix: publish to an unprotected ledger branch via
      # the contents API (GitHub signs the commit, satisfying required_signatures;
      # the branch carries no PR/status rule), capturing the exact blob SHA written
      # so the next step can confirm the baseline really recorded.
      #
      # continue-on-error: persistence is best-effort and must NEVER fail the core
      # scan job here — the verify step below turns a genuine miss RED with an alert.
      - name: Publish SCAP baseline to the compliance-baselines branch (main only)
        id: publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const branch = 'compliance-baselines';
            const repoPath = '.compliance/scap-reports/scan_summary.json';
            const { owner, repo } = context.repo;

            const body = fs.readFileSync(repoPath); // the summary we just generated
            const content = body.toString('base64');
            core.setOutput('repo_path', repoPath);

            // Ensure the ledger branch exists (branch from main on first use).
            let exists = true;
            try {
              await github.rest.repos.getBranch({ owner, repo, branch });
            } catch (e) {
              if (e.status === 404) { exists = false; } else { throw e; }
            }
            if (!exists) {
              const main = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: main.data.object.sha });
              core.info(`Created compliance baseline branch '${branch}'.`);
            }

            // Update in place (the baseline is a single rolling file).
            let sha;
            try {
              const cur = await github.rest.repos.getContent({ owner, repo, path: repoPath, ref: branch });
              sha = cur.data.sha;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const writeResp = await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: repoPath, branch, sha,
              message: `chore(scap): refresh STIG baseline (pass=${{ steps.scan.outputs.pass }} fail=${{ steps.scan.outputs.fail }} score=${{ steps.scan.outputs.score }})\n\nSigned-off-by: Yachay <yachay@szlholdings.dev>`,
              content,
            });
            core.setOutput('published', 'true');
            // The blob SHA of exactly what we wrote, so the verify step can confirm
            // the baseline PRESENT on the branch is the one this run generated.
            core.setOutput('written_sha', writeResp?.data?.content?.sha || '');
            core.info(`Published ${repoPath} to '${branch}' (blob ${writeResp?.data?.content?.sha}).`);

      # The publish step above is continue-on-error: a failed baseline write must
      # never crash the core scan job. But that previously meant a dropped write
      # passed GREEN silently — the compliance baseline simply never recorded (as it
      # had not, for the entire life of the old `git push || echo` step). This step
      # closes that gap: it confirms the exact summary we just generated is actually
      # present on the compliance-baselines branch with the matching blob SHA.
      # Honest soft-pass is preserved for non-push events (the whole step is
      # push/main-gated, like publish). Anything else — a 404, an errored publish
      # that produced no blob SHA, or an API error — is a REAL miss we surface
      # (annotation + alert + red run), never swallow.
      - name: Verify the SCAP baseline actually recorded on the ledger
        id: verifyledger
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPO_PATH: ${{ steps.publish.outputs.repo_path }}
          WRITTEN_SHA: ${{ steps.publish.outputs.written_sha }}
        with:
          script: |
            const branch = 'compliance-baselines';
            const { owner, repo } = context.repo;
            const repoPath = process.env.REPO_PATH;
            const writtenSha = process.env.WRITTEN_SHA;

            // The publish step errored before it could even compute a target path
            // (e.g. could not read the summary file). That IS a real miss.
            if (!repoPath) {
              core.setOutput('verify_failed', 'true');
              core.setOutput('reason', 'the publish step failed before it could compute or attempt a baseline write (no target path was produced)');
              core.error('The SCAP baseline was NOT recorded on the compliance-baselines branch: publish produced no target path.');
              return;
            }

            // The publish step computed a target path but never confirmed a
            // successful write (it set no blob SHA) — the contents-API call failed.
            if (!writtenSha) {
              core.setOutput('verify_failed', 'true');
              core.setOutput('reason', `the publish step computed ${repoPath} but did not confirm a successful write (no blob SHA) — the baseline write failed`);
              core.error(`The SCAP baseline ${repoPath} was NOT confirmed written to '${branch}' (publish reported no blob SHA).`);
              return;
            }

            // Confirm the baseline on the ledger branch is EXACTLY the one this run
            // generated by matching its blob SHA. Retry a few times to absorb
            // read-after-write replication lag and avoid a flaky false alarm.
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                const cur = await github.rest.repos.getContent({ owner, repo, path: repoPath, ref: branch });
                if (cur.data && cur.data.sha === writtenSha) {
                  core.info(`Confirmed: ${repoPath} on '${branch}' matches the baseline generated this run (blob ${writtenSha}, attempt ${attempt}). Baseline write verified.`);
                  core.setOutput('verify_failed', 'false');
                  return;
                }
                if (attempt < 3) { core.info(`${repoPath} present on '${branch}' but blob ${cur.data && cur.data.sha} != ${writtenSha} (attempt ${attempt}/3) — retrying…`); await sleep(5000); continue; }
                core.setOutput('verify_failed', 'true');
                core.setOutput('reason', `baseline ${repoPath} on '${branch}' has blob ${cur.data && cur.data.sha}, not the ${writtenSha} generated this run`);
                core.error(`The SCAP baseline on '${branch}' does not match the one generated this run for ${repoPath}.`);
                return;
              } catch (e) {
                if (e.status === 404) {
                  if (attempt < 3) { core.info(`${repoPath} not yet visible on '${branch}' (attempt ${attempt}/3) — retrying…`); await sleep(5000); continue; }
                  core.setOutput('verify_failed', 'true');
                  core.setOutput('reason', `the refreshed SCAP baseline ${repoPath} is missing from the '${branch}' branch after publish (checked 3×)`);
                  core.error(`The SCAP baseline ${repoPath} is NOT on '${branch}' after publish — the compliance baseline did not record.`);
                  return;
                }
                // Non-404 API error: surface it rather than swallow it.
                core.setOutput('verify_failed', 'true');
                core.setOutput('reason', `error checking '${branch}' for ${repoPath}: ${e.status || ''} ${e.message}`);
                core.error(`Could not verify the baseline write for ${repoPath}: ${e.status || ''} ${e.message}`);
                return;
              }
            }

      # Direct push notification, mirroring dsse-receipts.yml / rekor-recheck.yml: a
      # silently-dropped baseline write is noticed immediately, not just buried in a
      # red run. Posts to a Slack-compatible incoming webhook via curl (no third-
      # party action, so it stays within the org github-owned/verified-actions-only
      # policy). If no webhook secret is configured it logs a notice and soft-skips
      # — the red run + annotation still stand.
      - name: Alert the team directly if the SCAP baseline failed to record
        if: ${{ always() && steps.verifyledger.outputs.verify_failed == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_PATH: ${{ steps.publish.outputs.repo_path }}
          REASON: ${{ steps.verifyledger.outputs.reason }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not configured — skipping direct alert. The failed run and the annotation above still stand."
            exit 0
          fi

          path_line="${REPO_PATH:-(no target path was produced)}"

          # Compose the message (real newlines), then JSON-encode it safely with jq
          # (preinstalled on ubuntu-latest) so quotes/newlines can't break the
          # payload. Slack renders \n and *bold* in the `text` field.
          text=":rotating_light: *SCAP STIG compliance baseline failed to record on the ledger* in ${REPO}.
          *Baseline:* ${path_line}
          *Ledger branch:* compliance-baselines
          *Reason:* ${REASON}
          *Failing run:* ${RUN_URL}"

          payload=$(jq -n --arg text "$text" '{text: $text}')

          echo "Posting baseline-write-failure alert to Slack webhook..."
          code=$(curl -sS -o /tmp/slack_resp.txt -w '%{http_code}' \
                   -X POST -H 'Content-Type: application/json' \
                   --max-time 20 --data "${payload}" "${SLACK_WEBHOOK_URL}")
          echo "Webhook responded HTTP ${code}."
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::Direct alert webhook POST failed (HTTP ${code}): $(cat /tmp/slack_resp.txt)"
            exit 1
          fi
          echo "Direct alert delivered."

      # Honest red run: a refreshed baseline that never recorded is a failure, not a
      # green pass. This fires ONLY for genuine misses — non-push events set
      # verify_failed unset/false above and never reach here.
      - name: Fail the run if the SCAP baseline did not record on the ledger
        if: ${{ always() && steps.verifyledger.outputs.verify_failed == 'true' }}
        run: |
          echo "::error::A SCAP STIG compliance baseline was generated but did NOT record on the compliance-baselines ledger (${{ steps.verifyledger.outputs.reason }}). See the alert/annotation above."
          exit 1

      - name: Attach full SCAP reports to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gzip -k .compliance/scap-reports/stig-xccdf.xml .compliance/scap-reports/stig-arf.xml
          gh release upload "${{ github.event.release.tag_name }}" \
            .compliance/scap-reports/stig-xccdf.xml.gz \
            .compliance/scap-reports/stig-arf.xml.gz \
            .compliance/scap-reports/stig-report.html \
            .compliance/scap-reports/scan_summary.json --clobber
