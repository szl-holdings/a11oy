name: Dockerfile build-file guard

# Catches the silent drift where a `COPY foo ...` line is added to the
# Dockerfile but `foo` is never committed (or a referenced file is later
# deleted while the COPY line stays). A fresh `git clone` + `docker build`
# dies at the first missing COPY source — exactly the breakage that left
# szl-holdings/a11oy + killinchu unbuildable for months before task #205.
#
# The lightweight static check (copy-sources) runs on every push/PR to main.
# A full `docker build` runs weekly (and on manual dispatch) to catch deeper
# breakage the static parser cannot see.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC — deeper full-build check
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  copy-sources:
    name: COPY/ADD sources exist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Verify every Dockerfile COPY/ADD source exists
        run: python3 .github/dockerfile-copy-check.py Dockerfile .

  docker-build:
    name: Full docker build (scheduled)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
