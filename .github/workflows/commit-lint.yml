name: Conventional Commits PR title lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Lint PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        env:
          # Passed via env (never interpolated into the script) to avoid injection.
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          # Conventional Commits types allowed
          types='feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert'

          # <type>(optional-scope)(optional !): <subject>
          header_re="^(${types})(\([a-z0-9._/-]+\))?(!)?: .+$"

          if [[ ! "${PR_TITLE}" =~ ${header_re} ]]; then
            echo "::error::PR title \"${PR_TITLE}\" is not a valid Conventional Commit."
            echo "Expected format: <type>(optional-scope): <subject>"
            echo "Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi

          # Subject must not start with an upper-case letter
          subject="${PR_TITLE#*: }"
          if [[ "${subject}" =~ ^[A-Z] ]]; then
            echo "::error::The subject \"${subject}\" does not match the required pattern. Please use lower-case for the subject."
            exit 1
          fi

          echo "PR title OK: ${PR_TITLE}"
