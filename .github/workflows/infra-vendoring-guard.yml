name: infra vendoring guard

# Stops a11oy from silently growing stale copies of other szl-holdings repos.
#
# Task #547 removed the vendored copies of the deployment repos
# (infra/uds-deployment, infra/uds-mesh, infra/uds-bundles) because they were
# drifting from canonical and re-introducing stale guidance, leaving only small
# pointer READMEs. This guard fails the build if:
#   - one of those pointer dirs is re-vendored into a full repo copy, or
#   - a brand-new full copy of an external repo is added under infra/.
#
# It is additive and does not fire on the legitimate pointer READMEs or on the
# vendored copies that already existed (allowlisted in the script).
#
# See scripts/check_infra_vendoring.py for the policy and
# scripts/check_infra_vendoring.test.sh for the negative-fixture self-test.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: No re-vendored repos under infra/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Self-test the guard (negative fixtures)
        run: bash scripts/check_infra_vendoring.test.sh
      - name: Check infra/ for re-vendored / new repo copies
        run: python3 scripts/check_infra_vendoring.py --infra infra
