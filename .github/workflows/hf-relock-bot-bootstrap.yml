name: Repair bot-authored HF relock commit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/hf-relock-bot-bootstrap.yml"

permissions:
  contents: write

jobs:
  repair:
    name: Rebuild independently reviewable relock commit
    if: >-
      github.event.pull_request.number == 987 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor == 'stephenlutar2-hash'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BOT_BRANCH: automation/hf-relock-authority-20260720
      BASE_SHA: a7c1646a51a43c6d754a73f82d36459f7f9663f9
      EXPECTED_LOCK_SHA256: f2b77336f2f2a682949d4d8cd0c3fbafc7cf58f09790767c0ca94c04d6c2002c
      EXPECTED_EVIDENCE_SHA256: 2e159b27853f97db6d6bd2a8d3b5297504aabb704d199a2b4287af89006a049e
    steps:
      - name: Checkout exact reviewed candidate source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false

      - name: Checkout exact protected base
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.BASE_SHA }}
          path: bot
          fetch-depth: 1

      - name: Validate source bytes and rebuild one signed-off bot commit
        run: |
          set -euo pipefail
          lock_sha=$(sha256sum candidate/.github/hf-deployment-lock.json | awk '{print $1}')
          evidence_sha=$(sha256sum candidate/.github/workflows/hf-relock-evidence.yml | awk '{print $1}')
          test "$lock_sha" = "$EXPECTED_LOCK_SHA256"
          test "$evidence_sha" = "$EXPECTED_EVIDENCE_SHA256"

          cd bot
          git fetch --no-tags origin "$BOT_BRANCH:refs/remotes/origin/$BOT_BRANCH"
          old_remote=$(git rev-parse "refs/remotes/origin/$BOT_BRANCH")
          test "$(git rev-parse HEAD)" = "$BASE_SHA"

          git switch -C "$BOT_BRANCH"
          cp ../candidate/.github/hf-deployment-lock.json .github/hf-deployment-lock.json
          cp ../candidate/.github/workflows/hf-relock-evidence.yml .github/workflows/hf-relock-evidence.yml
          git add .github/hf-deployment-lock.json .github/workflows/hf-relock-evidence.yml

          changed=$(git diff --cached --name-only | sort)
          expected=$(printf '%s\n' \
            .github/hf-deployment-lock.json \
            .github/workflows/hf-relock-evidence.yml | sort)
          test "$changed" = "$expected"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit \
            -m "fix(ci): re-lock verified running HF deployment" \
            -m "Created from the independently green evidence in #987 so the founder can provide the required non-self review." \
            -m "Refs #986" \
            -m "Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

          test "$(git rev-parse HEAD^)" = "$BASE_SHA"
          git push \
            --force-with-lease="refs/heads/$BOT_BRANCH:$old_remote" \
            origin "HEAD:refs/heads/$BOT_BRANCH"
