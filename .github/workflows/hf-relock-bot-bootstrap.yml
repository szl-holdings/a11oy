name: Bootstrap bot-authored HF relock PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/hf-relock-bot-bootstrap.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  bootstrap:
    name: Create independently reviewable relock PR
    if: >-
      github.event.pull_request.number == 987 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor == 'stephenlutar2-hash'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BOT_BRANCH: automation/hf-relock-authority-20260720
      BASE_SHA: a7c1646a51a43c6d754a73f82d36459f7f9663f9
      EXPECTED_LOCK_SHA256: f2b77336f2f2a682949d4d8cd0c3fbafc7cf58f09790767c0ca94c04d6c2002c
      EXPECTED_EVIDENCE_SHA256: 2e159b27853f97db6d6bd2a8d3b5297504aabb704d199a2b4287af89006a049e
    steps:
      - name: Checkout exact bot-authored candidate branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.BOT_BRANCH }}
          path: bot
          fetch-depth: 2
          persist-credentials: false

      - name: Validate exact branch ancestry, paths, and bytes
        run: |
          set -euo pipefail
          cd bot
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          test "$(git rev-parse HEAD^)" = "$BASE_SHA"
          changed=$(git diff --name-only "$BASE_SHA" HEAD | sort)
          expected=$(printf '%s\n' \
            .github/hf-deployment-lock.json \
            .github/workflows/hf-relock-evidence.yml | sort)
          test "$changed" = "$expected"
          lock_sha=$(sha256sum .github/hf-deployment-lock.json | awk '{print $1}')
          evidence_sha=$(sha256sum .github/workflows/hf-relock-evidence.yml | awk '{print $1}')
          test "$lock_sha" = "$EXPECTED_LOCK_SHA256"
          test "$evidence_sha" = "$EXPECTED_EVIDENCE_SHA256"

      - name: Read current repository workflow permissions
        id: current
        env:
          ADMIN_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${ADMIN_TOKEN:-}"
          response=$(curl --fail-with-body -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/permissions/workflow")
          default_permission=$(jq -r '.default_workflow_permissions' <<<"$response")
          can_approve=$(jq -r '.can_approve_pull_request_reviews' <<<"$response")
          case "$default_permission" in read|write) ;; *) exit 1 ;; esac
          case "$can_approve" in true|false) ;; *) exit 1 ;; esac
          echo "default_permission=$default_permission" >> "$GITHUB_OUTPUT"
          echo "can_approve=$can_approve" >> "$GITHUB_OUTPUT"

      - name: Temporarily permit GitHub Actions PR creation
        env:
          ADMIN_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
          DEFAULT_PERMISSION: ${{ steps.current.outputs.default_permission }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/permissions/workflow" \
            -d "$(jq -nc --arg p "$DEFAULT_PERMISSION" '{default_workflow_permissions:$p,can_approve_pull_request_reviews:true}')"

      - name: Open bot-authored pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BOT_BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Bot-authored PR already exists: #$existing"
            exit 0
          fi
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BOT_BRANCH" \
            --base main \
            --title "fix(ci): re-lock verified running Hugging Face deployment" \
            --body-file - <<'EOF'
          ## Purpose

          Bot-authored equivalent of #987, created so the founder can provide the required independent write-level review without using Carlota-1 or weakening branch protection.

          ## Exact verified pair

          - GitHub: `a7c1646a51a43c6d754a73f82d36459f7f9663f9`
          - Hugging Face source/runtime: `918d41d1728c47c0c467dfc20e0086a88df9f43a`

          The included fail-closed workflow verifies the exact lock bytes, zero managed-file drift, validator negative controls, and live governed API contracts. The bridge independently verified that the bot branch is exactly one commit over the protected base, changes exactly two approved paths, and matches both SHA-256 pins.

          Refs #986. Supersedes #987 after checks and founder review.
          EOF

      - name: Restore exact repository workflow permissions
        if: always() && steps.current.outcome == 'success'
        env:
          ADMIN_TOKEN: ${{ secrets.SZL_GITHUB_TOKEN }}
          DEFAULT_PERMISSION: ${{ steps.current.outputs.default_permission }}
          CAN_APPROVE: ${{ steps.current.outputs.can_approve }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/permissions/workflow" \
            -d "$(jq -nc --arg p "$DEFAULT_PERMISSION" --argjson a "$CAN_APPROVE" '{default_workflow_permissions:$p,can_approve_pull_request_reviews:$a}')"
