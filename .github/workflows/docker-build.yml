name: Container build (Dockerfile)

# Builds the root Dockerfile, generates an image SBOM, and on tag releases
# pushes a signed (cosign keyless / OIDC) image to GHCR.
#
# Design choices (Series-A supply-chain posture):
#   * PR + push-to-main builds the image and verifies it boots (--version /
#     --help) but does NOT push to the registry, so the registry is not bloated
#     by every main commit.
#   * Only `release: published` events push to ghcr.io/szl-holdings/a11oy and
#     sign the image. No tag is moved by this workflow.
#   * Image provenance: an SBOM (CycloneDX + SPDX) is produced with anchore/syft
#     for every build and uploaded as an artifact; on release it is attached to
#     the published image via cosign attach.
#
# L1 fix (2026-05-31): REVISION build-arg is now passed as github.sha so that
# the runtime ENV A11OY_GIT_SHA is populated in the container and /healthz
# returns the real deployed SHA. Reference: red-team finding L1.
#
# Cosign keyless verification (no stored key; GitHub OIDC + Fulcio + Rekor):
#   cosign verify \
#     --certificate-identity-regexp \
#       "https://github.com/szl-holdings/a11oy/.github/workflows/docker-build.yml.*" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     ghcr.io/szl-holdings/a11oy:<tag>
#
# References:
#   docker/build-push-action: https://github.com/docker/build-push-action
#   anchore/sbom-action:       https://github.com/anchore/sbom-action
#   cosign keyless:            https://docs.sigstore.dev/cosign/signing/overview/

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

env:
  IMAGE: ghcr.io/szl-holdings/a11oy

jobs:
  build:
    name: Build image + SBOM (sign & push on release only)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push to GHCR (only on release; see `push:` below)
      id-token: write        # cosign keyless OIDC token
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Derive image version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="0.0.0-dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (release only)
        if: github.event_name == 'release'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (push only on release)
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: Dockerfile
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            REVISION=${{ github.sha }}
          # Push only on a published release; load into the local daemon
          # otherwise so the smoke test below can run.
          push: ${{ github.event_name == 'release' }}
          load: ${{ github.event_name != 'release' }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image (non-release builds)
        if: github.event_name != 'release'
        run: |
          echo "=== --version ==="
          docker run --rm "${{ env.IMAGE }}:${{ steps.ver.outputs.version }}" --version
          echo "=== --help ==="
          docker run --rm "${{ env.IMAGE }}:${{ steps.ver.outputs.version }}" --help

      - name: Generate image SBOM (CycloneDX + SPDX) via Syft
        if: github.event_name != 'release'
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          image: ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          format: cyclonedx-json
          output-file: a11oy-image-sbom.cyclonedx.json
          upload-artifact: true

      - name: Install cosign (release only)
        if: github.event_name == 'release'
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image with cosign keyless (release only)
        if: github.event_name == 'release'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign sign --yes "${{ env.IMAGE }}@${DIGEST}"
          echo "Signed ${{ env.IMAGE }}@${DIGEST} (keyless OIDC)."

      - name: Generate + attach image SBOM on release (signed)
        if: github.event_name == 'release'
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          image: ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          format: cyclonedx-json
          output-file: a11oy-image-sbom.cyclonedx.json
          upload-artifact: true
