name: Actions Heartbeat 20260722

on:
  push:
    branches: [ops/actions-heartbeat-20260722]
    paths:
      - .github/workflows/actions-heartbeat-20260722.yml

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ops/actions-heartbeat-20260722
          persist-credentials: true
          fetch-depth: 0
      - name: Record execution and self-remove
        run: |
          set -euo pipefail
          printf 'run_id=%s\nhead_sha=%s\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" > actions-heartbeat-20260722.txt
          git rm .github/workflows/actions-heartbeat-20260722.yml
          git add actions-heartbeat-20260722.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit \
            -m 'chore(ci): record branch workflow heartbeat' \
            -m 'Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          git push origin HEAD:ops/actions-heartbeat-20260722
