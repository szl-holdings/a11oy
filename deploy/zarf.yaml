# SZL Holdings — A11oy Zarf package
# Authored by: Lutar, Stephen P. · ORCID 0009-0001-0110-4173 · SZL Holdings
# Status: Real package. Promoted from docs/proposals/defense-unicorns/skeletons/zarf.yaml
#         per Plane 1 of the mesh plan (§04). Intended for commit to the external
#         szl-holdings/a11oy repository at path deploy/zarf.yaml.
#
# Reality check (2026-05-30, infra pass):
#   REAL today:  all four manifests/*.yaml and attestations.jsonl exist and are
#                referenced correctly; YAML parses; schema is valid Zarf v1.
#   ROADMAP:     the image ghcr.io/szl-holdings/a11oy:v1.0.0-alpha is not yet
#                published — a root Dockerfile (CLI image) and docker-build.yml
#                were added in this pass to produce it. The deployment/service
#                manifests assume a long-running HTTP server on :8080 with a
#                /healthz probe; a11oy currently ships a CLI/library, not an
#                HTTP server, so that server is roadmap, not present code.
#
# Build:   zarf package create . --confirm
# Inspect: zarf package inspect zarf-package-a11oy-amd64-1.0.0-alpha.tar.zst
# Deploy:  zarf package deploy   zarf-package-a11oy-amd64-1.0.0-alpha.tar.zst --confirm

kind: ZarfPackageConfig
metadata:
  name: a11oy
  version: 1.0.0-alpha
  description: |
    Governed agentic execution fabric. Policy gates, signal mesh, proof
    ledger, and Λ-9 invariant runtime. Proprietary (LicenseRef-SZL-
    Proprietary, see LICENSE) / NOTICE per SZL Doctrine v7 license
    allowlist. Apache-2.0 re-license is proposed in PR #57 (IP-HOLD,
    unmerged).
  url: https://github.com/szl-holdings/a11oy
  authors: "Lutar, Stephen P. · ORCID 0009-0001-0110-4173 · SZL Holdings"
  architecture: amd64

components:
  - name: a11oy-runtime
    required: true
    description: A11oy runtime container + proof-ledger sidecar mount.
    images:
      - ghcr.io/szl-holdings/a11oy:v1.0.0-alpha
    manifests:
      - name: a11oy
        namespace: a11oy
        files:
          - manifests/a11oy-namespace.yaml
          - manifests/proof-ledger-pvc.yaml
          - manifests/a11oy-deployment.yaml
          - manifests/a11oy-service.yaml

  - name: a11oy-attestations
    required: false
    description: |
      Sidecar component that mounts the proof-ledger and exposes
      attestations.jsonl at /uds-bundle/attestations.jsonl for offline
      verification (see §05 Fix A).
    files:
      - source: attestations.jsonl
        target: /uds-bundle/attestations.jsonl
        executable: false

# Replay-root anchor (informational; surfaced into the attestation
# manifest at bundle-create time):
# replay_root: 1ed4d253e876f428c6e182f8ed8a569585442556b339529bbf8ec2522581698b

  # SLSA L1 supply-chain evidence: the Syft SBOM (CycloneDX + SPDX) is
  # generated at package-create time and embedded INSIDE the package as a
  # files component, so the cosign signature covers it. See Finding D3 in
  # PhD_CRYPTO_VERDICT.md.
  - name: sbom
    required: true
    description: Embedded Syft SBOM (CycloneDX + SPDX JSON) for the package.
    files:
      - source: sbom.cyclonedx.json
        target: sbom.cyclonedx.json
        executable: false
      - source: sbom.spdx.json
        target: sbom.spdx.json
        executable: false
