// szl_receipt.proto — DSSE receipt types for SZL-MESH
// Encodes the Doctrine-Pinned DSSE receipt chain (Invention 1).
//
// Doctrine: v11 LOCKED 749/14/163 · Kernel commit c7c0ba17 · SLSA L1
// License: Apache-2.0
//
// Reference: https://github.com/secure-systems-lab/dsse
//
// DCO:
//   Signed-off-by: Yachay <yachay@szlholdings.ai>
//   Co-Authored-By: Perplexity Computer Agent <agent@perplexity.ai>

syntax = "proto3";

package szl.receipt.v1;

option go_package = "github.com/szl-holdings/szl-mesh/gen/go/szl/receipt/v1;receiptv1";
option java_package = "ai.szlholdings.receipt.v1";

import "google/protobuf/timestamp.proto";

// ────────────────────────────────────────────────────────────────
// DSSE Envelope (wire-compatible with DSSE spec)
// https://github.com/secure-systems-lab/dsse/blob/master/envelope.md
// ────────────────────────────────────────────────────────────────

message DsseSignature {
  // Ed25519 public key fingerprint (SHA-256 of raw pubkey bytes, hex)
  string keyid = 1;

  // Ed25519 signature over PAE(payloadType, payload)
  // PAE = "DSSEv1" SP LEN(type) SP type SP LEN(body) SP body
  bytes sig = 2;
}

message DsseReceipt {
  // Always "application/vnd.szl.mesh.state-transition+json"
  string payload_type = 1;

  // base64url-encoded StateTransitionStatement JSON
  bytes payload = 2;

  // Exactly one signature for SZL-MESH v1 (multi-sig reserved for future)
  repeated DsseSignature signatures = 3;
}

// ────────────────────────────────────────────────────────────────
// StateTransitionStatement
// Decoded form of DsseReceipt.payload (base64url → JSON → proto)
// ────────────────────────────────────────────────────────────────

enum TransitionClassReceipt {
  TRANSITION_CLASS_RECEIPT_UNSPECIFIED = 0;
  PLATFORM_STATUS = 1;
  DEPLOYMENT = 2;
  PACKAGE = 3;
  COMMAND = 4;
  CELL_FORMATION = 5;
}

message PolicyContextReceipt {
  // Exactly 5: Huawei, ZTE, Hytera, Hikvision, Dahua
  repeated string section_889_vendors = 1;

  // Always "L1"
  string slsa_level = 2;
}

message StateTransitionStatement {
  // Always "szl-mesh/state-transition/v1"
  string type = 1;

  // Locked: "749/14/163"
  string doctrine_version = 2;

  // Locked: "c7c0ba17"
  string kernel_commit = 3;

  // Automerge document UUID
  string crdt_document_id = 4;

  // SHA-256 of the raw Automerge change chunk bytes (hex)
  // Binds the receipt to the exact change — cannot be reused
  string change_hash = 5;

  // Automerge heads before this change
  repeated string from_state_head = 6;

  // Automerge heads after this change
  repeated string to_state_head = 7;

  // Transition classification
  TransitionClassReceipt transition_class = 8;

  // SHA-256 of the signer's Ed25519 public key (hex)
  string node_id = 9;

  // ISO-8601; must be within ±5s of receiving node's UTC clock
  google.protobuf.Timestamp timestamp_utc = 10;

  // Governance policy context (informational, not validated at gate)
  PolicyContextReceipt policy_context = 11;
}

// ────────────────────────────────────────────────────────────────
// Receipt validation result (returned by receipt gate)
// ────────────────────────────────────────────────────────────────

enum ReceiptValidationStatus {
  RECEIPT_VALIDATION_STATUS_UNSPECIFIED = 0;
  AUTHORIZED  = 1; // all checks pass
  OBSERVED    = 2; // one or more checks failed
}

enum ReceiptFailureReason {
  RECEIPT_FAILURE_REASON_UNSPECIFIED = 0;
  MISSING_RECEIPT     = 1;
  BAD_SIGNATURE       = 2;
  WRONG_DOCTRINE      = 3;
  WRONG_KERNEL        = 4;
  REVOKED_SIGNER      = 5;
  CLOCK_SKEW          = 6;
  HASH_MISMATCH       = 7;
  WRONG_PAYLOAD_TYPE  = 8;
}

message ReceiptValidationResult {
  ReceiptValidationStatus status = 1;
  ReceiptFailureReason    failure_reason = 2; // populated if status == OBSERVED
  string change_hash      = 3;
  string node_id          = 4; // signer's node_id
  string doctrine_version = 5; // from the receipt
  string kernel_commit    = 6; // from the receipt
  google.protobuf.Timestamp validated_at = 7;
}

// ────────────────────────────────────────────────────────────────
// Receipt Service — standalone receipt validation sidecar
// Called by szl-mesh-node Receipt Gate (L4) via local gRPC
// Backed by a11oy-receipt-substrate (TypeScript/Deno)
// ────────────────────────────────────────────────────────────────

service ReceiptGate {
  // Validate a DSSE receipt against the locked doctrine pin.
  // Returns AUTHORIZED or OBSERVED with failure reason.
  rpc ValidateReceipt(ValidateReceiptRequest) returns (ValidateReceiptResponse);

  // Generate a new DSSE receipt for a CRDT change (signing node only).
  // The caller must hold a valid Formation CA-signed node certificate.
  rpc IssueReceipt(IssueReceiptRequest) returns (IssueReceiptResponse);

  // Batch validate up to 100 receipts in a single RPC call.
  rpc ValidateReceiptBatch(ValidateReceiptBatchRequest) returns (ValidateReceiptBatchResponse);
}

message ValidateReceiptRequest {
  DsseReceipt receipt             = 1;
  bytes       automerge_change_raw = 2; // raw change chunk for hash verification
  string      formation_id         = 3;
  google.protobuf.Timestamp now    = 4; // receiving node's UTC time for clock skew check
}

message ValidateReceiptResponse {
  ReceiptValidationResult result = 1;
}

message IssueReceiptRequest {
  string crdt_document_id          = 1;
  bytes  automerge_change_raw      = 2;
  repeated string from_state_head  = 3;
  repeated string to_state_head    = 4;
  TransitionClassReceipt transition_class = 5;
  string signing_node_id           = 6;
  bytes  signing_private_key       = 7; // Ed25519 private key (32 bytes) — never logged
}

message IssueReceiptResponse {
  DsseReceipt receipt     = 1;
  string      change_hash = 2;
}

message ValidateReceiptBatchRequest {
  repeated ValidateReceiptRequest requests = 1;
}

message ValidateReceiptBatchResponse {
  repeated ValidateReceiptResponse results = 1;
}
