syntax = "proto3";

package szl.mesh.v1;

option go_package = "github.com/szl-holdings/szl-mesh/gen/go/szl/mesh/v1;meshv1";
option java_package = "ai.szlholdings.mesh.v1";

import "google/protobuf/timestamp.proto";
import "szl_receipt.proto";

// ────────────────────────────────────────────────────────────────
// Core SZL-MESH Node Service
// Extends peat-node's existing gRPC surface. Deploy as a sidecar
// on localhost:50052 (peat-node remains on 50051).
// ────────────────────────────────────────────────────────────────
service SzlMeshNode {

  // ── Two-Track State Queries (Invention 2) ──────────────────────

  // Returns only AUTHORIZED-track platform states.
  // Used by Rosie fleet cockpit for command decisions.
  rpc GetAuthorizedPlatforms(GetPlatformsRequest) returns (GetPlatformsResponse);

  // Returns OBSERVED-track platform states.
  // Used for debugging, forensics, and situational awareness.
  rpc GetObservedPlatforms(GetPlatformsRequest) returns (GetPlatformsResponse);

  // Returns REVOKED-track historical states (for audit).
  rpc GetRevokedPlatforms(GetPlatformsRequest) returns (GetPlatformsResponse);

  // ── Receipt Ledger (Invention 1) ──────────────────────────────

  // Returns recent DSSE receipts for external audit.
  rpc GetReceiptLedger(GetReceiptLedgerRequest) returns (GetReceiptLedgerResponse);

  // Returns the current doctrine pin status.
  rpc GetDoctrinePinStatus(GetDoctrinePinStatusRequest) returns (GetDoctrinePinStatusResponse);

  // ── Skip-Layer Aggregation Control (Invention 3) ──────────────

  // Returns current aggregation topology and skip-layer routing table.
  rpc GetAggregationTopology(GetAggregationTopologyRequest) returns (GetAggregationTopologyResponse);

  // Returns receipt-priority queue depth metrics.
  rpc GetPriorityQueueStats(GetPriorityQueueStatsRequest) returns (GetPriorityQueueStatsResponse);

  // ── Byzantine Corroboration (Invention 4) ──────────────────────

  // Returns corroboration status for a specific CRDT change.
  rpc GetCorroborationStatus(GetCorroborationStatusRequest) returns (GetCorroborationStatusResponse);

  // Returns the current corroboration policy for this formation.
  rpc GetCorroborationPolicy(GetCorroborationPolicyRequest) returns (GetCorroborationPolicyResponse);

  // ── Certificate Enrollment (Invention 5) ──────────────────────

  // Enroll a new node in the formation (doctrine-gated).
  // Replaces / extends peat-gateway enrollment.
  rpc EnrollNode(EnrollNodeRequest) returns (EnrollNodeResponse);

  // Returns the CertificateStore for this formation.
  rpc GetCertificateStore(GetCertificateStoreRequest) returns (GetCertificateStoreResponse);

  // ── CRDT Revocation (Invention 6) ─────────────────────────────

  // Issue a revocation for a node certificate.
  // Requires Supervisor role + valid DSSE receipt.
  rpc RevokeNodeCertificate(RevokeNodeCertificateRequest) returns (RevokeNodeCertificateResponse);

  // Returns the current revocation list (CRDT snapshot).
  rpc GetRevocationList(GetRevocationListRequest) returns (GetRevocationListResponse);

  // ── Sentra Event Streaming (Invention 7) ──────────────────────

  // Server-streaming RPC: emits governance telemetry events
  // consumed by sentra's immune filter.
  rpc StreamSentraEvents(StreamSentraEventsRequest) returns (stream SentraEvent);

  // Returns current Prometheus-format governance metrics snapshot.
  rpc GetGovernanceMetricsSnapshot(GetGovernanceMetricsSnapshotRequest) returns (GetGovernanceMetricsSnapshotResponse);
}

// ────────────────────────────────────────────────────────────────
// Common types
// ────────────────────────────────────────────────────────────────

enum TransitionClass {
  TRANSITION_CLASS_UNSPECIFIED = 0;
  PLATFORM_STATUS = 1;
  DEPLOYMENT = 2;
  PACKAGE = 3;
  COMMAND = 4;
  CELL_FORMATION = 5;
}

enum TrackStatus {
  TRACK_STATUS_UNSPECIFIED = 0;
  AUTHORIZED = 1;
  OBSERVED = 2;
  REVOKED = 3;
}

enum ReceiptStatus {
  RECEIPT_STATUS_UNSPECIFIED = 0;
  RECEIPT_VALID = 1;
  RECEIPT_MISSING = 2;
  RECEIPT_BAD_SIGNATURE = 3;
  RECEIPT_WRONG_DOCTRINE = 4;
  RECEIPT_WRONG_KERNEL = 5;
  RECEIPT_REVOKED_SIGNER = 6;
  RECEIPT_CLOCK_SKEW = 7;
  RECEIPT_HASH_MISMATCH = 8;
}

enum CorroborationStatus {
  CORROBORATION_STATUS_UNSPECIFIED = 0;
  CORROBORATION_PENDING = 1;
  CORROBORATION_CORROBORATED = 2;
  CORROBORATION_FAILED = 3;
  CORROBORATION_NOT_APPLICABLE = 4;
}

message DoctrinePin {
  string doctrine_version = 1; // LOCKED: "749/14/163"
  string kernel_commit    = 2; // LOCKED: "c7c0ba17"
  string slsa_level       = 3; // LOCKED: "L1"
}

message PolicyContext {
  repeated string section_889_vendors = 1; // Exactly 5
  string slsa_level = 2;
}

// ────────────────────────────────────────────────────────────────
// Platform state (two-track)
// ────────────────────────────────────────────────────────────────

message PlatformState {
  string platform_id    = 1;
  string node_id        = 2;
  TrackStatus track     = 3;
  ReceiptStatus receipt_status = 4;
  CorroborationStatus corroboration = 5;
  string change_hash    = 6;
  TransitionClass transition_class = 7;
  google.protobuf.Timestamp state_at = 8;
  bytes  state_payload  = 9; // Automerge-encoded state snapshot
}

message GetPlatformsRequest {
  string formation_id = 1;
  string cell_id      = 2; // optional; empty = all cells
  int32  limit        = 3; // max results; 0 = default 100
}

message GetPlatformsResponse {
  repeated PlatformState platforms = 1;
  DoctrinePin doctrine_pin = 2;
}

// ────────────────────────────────────────────────────────────────
// Receipt ledger
// ────────────────────────────────────────────────────────────────

message GetReceiptLedgerRequest {
  string formation_id = 1;
  int32  limit        = 2; // max receipts; 0 = default 50
  google.protobuf.Timestamp since = 3; // optional filter
}

message GetReceiptLedgerResponse {
  repeated szl.receipt.v1.DsseReceipt receipts = 1;
  DoctrinePin doctrine_pin = 2;
}

message GetDoctrinePinStatusRequest {}

message GetDoctrinePinStatusResponse {
  DoctrinePin current_pin = 1;
  bool locked = 2; // always true for v11
  google.protobuf.Timestamp locked_at = 3;
}

// ────────────────────────────────────────────────────────────────
// Skip-layer aggregation
// ────────────────────────────────────────────────────────────────

message AggregationNode {
  string node_id = 1;
  string role    = 2; // "squad" | "platoon" | "company" | "command"
  repeated string child_node_ids = 3;
  string skip_layer_target_id = 4; // direct command hub for P0/P1
}

message GetAggregationTopologyRequest {
  string formation_id = 1;
}

message GetAggregationTopologyResponse {
  repeated AggregationNode nodes = 1;
  string command_hub_node_id = 2;
}

message GetPriorityQueueStatsRequest {
  string node_id = 1;
}

message GetPriorityQueueStatsResponse {
  int32 p0_depth = 1; // COMMAND: skip-layer queue depth
  int32 p1_depth = 2; // STATUS: skip-layer queue depth
  int32 p2_depth = 3; // OBSERVED: full-tree queue depth
  int32 p3_depth = 4; // bulk transfer queue depth
}

// ────────────────────────────────────────────────────────────────
// Byzantine corroboration
// ────────────────────────────────────────────────────────────────

message GetCorroborationStatusRequest {
  string change_hash  = 1;
  string formation_id = 2;
}

message GetCorroborationStatusResponse {
  string change_hash = 1;
  CorroborationStatus status = 2;
  repeated string corroborating_node_ids = 3;
  int32  policy_k = 4;
  google.protobuf.Timestamp window_expires_at = 5;
  google.protobuf.Timestamp corroborated_at   = 6;
}

message CorroborationPolicy {
  TransitionClass transition_class = 1;
  int32  k = 2;
  int32  window_seconds = 3;
}

message GetCorroborationPolicyRequest {
  string formation_id = 1;
}

message GetCorroborationPolicyResponse {
  repeated CorroborationPolicy policies = 1;
  DoctrinePin doctrine_pin = 2;
}

// ────────────────────────────────────────────────────────────────
// Doctrine-gated enrollment
// ────────────────────────────────────────────────────────────────

message DoctrineClaimProof {
  string doctrine_version = 1; // must be "749/14/163"
  string kernel_commit    = 2; // must be "c7c0ba17"
  string slsa_level       = 3; // must be "L1"
}

message Section889Attestation {
  bool   vendor_exclusion_confirmed = 1;
  string hardware_vendor            = 2; // self-reported
  string attestation_method         = 3; // "self_report" | "tpm_quote" | "none"
}

message EnrollNodeRequest {
  string node_id              = 1; // SHA-256(Ed25519 pubkey)
  bytes  ed25519_public_key   = 2; // raw 32-byte key
  string formation_key_proof  = 3; // HMAC-SHA256(formation_key, node_id || ts || doctrine_version || kernel_commit)
  string timestamp_utc        = 4; // ISO-8601
  DoctrineClaimProof doctrine_claim = 5;
  Section889Attestation section_889 = 6;
  bytes  csr_der              = 7; // PKCS#10 CSR (Ed25519)
}

message EnrollNodeResponse {
  bool   success            = 1;
  bytes  node_certificate   = 2; // X.509 DER if success=true
  string failure_reason     = 3; // if success=false
  DoctrinePin doctrine_pin  = 4;
}

message CertificateEntry {
  string node_id           = 1;
  bytes  cert_der          = 2;
  string enrolled_at       = 3;
  string expires_at        = 4;
  string doctrine_version  = 5;
  string kernel_commit     = 6;
}

message GetCertificateStoreRequest {
  string formation_id = 1;
}

message GetCertificateStoreResponse {
  repeated CertificateEntry certificates = 1;
  DoctrinePin doctrine_pin = 2;
}

// ────────────────────────────────────────────────────────────────
// CRDT revocation
// ────────────────────────────────────────────────────────────────

message RevocationEntry {
  string node_id           = 1;
  string cert_fingerprint  = 2; // SHA-256(DER) hex
  string revoked_at        = 3; // ISO-8601
  string reason            = 4; // "BYZANTINE" | "COMPROMISED" | "DOCTRINE_MISMATCH" | "ADMINISTRATIVE" | "SECTION_889"
  string revoked_by        = 5; // node_id of Formation CA operator
  bytes  revocation_receipt = 6; // DSSE envelope authorizing this revocation
}

message RevokeNodeCertificateRequest {
  string formation_id     = 1;
  string node_id          = 2;
  string cert_fingerprint = 3;
  string reason           = 4;
  bytes  revocation_receipt = 5; // required: DSSE receipt signed by Supervisor
}

message RevokeNodeCertificateResponse {
  bool   success          = 1;
  string failure_reason   = 2;
  RevocationEntry entry   = 3;
}

message GetRevocationListRequest {
  string formation_id = 1;
}

message GetRevocationListResponse {
  repeated RevocationEntry revocations = 1;
  DoctrinePin doctrine_pin = 2;
}

// ────────────────────────────────────────────────────────────────
// Sentra governance metrics streaming
// ────────────────────────────────────────────────────────────────

message SentraEvent {
  string event_type            = 1; // "szl_mesh_state_transition" | "szl_mesh_revocation" | ...
  string formation_id          = 2;
  string cell_id               = 3;
  string node_id               = 4;
  string crdt_document_id      = 5;
  string change_hash           = 6;
  ReceiptStatus receipt_status = 7;
  CorroborationStatus corroboration_status = 8;
  TrackStatus track            = 9;
  TransitionClass transition_class = 10;
  string doctrine_version      = 11;
  string kernel_commit         = 12;
  int64  latency_ms            = 13;
  int32  node_count_in_cell    = 14;
  google.protobuf.Timestamp timestamp_utc = 15;
  map<string, string> labels   = 16; // extensible metadata
}

message StreamSentraEventsRequest {
  string formation_id = 1;
  string cell_id      = 2; // optional; empty = all cells
}

message GetGovernanceMetricsSnapshotRequest {
  string formation_id = 1;
}

message GetGovernanceMetricsSnapshotResponse {
  double authorized_fraction           = 1;
  int64  byzantine_failures_total      = 2;
  double revocation_propagation_lag_p99_seconds = 3;
  int64  doctrine_mismatch_count       = 4;
  int64  revocation_count              = 5;
  DoctrinePin doctrine_pin             = 6;
  google.protobuf.Timestamp snapshot_at = 7;
}
