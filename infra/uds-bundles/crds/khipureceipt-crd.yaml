# SPDX-License-Identifier: Apache-2.0
# KhipuReceipt CRD — DSSE-signed receipts as first-class cluster-state objects.
# Per SZL_K8S_NATIVE_PATTERNS.md §2. Doctrine v11 LOCKED 749/14/163.
# Pattern adapted from sigstore attestation-as-DSSE + in-toto v1.2.0 DSSE envelope
# + cosign v3 identity-bound verification (all Apache-2.0). No GPL/AGPL copied.
# Controller verifies the DSSE envelope + cosign signature on admission; rejects
# unsigned/invalid receipts (fail-CLOSED); maintains a SHA-256 receipt chain.
# Air-gap honesty: rekorInclusion stays 'pending' until online-confirmed
# (DOCTRINE_NO_HALLUCINATION — never claim Rekor inclusion offline).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: khipureceipts.szl.dev
spec:
  group: szl.dev
  scope: Namespaced
  names:
    kind: KhipuReceipt
    listKind: KhipuReceiptList
    plural: khipureceipts
    singular: khipureceipt
    shortNames: [khipu, kr]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Verified
          type: boolean
          jsonPath: .status.verified
        - name: Method
          type: string
          jsonPath: .status.verifyMethod
        - name: Rekor
          type: string
          jsonPath: .status.rekorInclusion
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [predicateType, subject, dsseEnvelope, signer]
              properties:
                predicateType:
                  type: string
                  description: "in-toto-style predicate, e.g. https://szl.dev/khipu/receipt/v1"
                subject:
                  type: array
                  items:
                    type: object
                    required: [name, digest]
                    properties:
                      name: { type: string }
                      digest:
                        type: object
                        properties:
                          sha256: { type: string }
                dsseEnvelope:
                  type: string
                  description: "base64 DSSE envelope (payload + signatures)."
                signer:
                  type: object
                  required: [mode]
                  properties:
                    mode:
                      type: string
                      enum: [keyed, keyless]
                    publicKeyRef:
                      type: object
                      properties:
                        secretName: { type: string }
                    issuer: { type: string }
                    subjectRegExp: { type: string }
                rekorRef:
                  type: object
                  properties:
                    logIndex: { type: integer }
                chainPrev:
                  type: string
                  description: "SHA-256 receipt-chain link to the previous KhipuReceipt."
            status:
              type: object
              properties:
                verified: { type: boolean }
                verifiedAt: { type: string, format: date-time }
                verifyMethod: { type: string }
                rekorInclusion:
                  type: string
                  enum: [pending, included, failed]
                  description: "'pending' when air-gapped; never claim inclusion offline."
      subresources:
        status: {}
