# SPDX-License-Identifier: Apache-2.0
# DoctrineLock CRD — declarative Doctrine v11 LOCKED 749/14/163 enforcement.
# Per SZL_K8S_NATIVE_PATTERNS.md §3. Single source of truth for the locked
# doctrine constant, tamper-resistant, parameterizes every LambdaGate (VAP paramRef).
# Pattern adapted from HNC enforced-label integrity + VAP paramKind/paramRef
# (Apache-2.0/MIT). No GPL/AGPL source copied.
# Controller (validating webhook + reconcile):
#  - rejects any update to version/locked/lambdaStatus without a founder DSSE signature
#  - rejects lambdaStatus: theorem  and  slsaPosture: L2+  without verified evidence
#  - drift-repairs out-of-band mutation (HNC tamper-resistance)
# This is the K8s expression of "Locked by Founder" (DOCTRINE_NO_HALLUCINATION).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: doctrinelocks.szl.dev
spec:
  group: szl.dev
  scope: Cluster
  names:
    kind: DoctrineLock
    listKind: DoctrineLockList
    plural: doctrinelocks
    singular: doctrinelock
    shortNames: [dlock, dl]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Locked
          type: string
          jsonPath: .spec.locked
        - name: Lambda
          type: string
          jsonPath: .spec.lambdaStatus
        - name: Enforced
          type: boolean
          jsonPath: .status.enforced
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [version, locked, lambdaStatus, slsaPosture]
              properties:
                version:
                  type: string
                  description: "Doctrine version label, e.g. v11."
                locked:
                  type: string
                  pattern: '^[0-9]+/[0-9]+/[0-9]+$'
                  description: "decls/axioms/sorries — LOCKED (e.g. 749/14/163)."
                lambdaStatus:
                  type: string
                  enum: [Conjecture-1]
                  description: "Lambda is Conjecture 1. The enum REJECTS 'theorem' by construction."
                slsaPosture:
                  type: string
                  enum: [L1-honest, L2-in-progress]
                  description: "Never L2 until slsa-verifier green; enum rejects bare 'L2'."
                changeControl:
                  type: object
                  properties:
                    requiresFounderSignature:
                      type: boolean
                      default: true
                    founderKeyRef:
                      type: object
                      properties:
                        secretName: { type: string }
            status:
              type: object
              properties:
                enforced: { type: boolean }
                boundGates: { type: integer }
                lastVerified: { type: string, format: date-time }
                driftRepairs: { type: integer }
      subresources:
        status: {}
