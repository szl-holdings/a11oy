# SPDX-License-Identifier: Apache-2.0
# LambdaGate CRD — fail-CLOSED Lambda-axis governance gate at admission time.
# Per SZL_K8S_NATIVE_PATTERNS.md §1. Doctrine v11 LOCKED 749/14/163.
# Lambda is Conjecture 1 (NOT a theorem). Built on Apache-2.0/MIT upstreams only
# (Kubernetes VAP, Kubebuilder/controller-runtime). No GPL/AGPL source copied.
# The controller compiles each LambdaGate down to a ValidatingAdmissionPolicy +
# Binding (K8s VAP GA v1.30) so enforcement runs in the API server, fail-CLOSED.
# https://kubernetes.io/docs/reference/access-authn-authz/validating-admission-policy/
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: lambdagates.szl.dev
spec:
  group: szl.dev
  scope: Cluster
  names:
    kind: LambdaGate
    listKind: LambdaGateList
    plural: lambdagates
    singular: lambdagate
    shortNames: [lgate, lg]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Axis
          type: string
          jsonPath: .spec.axis
        - name: Mode
          type: string
          jsonPath: .spec.enforcementMode
        - name: Bound
          type: boolean
          jsonPath: .status.bound
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [axis, match, requirements]
              properties:
                axis:
                  type: string
                  description: "Which Lambda-axis this gate enforces (Lambda Conjecture 1)."
                failClosed:
                  type: boolean
                  default: true
                  description: "Compiles to VAP failurePolicy: Fail when true."
                match:
                  type: object
                  required: [namespaces, resources]
                  properties:
                    namespaces:
                      type: array
                      items: { type: string }
                    resources:
                      type: array
                      items: { type: string }
                requirements:
                  type: array
                  description: "CEL expressions evaluated in-process by the generated VAP."
                  items:
                    type: object
                    required: [expression, message]
                    properties:
                      expression: { type: string }
                      message: { type: string }
                doctrineRef:
                  type: object
                  description: "Binds the gate to a DoctrineLock (VAP paramRef target)."
                  properties:
                    name: { type: string }
                enforcementMode:
                  type: string
                  enum: [Audit, Warn, Deny]
                  default: Audit
                  description: "Progressive rollout Audit -> Warn -> Deny."
            status:
              type: object
              properties:
                generatedVAP: { type: string }
                bound: { type: boolean }
                lastDeny: { type: string, format: date-time }
      subresources:
        status: {}
