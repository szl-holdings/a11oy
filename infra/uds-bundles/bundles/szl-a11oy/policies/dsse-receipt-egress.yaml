# SPDX-License-Identifier: Apache-2.0
# Pepr policy — DSSE-receipt-required egress for szl-a11oy.
# Egress is DENIED unless the workload carries the dsse-receipt=required label,
# enforcing that any agent action leaving the namespace emits a signed receipt.
# Author: Yachay <yachay@szlholdings.dev> (DCO signed). Doctrine v11 LOCKED 749/14/163.
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: szl-a11oy-dsse-egress
  namespace: szl-a11oy
spec:
  network:
    allow:
    # @lulaStart 2199cb65-cbc2-f930-c76c-4f73a839de1c   # NIST SP 800-53 AC-4 / AU-10 mapping (validate with Lula, Apache-2.0)
    # https://github.com/defenseunicorns/lula
      - direction: Egress
        selector:
          dsse-receipt: required
        remoteGenerated: KubeAPI
        description: "Egress permitted ONLY for workloads emitting cosign-signed DSSE receipts"
    # @lulaEnd 2199cb65-cbc2-f930-c76c-4f73a839de1c
  # Workloads without the dsse-receipt label inherit default-deny egress (fail-CLOSED).
