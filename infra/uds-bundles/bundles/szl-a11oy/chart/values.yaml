# a11oy Helm values — STIG-aligned securityContext, default-deny NetworkPolicy.
# Author: Yachay <yachay@szlholdings.dev> (DCO signed). Doctrine v11 LOCKED 749/14/163.
namespace: szl-a11oy
replicas: 1

image:
  repository: ghcr.io/szl-holdings/a11oy
  tag: "uds-v0.2.0"
  pullPolicy: IfNotPresent

service:
  port: 8080

healthPath: "/api/a11oy/healthz"

istio:
  enabled: true
  hardened: true   # STRICT mTLS PeerAuthentication

monitoring:
  enabled: true
  path: /metrics
  interval: 30s

networkPolicy:
  enabled: true
  defaultDeny: true
  cilium: false   # set true on Cilium-CNI edges to enable L7 CiliumNetworkPolicy

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]

resources:
  requests: {cpu: 50m, memory: 128Mi}
  limits: {cpu: "1", memory: 1Gi}
