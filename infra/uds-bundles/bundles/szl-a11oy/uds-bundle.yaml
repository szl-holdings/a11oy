# SPDX-License-Identifier: Apache-2.0
# UDS Core declarative bundle spec — szl-a11oy
# Author: Yachay <yachay@szlholdings.dev> (DCO signed)
# Doctrine v11 LOCKED 749/14/163
# Operational drop: fills the UDS Core gap — adds the governance layer UDS Core lacks.
kind: UDSBundle
metadata:
  name: szl-a11oy
  description: "SZL a11oy operational UDS drop — Governance + policy overlay + agentic /code"
  version: "0.2.0"
  architecture: amd64
  authors: "Yachay <yachay@szlholdings.dev>"

  # UDS Core compatibility: targets Unified Defense Stack Core v1.5.0
  # https://github.com/defenseunicorns/uds-core/releases/tag/v1.5.0
  x-uds-core-compat: ">=1.5.0"
  # Zarf toolchain compatibility (keyless sign + offline verify)
  # https://github.com/zarf-dev/zarf/releases/tag/v0.77.0
  x-zarf-compat: ">=0.77.0"
  # Fleet-native by design: same Zarf packaging + Pepr admission + uds.dev/v1alpha1
  # Package CRD as UDS Core. Drops into the Mission Applications tier of a UDS System Image.
  # https://defenseunicorns.com/products/uds-fleet/
  annotations:
    szl.dev/fleet-deployable: "true"
    szl.dev/deployable-to-edge: "true"
    szl.dev/ddil-ok: "true"           # Denied/Degraded/Intermittent/Limited edge OK
    szl.dev/fleet-tier: "mission-application"
    szl.dev/edge-profile: "ddil"
    szl.dev/min-ram-gb: "4"           # Tactical Edge floor (RPi5-class) per UDS docs
    # https://uds.defenseunicorns.com/tactical-edge-deployments/overview/

packages:
  - name: szl-a11oy
    # Local path for air-gap create; OCI ref for registry-backed deploy.
    path: .
    ref: 0.2.0
    # Cosign: verify the package signature against the published public key
    # (see README — cosign verify-blob). Private key lives in HF Space secrets.
    optionalComponents:
      - a11oy-sbom-attest
    overrides:
      a11oy:
        a11oy:
          values:
            - path: image.tag
              value: "uds-v0.2.0"
            - path: namespace
              value: "szl-a11oy"
