# SPDX-License-Identifier: Apache-2.0
# Zarf package definition — szl-rosie
# Author: Yachay <yachay@szlholdings.dev> (DCO signed)
# Doctrine v11 LOCKED 749/14/163
# OPERATIONAL: deploy in 60s, pull the network cable, it still works.
kind: ZarfPackageConfig
metadata:
  name: szl-rosie
  version: 0.2.0
  # zarfVersion: ">=0.77.0" removed — not a valid Zarf metadata field; enforce via CI --no-progress check
  description: "SZL Rosie — Operator console + decision approval gates (adds human-in-loop layer UDS Core lacks)"
  architecture: amd64
  authors: "Yachay <yachay@szlholdings.dev>"
  source: "https://github.com/szl-holdings/rosie"
  url: "https://huggingface.co/spaces/SZLHOLDINGS/rosie"
  # Air-gap: all images + charts are baked into the .tar.zst; no pull at deploy time.
  yolo: false

components:
  - name: rosie-runtime
    required: true
    description: "Operator console with human-in-the-loop decision approval gates. Operators review receipts, approve/deny pending actions, and inspect mesh health from a single surface."
    charts:
      - name: rosie
        namespace: szl-rosie
        localPath: ./chart
        version: 0.2.0
        valuesFiles:
          - ./chart/values.yaml
    images:
      - "ghcr.io/szl-holdings/rosie:uds-v0.2.0"
    # Pepr admission policies applied as raw manifests at deploy time.
    manifests:
      - name: rosie-pepr-policies
        namespace: szl-rosie
        files:
          - ./policies/namespace-isolation.yaml
          - ./policies/dsse-receipt-egress.yaml
          - ./policies/section889-denylist.yaml
          # K8s-native additive gates (alongside Pepr; Audit/warn during rollout)
          - ./policies/lambda-gate.vap.yaml
          - ./policies/cosign-image-policy.yaml

  - name: rosie-sbom-attest
    required: false
    description: "SBOM (SPDX 2.3 + CycloneDX 1.4) and SLSA L1 provenance, shipped in-bundle."
    files:
      - source: ./sbom/rosie.spdx.json
        target: ./sbom/rosie.spdx.json
      - source: ./sbom/rosie.cyclonedx.json
        target: ./sbom/rosie.cyclonedx.json
      - source: ./attestations/rosie.slsa-provenance.json
        target: ./attestations/rosie.slsa-provenance.json

  - name: szl-rosie-uds-package
    required: true
    description: "UDS Package CR — registers szl-rosie with UDS Operator for Istio, NetworkPolicy, SSO, and monitoring"
    manifests:
      - name: szl-rosie-uds-package
        namespace: szl-rosie
        files:
          - ./manifests/uds-package.yaml
