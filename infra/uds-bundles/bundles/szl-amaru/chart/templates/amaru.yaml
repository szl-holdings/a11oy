apiVersion: apps/v1
kind: Deployment
metadata:
  name: amaru
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: amaru
    app.kubernetes.io/part-of: szl-mesh
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: amaru
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amaru
        app.kubernetes.io/part-of: szl-mesh
        app: szl-amaru
        {{- if .Values.istio.enabled }}
        istio.io/rev: default
        {{- end }}
      annotations:
        {{- if .Values.monitoring.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: {{ .Values.monitoring.path | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        seccompProfile:
          type: {{ .Values.securityContext.seccompProfile.type }}
      containers:
        - name: amaru
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - {name: http, containerPort: {{ .Values.service.port }}}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.securityContext.capabilities.drop | toJson }}
          readinessProbe:
            httpGet: {path: {{ .Values.healthPath | quote }}, port: {{ .Values.service.port }}}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: {{ .Values.healthPath | quote }}, port: {{ .Values.service.port }}}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: {{ .Values.resources.requests | toJson }}
            limits: {{ .Values.resources.limits | toJson }}
---
apiVersion: v1
kind: Service
metadata:
  name: amaru
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: amaru
spec:
  selector:
    app.kubernetes.io/name: amaru
  ports:
    - {name: http, port: {{ .Values.service.port }}, targetPort: {{ .Values.service.port }}}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: amaru-default-deny
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: amaru
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - {protocol: TCP, port: {{ .Values.service.port }}}
{{- end }}
{{- if and .Values.istio.enabled .Values.istio.hardened }}
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: amaru-strict-mtls
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: amaru
  mtls:
    mode: STRICT
{{- end }}
{{- if and .Values.monitoring.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: amaru
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: amaru
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: amaru
  podMetricsEndpoints:
    - port: http
      path: {{ .Values.monitoring.path | quote }}
      interval: {{ .Values.monitoring.interval }}
{{- end }}
