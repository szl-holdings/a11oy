# SPDX-License-Identifier: Apache-2.0
# Zarf package definition — szl-sentra
# Author: Yachay <yachay@szlholdings.dev> (DCO signed)
# Doctrine v11 LOCKED 749/14/163
# OPERATIONAL: deploy in 60s, pull the network cable, it still works.
kind: ZarfPackageConfig
metadata:
  name: szl-sentra
  version: 0.2.0
  # zarfVersion: ">=0.77.0" removed — not a valid Zarf metadata field; enforce via CI --no-progress check
  description: "SZL Sentra — 8-gate immune system + verdict pipeline (adds fail-CLOSED defensive screen UDS Core lacks)"
  architecture: amd64
  authors: "Yachay <yachay@szlholdings.dev>"
  source: "https://github.com/szl-holdings/sentra"
  url: "https://huggingface.co/spaces/SZLHOLDINGS/sentra"
  # Air-gap: all images + charts are baked into the .tar.zst; no pull at deploy time.
  yolo: false

components:
  - name: sentra-runtime
    required: true
    description: "8-gate fail-CLOSED immune screen. Every inbound request gets a verdict (ALLOW/DENY) with signed audit-log entry; default verdict on gate error is DENY."
    charts:
      - name: sentra
        namespace: szl-sentra
        localPath: ./chart
        version: 0.2.0
        valuesFiles:
          - ./chart/values.yaml
    images:
      - "ghcr.io/szl-holdings/sentra:uds-v0.2.0"
    # Pepr admission policies applied as raw manifests at deploy time.
    manifests:
      - name: sentra-pepr-policies
        namespace: szl-sentra
        files:
          - ./policies/namespace-isolation.yaml
          - ./policies/dsse-receipt-egress.yaml
          - ./policies/section889-denylist.yaml
          # K8s-native additive gates (alongside Pepr; Audit/warn during rollout)
          - ./policies/lambda-gate.vap.yaml
          - ./policies/cosign-image-policy.yaml

  - name: sentra-sbom-attest
    required: false
    description: "SBOM (SPDX 2.3 + CycloneDX 1.4) and SLSA L1 provenance, shipped in-bundle."
    files:
      - source: ./sbom/sentra.spdx.json
        target: ./sbom/sentra.spdx.json
      - source: ./sbom/sentra.cyclonedx.json
        target: ./sbom/sentra.cyclonedx.json
      - source: ./attestations/sentra.slsa-provenance.json
        target: ./attestations/sentra.slsa-provenance.json

  - name: szl-sentra-uds-package
    required: true
    description: "UDS Package CR — registers szl-sentra with UDS Operator for Istio, NetworkPolicy, SSO, and monitoring"
    manifests:
      - name: szl-sentra-uds-package
        namespace: szl-sentra
        files:
          - ./manifests/uds-package.yaml
