# Killinchu Helm values — STIG-aligned securityContext, default-deny NetworkPolicy.
# Author: Yachay <yachay@szlholdings.dev> (DCO signed). Doctrine v11 LOCKED 749/14/163.
namespace: szl-killinchu
replicas: 1

image:
  repository: ghcr.io/szl-holdings/killinchu
  tag: "uds-v0.2.0"
  # Digest-pinned for supply-chain integrity (cosign-verified, keyless OIDC).
  digest: "sha256:e872344f2fc8e7d8085042d5b5660c8bd62887a7d2f2353f44f882d782e8cd75"
  pullPolicy: IfNotPresent

service:
  port: 7860

healthPath: "/api/killinchu/healthz"

istio:
  enabled: true
  hardened: true   # STRICT mTLS PeerAuthentication

monitoring:
  enabled: true
  path: /metrics
  interval: 30s

networkPolicy:
  enabled: true
  defaultDeny: true
  cilium: false   # set true on Cilium-CNI edges to enable L7 CiliumNetworkPolicy

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]

resources:
  requests: {cpu: 50m, memory: 128Mi}
  limits: {cpu: "1", memory: 1Gi}
