# SPDX-License-Identifier: Apache-2.0
# Zarf package definition — szl-killinchu
# Author: Yachay <yachay@szlholdings.dev> (DCO signed)
# Doctrine v11 LOCKED 749/14/163
# OPERATIONAL: deploy in 60s, pull the network cable, it still works.
kind: ZarfPackageConfig
metadata:
  name: szl-killinchu
  version: 0.2.0
  # zarfVersion: ">=0.77.0" removed — not a valid Zarf metadata field; enforce via CI --no-progress check
  description: "SZL Killinchu — Counter-UAS + Λ-gate + defensive scope (the mission-ready defensive application on top of UDS Core)"
  architecture: amd64
  authors: "Yachay <yachay@szlholdings.dev>"
  source: "https://github.com/szl-holdings/killinchu"
  url: "https://huggingface.co/spaces/SZLHOLDINGS/killinchu"
  # Air-gap: all images + charts are baked into the .tar.zst; no pull at deploy time.
  yolo: false

components:
  - name: killinchu-runtime
    required: true
    description: "Counter-UAS defensive application. Decodes ADS-B (pyModeS) + MAVLink (pymavlink) drone telemetry, scores threats through the defensive-only Λ-gate, signs verdicts with post-quantum ML-DSA-65."
    charts:
      - name: killinchu
        namespace: szl-killinchu
        localPath: ./chart
        version: 0.2.0
        valuesFiles:
          - ./chart/values.yaml
    images:
      - "ghcr.io/szl-holdings/killinchu:uds-v0.2.0"
    # Pepr admission policies applied as raw manifests at deploy time.
    manifests:
      - name: killinchu-pepr-policies
        namespace: szl-killinchu
        files:
          - ./policies/namespace-isolation.yaml
          - ./policies/dsse-receipt-egress.yaml
          - ./policies/section889-denylist.yaml
          # K8s-native additive gates (alongside Pepr; Audit/warn during rollout)
          - ./policies/lambda-gate.vap.yaml
          - ./policies/cosign-image-policy.yaml

  - name: killinchu-sbom-attest
    required: false
    description: "SBOM (SPDX 2.3 + CycloneDX 1.4) and SLSA L1 provenance, shipped in-bundle."
    files:
      - source: ./sbom/killinchu.spdx.json
        target: ./sbom/killinchu.spdx.json
      - source: ./sbom/killinchu.cyclonedx.json
        target: ./sbom/killinchu.cyclonedx.json
      - source: ./attestations/killinchu.slsa-provenance.json
        target: ./attestations/killinchu.slsa-provenance.json

  - name: szl-killinchu-uds-package
    required: true
    description: "UDS Package CR — registers szl-killinchu with UDS Operator for Istio, NetworkPolicy, SSO, and monitoring"
    manifests:
      - name: szl-killinchu-uds-package
        namespace: szl-killinchu
        files:
          - ./manifests/uds-package.yaml
