# SPDX-License-Identifier: Apache-2.0
# Pepr policy — Section 889 vendor denylist (exactly 5 banned vendors, never 5+2).
# Denies any image whose registry/vendor annotation matches a Section 889 entity.
# Author: Yachay <yachay@szlholdings.dev> (DCO signed). Doctrine v11 LOCKED 749/14/163.
apiVersion: pepr.dev/v1
kind: AdmissionPolicy
metadata:
  name: szl-killinchu-section889-denylist
  namespace: szl-killinchu
spec:
  # FAR 52.204-25 / Section 889(a)(1)(A) covered telecommunications equipment.
  # The denylist is EXACTLY these 5 entities — not 5+2.
  deniedVendors:
      - "Huawei"
      - "ZTE Corporation"
      - "Hytera Communications"
      - "Hangzhou Hikvision Digital Technology"
      - "Dahua Technology"
  action: Deny
  failurePolicy: Fail   # fail-CLOSED: admission denied if the check cannot run
  match:
    kinds: ["Pod","Deployment"]
