# Pepr policy — namespace isolation for szl-killinchu (UDS Core native admission).
# Author: Yachay <yachay@szlholdings.dev> (DCO signed). Doctrine v11 LOCKED 749/14/163.
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: szl-killinchu-isolation
  namespace: szl-killinchu
spec:
  network:
    # UDS Core v1.5.0 canonical: Istio ambient service-mesh mode.
    # https://github.com/defenseunicorns/uds-core/blob/main/src/grafana/chart/templates/uds-package.yaml
    serviceMesh:
      mode: ambient
    # Default-deny: only same-namespace + Istio mesh ingress allowed.
    allow:
      - direction: Ingress
        remoteNamespace: istio-system
        port: 7860
        description: "Allow Istio mesh ingress only"
      - direction: Ingress
        remoteNamespace: szl-killinchu
        description: "Allow same-namespace traffic"
  # UDS Core monitor block — wire Prometheus scrape through the Package CRD.
  monitor:
    - selector:
        app.kubernetes.io/name: killinchu
      targetPort: 7860
      portName: http
      description: "SZL killinchu metrics"
