---
# Source: szl/templates/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: szl-system
  labels:
    # Big Bang convention: enable Istio sidecar injection on the namespace.
    istio-injection: enabled
    app.kubernetes.io/part-of: szl-mesh
    # Gatekeeper/Pepr admission scoping label.
    app.kubernetes.io/managed-by: Helm
---
# Source: szl/templates/flagships.yaml
# ===== a11oy — NetworkPolicy (default-deny ingress except mesh) =====
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: a11oy
  namespace: szl-system
  labels:
    app.kubernetes.io/name: a11oy
    app.kubernetes.io/part-of: szl-mesh
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: szl-0.1.0
    bigbang.dev/component: szl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: a11oy
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - {protocol: TCP, port: 8080}
