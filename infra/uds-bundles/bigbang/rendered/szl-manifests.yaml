# Source: szl/templates/flagships.yaml
# ===== a11oy — Deployment =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a11oy
  namespace: szl-system
  labels:
    app.kubernetes.io/name: a11oy
    app.kubernetes.io/part-of: szl-mesh
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: szl-0.1.0
    bigbang.dev/component: szl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: a11oy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: a11oy
        app.kubernetes.io/part-of: szl-mesh
        # Big Bang Istio sidecar injection is namespace-driven; this label is a hint.
        istio.io/rev: default
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: a11oy
          image: "ghcr.io/szl-holdings/a11oy:uds-v0.1.0"
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8080}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: {path: "/api/a11oy/healthz", port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: "/api/a11oy/healthz", port: 8080}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: {"cpu":"50m","memory":"64Mi"}
            limits: {"cpu":"1","memory":"512Mi"}
---
