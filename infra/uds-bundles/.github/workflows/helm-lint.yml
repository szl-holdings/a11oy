name: Helm Lint + Chart Test

# Lints + chart-tests the SZL umbrella Helm chart (charts/szl) on every PR and
# packages szl-0.1.0.tgz as a release asset. Big Bang chart parity gate.
# Author: Yachay <yachay@szlholdings.dev> (DCO signed). ADDITIVE.

on:
  push:
    branches: [main]
    paths: ["charts/**", "bigbang/**", ".github/workflows/helm-lint.yml"]
  pull_request:
    branches: [main]
    paths: ["charts/**", "bigbang/**"]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: helm lint + ct lint + template render
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.21.0

      - name: helm lint
        run: helm lint ./charts/szl

      - name: helm template (render gate — fail on empty render)
        run: |
          helm template bigbang-szl ./charts/szl --namespace szl-system > /tmp/rendered.yaml
          test "$(grep -c '^kind:' /tmp/rendered.yaml)" -ge 40

      - name: Set up chart-testing (ct)
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: ct lint
        run: |
          ct lint --charts ./charts/szl --validate-maintainers=false --target-branch main || \
          ct lint --charts ./charts/szl --validate-maintainers=false --all

      - name: kustomize render (Big Bang overlay)
        run: kubectl kustomize ./bigbang > /tmp/bigbang.yaml && test -s /tmp/bigbang.yaml

  package:
    name: package + attach szl-0.1.0.tgz
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.21.0
      - name: helm package
        run: helm package ./charts/szl -d .
      - name: Attach chart to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" szl-0.1.0.tgz --clobber
