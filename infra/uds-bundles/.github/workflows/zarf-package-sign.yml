#
# zarf-package-sign.yml — Keyless cosign signing for SZL UDS bundle packages
#
# Triggered on push to main or workflow_dispatch. Builds Zarf packages for
# all 5 SZL flagship bundles and signs them keyless via GitHub OIDC (Sigstore Fulcio).
#
# This workflow supersedes the key-based signing in zarf-bundle-build.yml:
#   - No COSIGN_KEY secret required
#   - Certificate identity = workflow URL (from GitHub OIDC claim)
#   - Transparency log entry created in Rekor (public audit trail)
#   - Signing bundle (.cosign.bundle) is self-contained for offline verification
#
# Verification for any signed package:
#   cosign verify-blob \
#     --bundle <pkg>.cosign.bundle \
#     --certificate-identity "https://github.com/szl-holdings/uds-bundles/.github/workflows/zarf-package-sign.yml@refs/heads/main" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     <pkg>
#
# Refs:
#   Zarf v0.77.0: https://github.com/zarf-dev/zarf/releases/tag/v0.77.0
#   Keyless docs: https://docs.sigstore.dev/cosign/signing/keyless/
#   SZL_OPERATIONAL_UPGRADES.md U3 (P0, M)

name: Zarf Package Build + Sign (Keyless)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write     # Required for OIDC token exchange with Fulcio (keyless signing)
  contents: read      # Required for checkout
  packages: write     # Required to push to ghcr.io

env:
  ZARF_VERSION: "v0.77.0"
  COSIGN_VERSION: "v2.4.3"
  SYFT_VERSION: "v1.18.1"
  REGISTRY: "ghcr.io"
  ORG: "szl-holdings"

jobs:
  package-sign:
    name: Build & Sign (${{ matrix.flagship }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flagship: [a11oy, sentra, amaru, rosie, killinchu]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── Install Zarf v0.77.0 ─────────────────────────────────────────────
      - name: Install Zarf
        run: |
          set -euo pipefail
          curl -sLo /usr/local/bin/zarf \
            https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_amd64
          chmod +x /usr/local/bin/zarf
          zarf version

      # ── Install cosign ────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      # ── Install syft (SBOM generator) ─────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      # ── Log in to ghcr.io ─────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build Zarf package for this flagship ──────────────────────────────
      - name: Build Zarf package (bundles/szl-${{ matrix.flagship }})
        env:
          FLAGSHIP: ${{ matrix.flagship }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="bundles/szl-${FLAGSHIP}"
          if [ ! -f "${BUNDLE_DIR}/zarf.yaml" ]; then
            echo "ERROR: ${BUNDLE_DIR}/zarf.yaml not found"
            exit 1
          fi
          zarf package create "${BUNDLE_DIR}" \
            --confirm \
            --no-progress \
            --output-directory ./dist
          PKG=$(ls dist/zarf-package-szl-${FLAGSHIP}*.tar.zst 2>/dev/null | head -1)
          if [ -z "${PKG}" ]; then
            echo "ERROR: No package built for ${FLAGSHIP}"
            ls dist/ || true
            exit 1
          fi
          echo "PKG_FILE=$(basename ${PKG})" >> "$GITHUB_ENV"
          echo "Built: ${PKG}"

      # ── Generate SBOM ─────────────────────────────────────────────────────
      - name: Generate SBOM
        run: |
          set -euo pipefail
          SBOM="dist/${PKG_FILE%.tar.zst}.sbom.spdx.json"
          syft "bundles/szl-${{ matrix.flagship }}" -o spdx-json --file "${SBOM}"
          echo "SBOM_FILE=$(basename ${SBOM})" >> "$GITHUB_ENV"

      # ── Keyless sign package ──────────────────────────────────────────────
      - name: Sign Zarf package (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          PKG="dist/${PKG_FILE}"
          BUNDLE="${PKG}.cosign.bundle"

          cosign sign-blob \
            --yes \
            --bundle "${BUNDLE}" \
            "${PKG}"

          echo "Signed: ${PKG}"
          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/zarf-package-sign.yml@refs/heads/main"
          CERT_ISSUER="https://token.actions.githubusercontent.com"
          cat >> "${GITHUB_STEP_SUMMARY}" <<SUMMARY
          ### Signed: ${PKG_FILE}

          \`\`\`bash
          cosign verify-blob \\
            --bundle dist/${PKG_FILE}.cosign.bundle \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}" \\
            dist/${PKG_FILE}
          \`\`\`
          SUMMARY

      # ── Attest SBOM (DSSE) ────────────────────────────────────────────────
      - name: Attest SBOM (keyless DSSE)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          PKG="dist/${PKG_FILE}"
          SBOM="dist/${SBOM_FILE}"

          cosign attest-blob \
            --yes \
            --predicate "${SBOM}" \
            --type spdxjson \
            --bundle "${PKG}.sbom.bundle" \
            "${PKG}"

      # ── Upload signed artifacts ───────────────────────────────────────────
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: zarf-package-${{ matrix.flagship }}-signed
          retention-days: 14
          path: |
            dist/zarf-package-*.tar.zst
            dist/zarf-package-*.cosign.bundle
            dist/zarf-package-*.sbom.bundle
            dist/*.sbom.spdx.json
