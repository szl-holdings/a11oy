# UDS bundle build — additive, dispatchable. Author: Yachay; DCO.
# Action SHAs pinned 2026-06-03 by Auditor BETA (Beta-iter4)
# Produces a Zarf package; cosign signing is skipped when COSIGN_KEY is absent.
name: zarf-bundle-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Bundle version tag"
        required: true
        default: "v0.1.0"
      anchor_rekor:
        description: "Anchor the bundle digest in the public Sigstore Rekor log"
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  id-token: write   # enables keyless/tlog operations

env:
  COSIGN_KEY_PRESENT: ${{ secrets.COSIGN_KEY != '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Zarf
        uses: defenseunicorns/setup-zarf@745f0990f3d0611774b552930ea053ac61ebf0a6 # main 2025-05-12
        with:
          version: v0.51.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.4.1

      - name: Zarf package create (per-flagship dirs in uds-bundles/PER_BUNDLE/*)
        run: |
          mkdir -p dist
          for d in uds-bundles/PER_BUNDLE/*/; do
            [ -f "$d/zarf.yaml" ] || continue
            zarf package create "$d" --confirm -o dist
          done
          # if a consolidated root zarf.yaml exists, build it too
          [ -f zarf.yaml ] && zarf package create . --confirm -o dist || true
          PKG=$(ls dist/zarf-package-*.tar.zst 2>/dev/null | head -1 || echo "")
          echo "PKG=$PKG" >> "$GITHUB_ENV"
          for p in dist/zarf-package-*.tar.zst; do sha256sum "$p" | tee "$p.sha256"; done

      - name: Cosign sign-blob (key from secret; Rekor anchor optional)
        # Only runs when COSIGN_KEY secret is set. When absent, build still succeeds
        # with unsigned artifacts and a clear notice. Add COSIGN_KEY to secrets to enable.
        if: ${{ env.COSIGN_KEY_PRESENT == 'true' }}
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${COSIGN_KEY:-}" ]; then
            echo "::warning::COSIGN_KEY resolved empty at runtime — skipping signing."
            exit 0
          fi
          printf '%s' "$COSIGN_KEY" > cosign.key
          trap 'rm -f cosign.key' EXIT
          PKG="${PKG:-}"
          if [ -z "$PKG" ]; then
            echo "::warning::No Zarf package built — skipping signing."
            exit 0
          fi
          if [ "${{ inputs.anchor_rekor }}" = "true" ]; then
            cosign sign-blob --key cosign.key --tlog-upload=true \
              --rekor-url=https://rekor.sigstore.dev \
              --bundle "${PKG}.rekor.bundle" --yes "${PKG}.sha256" > "${PKG}.sig"
          else
            cosign sign-blob --key cosign.key --tlog-upload=false --yes "${PKG}" > "${PKG}.sig"
          fi
          rm -f cosign.key

      - name: Notice (signing skipped — COSIGN_KEY absent)
        if: ${{ env.COSIGN_KEY_PRESENT == 'false' }}
        run: |
          echo "::notice title=Signing skipped::COSIGN_KEY secret is not set. Bundle was built but not signed."
          echo "::notice::To enable signing: add repo/org secret COSIGN_KEY (cosign private key PEM) and COSIGN_PASSWORD."
          echo "::notice::Generate with: cosign generate-key-pair (store ONLY the private key in secrets; commit cosign.pub)."

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: szl-uds-bundle-${{ inputs.version }}
          path: |
            dist/zarf-package-*.tar.zst
            dist/zarf-package-*.tar.zst.sig
            dist/zarf-package-*.tar.zst.sha256
            dist/zarf-package-*.tar.zst.rekor.bundle
          if-no-files-found: warn
