{{/*
  SZL umbrella chart — renders the full Big Bang-native object set for each of
  the 7 flagships: Deployment + Service + VirtualService + AuthorizationPolicy +
  NetworkPolicy + PodMonitor + PeerAuthentication. Author: Yachay (DCO signed).
*/}}
{{- $root := . -}}
{{- $ns := include "szl.namespace" . -}}
{{- range $name, $f := .Values.flagships }}
{{- if $f.enabled }}
{{- $port := $f.port | default 8080 }}
---
# ===== {{ $name }} — Deployment =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
{{ include "szl.labels" (dict "name" $name "root" $root) | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: szl-mesh
        {{- if $root.Values.global.istio.enabled }}
        # Big Bang Istio sidecar injection is namespace-driven; this label is a hint.
        istio.io/rev: default
        {{- end }}
      annotations:
        {{- if $root.Values.monitoring.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $port | quote }}
        prometheus.io/path: {{ $root.Values.monitoring.podMonitor.path | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: {{ $root.Values.securityContext.runAsNonRoot }}
        runAsUser: {{ $root.Values.securityContext.runAsUser }}
        seccompProfile:
          type: {{ $root.Values.securityContext.seccompProfile.type }}
      containers:
        - name: {{ $name }}
          image: "{{ $f.image.repository }}:{{ $f.image.tag }}"
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          ports:
            - {name: http, containerPort: {{ $port }}}
          securityContext:
            allowPrivilegeEscalation: {{ $root.Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ $root.Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ $root.Values.securityContext.capabilities.drop | toJson }}
          readinessProbe:
            httpGet: {path: {{ $f.healthPath | quote }}, port: {{ $port }}}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: {{ $f.healthPath | quote }}, port: {{ $port }}}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: {{ $root.Values.resources.requests | toJson }}
            limits: {{ $root.Values.resources.limits | toJson }}
---
# ===== {{ $name }} — Service =====
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
{{ include "szl.labels" (dict "name" $name "root" $root) | indent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - {name: http, port: {{ $port }}, targetPort: {{ $port }}}
{{- if $root.Values.global.istio.enabled }}
---
# ===== {{ $name }} — Istio VirtualService =====
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
{{ include "szl.labels" (dict "name" $name "root" $root) | indent 4 }}
spec:
  hosts:
    - {{ $name }}.{{ $root.Values.global.domain }}
  gateways:
    - istio-system/public   # Big Bang public Istio gateway
  http:
    - route:
        - destination:
            host: {{ $name }}.{{ $ns }}.svc.cluster.local
            port: {number: {{ $port }}}
---
# ===== {{ $name }} — Istio AuthorizationPolicy (default deny + allow mesh) =====
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
{{ include "szl.labels" (dict "name" $name "root" $root) | indent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["istio-system", {{ $ns | quote }}]
{{- if $root.Values.global.istio.hardened.enabled }}
---
# ===== {{ $name }} — STRICT mTLS PeerAuthentication =====
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  mtls:
    mode: STRICT
{{- end }}
{{- end }}
{{- if $root.Values.networkPolicies.enabled }}
---
# ===== {{ $name }} — NetworkPolicy (default-deny ingress except mesh) =====
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
{{ include "szl.labels" (dict "name" $name "root" $root) | indent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - {protocol: TCP, port: {{ $port }}}
{{- end }}
{{- if and $root.Values.monitoring.enabled $root.Values.monitoring.podMonitor.enabled }}
---
# ===== {{ $name }} — PodMonitor (Big Bang Prometheus operator) =====
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
{{ include "szl.labels" (dict "name" $name "root" $root) | indent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  podMetricsEndpoints:
    - port: http
      path: {{ $root.Values.monitoring.podMonitor.path | quote }}
      interval: {{ $root.Values.monitoring.podMonitor.interval }}
{{- end }}
{{- end }}
{{- end }}
