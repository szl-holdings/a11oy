apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sentra-egress
  namespace: sentra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sentra
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: killinchu
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: szl-receipts
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
