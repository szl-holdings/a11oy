apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-mesh-to-sentra
  namespace: sentra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sentra
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-tenant-gateway/sa/tenant-ingressgateway"
              - "cluster.local/ns/a11oy/sa/default"
              - "cluster.local/ns/amaru/sa/default"
              - "cluster.local/ns/killinchu/sa/default"
