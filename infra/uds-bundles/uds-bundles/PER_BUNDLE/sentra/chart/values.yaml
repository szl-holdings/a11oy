nameOverride: sentra
deploymentName: sentra-gates
healthPath: /api/sentra/healthz
replicaCount: 1
image:
  repository: ghcr.io/szl-holdings/sentra
  tag: uds-v0.3.1
  pullPolicy: IfNotPresent
service:
  port: 8080
  targetPort: 8080
gate:
  failClosed: true
  nistCsf: "2.0"
  d3fend: true
  count: 8
resources:
  requests: {cpu: 50m, memory: 64Mi}
  limits: {cpu: 500m, memory: 256Mi}
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
