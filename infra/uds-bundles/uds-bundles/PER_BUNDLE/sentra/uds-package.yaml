apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: sentra
  namespace: sentra
spec:
  network:
    serviceMesh:
      mode: ambient   # UDS Core v1.5.0 canonical — Istio ambient mode default since v1.2.0
    expose:
      - service: sentra
        selector:
          app.kubernetes.io/name: sentra
        host: sentra
        gateway: tenant
        port: 8080
        targetPort: 8080
    allow:
      - direction: Egress
        selector:
          app.kubernetes.io/name: sentra
        remoteNamespace: killinchu
        remoteSelector:
          app.kubernetes.io/name: killinchu
        port: 8080
        description: "sentra -> killinchu"
      - direction: Egress
        selector:
          app.kubernetes.io/name: sentra
        remoteNamespace: szl-receipts
        remoteSelector:
          app.kubernetes.io/name: szl-receipts
        port: 8443
        description: "sentra -> szl-receipts (verdict receipt sink)"
  monitor:
    - selector:
        app.kubernetes.io/name: sentra
      portName: metrics
      targetPort: 8080
      description: "sentra Prometheus metrics"
