# sentra — UDS Zarf Package. Build: zarf package create . --confirm
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: sentra-gates
  description: "sentra immune/threat gates — fail-closed asset-scoped Safety Gate (Sentra-V1, NIST CSF 2.0 + D3FEND), 8 gates, L7 forecast engine. Doctrine v11 LOCKED preserved."
  version: "0.3.1"
  zarfVersion: ">=0.77.0"   # Min Zarf CLI: Helm 4 + keyless signing
  url: "https://szlholdings.com"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/uds-bundles"
variables:
  - name: DOMAIN
    default: "uds.dev"
  - name: LOG_LEVEL
    default: "info"
components:
  - name: sentra-namespace
    required: true
    description: "Create the sentra namespace (Istio inject + UDS Core labels)"
    manifests:
      - name: sentra-namespace
        namespace: sentra
        files:
          - ./manifests/namespace.yaml
  - name: sentra-gates
    required: true
    description: "Deploy sentra safety gates (8 gates, fail-closed) + L7 forecast"
    only:
      flavor: upstream
    charts:
      - name: sentra
        namespace: sentra
        version: 0.3.1
        localPath: ./chart
        valuesFiles:
          - ./chart/values.yaml
    images:
      - ghcr.io/szl-holdings/sentra:uds-v0.3.1
    actions:
      onDeploy:
        after:
          - description: "Wait for sentra-gates to be ready"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: sentra-gates
                namespace: sentra
                condition: Available
  - name: sentra-mesh-policy
    required: true
    description: "Istio VirtualService + AuthorizationPolicy + NetworkPolicy"
    manifests:
      - name: sentra-mesh
        namespace: sentra
        files:
          - ./manifests/virtualservice.yaml
          - ./manifests/authorizationpolicy.yaml
          - ./manifests/networkpolicy.yaml
  - name: sentra-uds-package
    required: true
    description: "UDS Package CR — UDS Core admission"
    manifests:
      - name: sentra-uds-package
        namespace: sentra
        files:
          - ./uds-package.yaml
