# sentra.uds — single-flagship UDS bundle. Build: uds create . --confirm
kind: UDSBundle
metadata:
  name: sentra
  description: >
    sentra cyber-resilience runtime as a standalone UDS bundle. Depends on UDS
    Core (Istio + Pepr fail-closed + Prometheus). Doctrine v11 LOCKED: 749/14/163,
    13-axis yuyay_v3, replay bacf5443...631fc5.
  version: "0.3.1"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"
packages:
  - name: sentra-gates
    description: >
      sentra fail-closed asset-scoped Safety Gate (Sentra-V1, NIST CSF 2.0 +
      D3FEND), 8 gates, L7 forecast engine consuming a11oy-gate-emitted receipts.
    path: .
    ref: "0.3.1"
    optionalComponents:
      - sentra-mesh-policy
      - sentra-uds-package
    overrides:
      sentra-gates:
        sentra:
          values:
            - path: gate.failClosed
              value: true
            - path: gate.nistCsf
              value: "2.0"
            - path: gate.d3fend
              value: true
            - path: gate.count
              value: 8
# SZL UDS = Unified Decision Span. Andrew Greene Option-A endorsement 2026-05-22.
