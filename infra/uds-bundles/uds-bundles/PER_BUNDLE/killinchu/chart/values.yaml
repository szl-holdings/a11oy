nameOverride: killinchu
deploymentName: killinchu-bundle
healthPath: /killinchu/healthz
replicaCount: 1
image:
  repository: ghcr.io/szl-holdings/killinchu
  tag: uds-v0.3.1
  pullPolicy: IfNotPresent
service:
  port: 8080
  targetPort: 8080
gate:
  twoPerson: true
puriq:
  core:
    enabled: true
twin:
  enabled: true
resources:
  requests: {cpu: 50m, memory: 64Mi}
  limits: {cpu: 500m, memory: 256Mi}
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
