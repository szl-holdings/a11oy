# killinchu — UDS Zarf Package. Build: zarf package create . --confirm
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: killinchu-bundle
  description: "killinchu drone flagship — PURIQ core + anatomy libs + digital twin, 2-person gate (Pepr), drone registry + audit. Doctrine v11 LOCKED preserved."
  version: "0.3.1"
  zarfVersion: ">=0.77.0"   # Min Zarf CLI: Helm 4 + keyless signing
  url: "https://szlholdings.com"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/uds-bundles"
variables:
  - name: DOMAIN
    default: "uds.dev"
  - name: LOG_LEVEL
    default: "info"
components:
  - name: killinchu-namespace
    required: true
    description: "Create the killinchu namespace (Istio inject + UDS Core labels)"
    manifests:
      - name: killinchu-namespace
        namespace: killinchu
        files:
          - ./manifests/namespace.yaml
  - name: killinchu-bundle
    required: true
    description: "Deploy killinchu drone flagship (PURIQ core + twin + audit)"
    only:
      flavor: upstream
    charts:
      - name: killinchu
        namespace: killinchu
        version: 0.3.1
        localPath: ./chart
        valuesFiles:
          - ./chart/values.yaml
    images:
      - ghcr.io/szl-holdings/killinchu:uds-v0.3.1
    actions:
      onDeploy:
        after:
          - description: "Wait for killinchu-bundle to be ready"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: killinchu-bundle
                namespace: killinchu
                condition: Available
  - name: killinchu-mesh-policy
    required: true
    description: "Istio VirtualService + AuthorizationPolicy + NetworkPolicy + 2-person Pepr gate"
    manifests:
      - name: killinchu-mesh
        namespace: killinchu
        files:
          - ./manifests/virtualservice.yaml
          - ./manifests/authorizationpolicy.yaml
          - ./manifests/networkpolicy.yaml
  - name: killinchu-uds-package
    required: true
    description: "UDS Package CR — UDS Core admission"
    manifests:
      - name: killinchu-uds-package
        namespace: killinchu
        files:
          - ./uds-package.yaml
