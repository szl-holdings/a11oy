# a11oy — UDS Zarf Package
# Build:   zarf package create . --confirm
# Inspect: zarf package inspect zarf-package-a11oy-runtime-amd64-0.3.1.tar.zst
# Sign:    cosign sign-blob --key $COSIGN_KEY --tlog-upload=false --yes \
#            zarf-package-a11oy-runtime-amd64-0.3.1.tar.zst > a11oy.uds.sig
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: a11oy-runtime
  description: "a11oy orchestration kernel — L1-L7 receipt chain, 5 anchor formula policy gates, PURIQ reasoning backend (open-LLM unified router). Doctrine v11 LOCKED: 749 decls / 14 axioms / 163 sorries / 13-axis yuyay_v3."
  version: "0.3.1"
  zarfVersion: ">=0.77.0"   # Min Zarf CLI: Helm 4 + keyless signing
  url: "https://szlholdings.com"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/uds-bundles"

variables:
  - name: DOMAIN
    description: "Cluster domain (must match UDS Core DOMAIN variable)"
    default: "uds.dev"
  - name: A11OY_REPLICAS
    description: "Number of a11oy-runtime replicas"
    default: "1"
  - name: LOG_LEVEL
    default: "info"

components:
  - name: a11oy-namespace
    required: true
    description: "Create the a11oy namespace with Istio injection + UDS Core labels"
    manifests:
      - name: a11oy-namespace
        namespace: a11oy
        files:
          - ./manifests/namespace.yaml

  - name: a11oy-runtime
    required: true
    description: "Deploy the a11oy orchestration kernel (5 anchor policy gates, PURIQ router)"
    only:
      flavor: upstream
    charts:
      - name: a11oy
        namespace: a11oy
        version: 0.3.1
        localPath: ./chart
        valuesFiles:
          - ./chart/values.yaml
    images:
      # Built from existing HF Space Dockerfile (szl-cookbook/recipes/_hf_surfaces/_live/a11oy/)
      - ghcr.io/szl-holdings/a11oy:uds-v0.3.1
    actions:
      onDeploy:
        after:
          - description: "Wait for a11oy-runtime to be ready"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: a11oy-runtime
                namespace: a11oy
                condition: Available

  - name: a11oy-mesh-policy
    required: true
    description: "Istio VirtualService + AuthorizationPolicy + NetworkPolicy (mesh: a11oy -> amaru/sentra/killinchu/rosie)"
    manifests:
      - name: a11oy-mesh
        namespace: a11oy
        files:
          - ./manifests/virtualservice.yaml
          - ./manifests/authorizationpolicy.yaml
          - ./manifests/networkpolicy.yaml

  - name: a11oy-uds-package
    required: true
    description: "UDS Package CR — UDS Core admission (Istio sidecar + exposed endpoint + monitor)"
    manifests:
      - name: a11oy-uds-package
        namespace: a11oy
        files:
          - ./uds-package.yaml
