# Default-deny + explicit egress to SZL mesh siblings (airgap-safe: no internet egress).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: a11oy-egress
  namespace: a11oy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: a11oy
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: amaru
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sentra
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: killinchu
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rosie
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: szl-receipts
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    - to:  # DNS only
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
