# a11oy.uds — single-flagship UDS bundle (UDS Core marketplace-ready)
# Build:   uds create . --confirm           (-> uds-bundle-a11oy-amd64-0.3.1.tar.zst)
# Deploy:  uds deploy uds-bundle-a11oy-amd64-0.3.1.tar.zst --confirm
kind: UDSBundle
metadata:
  name: a11oy
  description: >
    a11oy orchestration kernel as a standalone UDS bundle. Depends on UDS Core
    (Istio + Keycloak SSO + Pepr + Prometheus). Doctrine v11 LOCKED numbers
    preserved: 749 decls / 14 axioms / 163 sorries / 13-axis yuyay_v3 /
    replay bacf54434f1a3bf2d758b27a62d5fd580ca4c8d3b180693573eeebcaea631fc5.
  version: "0.3.1"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"

packages:
  - name: a11oy-runtime
    description: >
      a11oy brand-orchestration kernel: L1-L7 receipt chain, 5 anchor formula
      policy gates (LiuHuiPi, MadhavaBound, FalsePosition, SummationInvariant,
      AdversarialRobustness), KS-18 contextuality witness, PURIQ open-LLM router.
    # Local path build (this directory's zarf.yaml). For registry deploy, switch to:
    #   repository: ghcr.io/szl-holdings/packages/a11oy-runtime
    #   ref: 0.3.1
    path: .
    ref: "0.3.1"
    optionalComponents:
      - a11oy-mesh-policy
      - a11oy-uds-package
    overrides:
      a11oy-runtime:
        a11oy:
          values:
            - path: gates.enabled
              value: true
            - path: gates.strictMode
              value: true
            - path: gates.anchors.liuHuiPi
              value: true
            - path: gates.anchors.madhavaBound
              value: true
            - path: gates.anchors.falsePosition
              value: true
            - path: gates.anchors.summationInvariant
              value: true
            - path: gates.anchors.adversarialRobustness
              value: true
            - path: puriq.router.enabled
              value: true

