apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: amaru
  namespace: amaru
spec:
  network:
    serviceMesh:
      mode: ambient   # UDS Core v1.5.0 canonical — Istio ambient mode default since v1.2.0
    expose:
      - service: amaru
        selector:
          app.kubernetes.io/name: amaru
        host: amaru
        gateway: tenant
        port: 8080
        targetPort: 8080
    allow:
      - direction: Egress
        selector:
          app.kubernetes.io/name: amaru
        remoteNamespace: sentra
        remoteSelector:
          app.kubernetes.io/name: sentra
        port: 8080
        description: "amaru -> sentra"
      - direction: Egress
        selector:
          app.kubernetes.io/name: amaru
        remoteNamespace: szl-receipts
        remoteSelector:
          app.kubernetes.io/name: szl-receipts
        port: 8443
        description: "amaru -> szl-receipts (witness receipt sink)"
  monitor:
    - selector:
        app.kubernetes.io/name: amaru
      portName: metrics
      targetPort: 8080
      description: "amaru Prometheus metrics"
