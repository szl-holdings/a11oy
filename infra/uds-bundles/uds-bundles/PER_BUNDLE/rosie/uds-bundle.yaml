# rosie.uds — single-flagship UDS bundle. Build: uds create . --confirm
kind: UDSBundle
metadata:
  name: rosie
  description: >
    rosie governed decision fabric as a standalone UDS bundle. Depends on UDS
    Core (Istio + Grafana/Prometheus). Doctrine v11 LOCKED: 749/14/163,
    13-axis yuyay_v3, replay bacf5443...631fc5.
  version: "0.3.1"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"
packages:
  - name: rosie-replay
    description: >
      rosie governed decision fabric: mandatory witnesses on every decision
      (ROSIE-V1), receipt-DAG replay engine, observability dashboard, brain-jack mesh.
    path: .
    ref: "0.3.1"
    optionalComponents:
      - rosie-mesh-policy
      - rosie-uds-package
    overrides:
      rosie-replay:
        rosie:
          values:
            - path: dashboard.enabled
              value: true
            - path: dashboard.port
              value: 8080
            - path: replay.enabled
              value: true
            - path: replay.mode
              value: live
# SZL UDS = Unified Decision Span. Andrew Greene Option-A endorsement 2026-05-22.
