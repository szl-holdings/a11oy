nameOverride: rosie
deploymentName: rosie-replay
healthPath: /api/rosie/healthz
replicaCount: 1
image:
  repository: ghcr.io/szl-holdings/rosie
  tag: uds-v0.3.1
  pullPolicy: IfNotPresent
service:
  port: 8080
  targetPort: 8080
dashboard:
  enabled: true
  port: 8080
replay:
  enabled: true
  mode: live
resources:
  requests: {cpu: 50m, memory: 64Mi}
  limits: {cpu: 500m, memory: 256Mi}
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
