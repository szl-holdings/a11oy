name: Release reproducibility bundle

# On every published release (i.e. every new lutar-* tag release), build a
# reproducibility bundle and attach it to the release as downloadable assets:
#   - lean_numbers.json     : canonical declaration/axiom/sorry counts at the tag
#   - lake-manifest.sha256  : SHA-256 of the committed lake-manifest.json (pins deps)
#   - build.log             : full `lake build` log (the actual kernel-check run)
#   - reproduce.md          : exact commands to re-run the build + counts
#
# Purpose (audit 2026-05-31): every public claim about the Lean corpus at a tag
# (e.g. on Zenodo) must resolve to something a reviewer can download, diff, and
# re-run. This attaches that evidence directly to the GitHub release, which is
# the same artifact set that should be uploaded to the matching Zenodo record.
#
# It does NOT re-tag and does NOT edit release prose — assets only.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build the bundle for"
        required: true

permissions: {}

concurrency:
  group: release-repro-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  bundle:
    name: build + attach reproducibility bundle
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # to upload release assets
    env:
      TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout the tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install elan (SHA-pinned)
        run: |
          ELAN_SHA=3d5138e1526a569a23901b8ee559032793cf445e
          EXPECTED=4bacca9502cb89736fe63d2685abc2947cfbf34dc87673504f1bb4c43eda9264
          curl -sSfL "https://raw.githubusercontent.com/leanprover/elan/$ELAN_SHA/elan-init.sh" -o /tmp/elan-init.sh
          echo "$EXPECTED  /tmp/elan-init.sh" | sha256sum -c
          sh /tmp/elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Compute canonical numbers at the tag
        run: |
          # Self-contained: prefer the vendored canonical counter if present,
          # else fall back to the documented grep-equivalent counts inline.
          if [ -f .github/scripts/lean_numbers.py ]; then
            python3 .github/scripts/lean_numbers.py --repo-path . --ref "$TAG" --out lean_numbers.json
          else
            python3 - "$TAG" > lean_numbers.json <<'PY'
          import json, os, re, subprocess, sys
          tag = sys.argv[1]
          DECL = re.compile(r"^(?:private\s+)?(?:noncomputable\s+)?(?:private\s+)?(theorem|lemma|def|abbrev|instance|structure|inductive|class)\b")
          AX = re.compile(r"^(?:private\s+)?axiom\s+([A-Za-z_][A-Za-z0-9_']*)")
          SORRY = re.compile(r"\bsorry\b")
          COMMENT = re.compile(r"^\s*--")
          def files():
              for dp,_,fs in os.walk("Lutar"):
                  for f in fs:
                      if f.endswith(".lean"): yield os.path.join(dp,f)
              if os.path.exists("Main.lean"): yield "Main.lean"
          d=ax=sr=snc=0; names=set()
          for p in files():
              for ln in open(p, errors="replace"):
                  if DECL.match(ln): d+=1
                  m=AX.match(ln)
                  if m: ax+=1; names.add(m.group(1))
                  h=len(SORRY.findall(ln))
                  if h:
                      sr+=h
                      if not COMMENT.match(ln): snc+=h
          sha=subprocess.check_output(["git","rev-parse","HEAD"],text=True).strip()
          print(json.dumps({"schema":"szl.lean_numbers/v1","repo":"szl-holdings/lutar-lean","ref":tag,"sha":sha,"numbers":{"declarations":d,"axioms_raw":ax,"axioms_unique":len(names),"axiom_names":sorted(names),"sorries_raw":sr,"sorries_noncomment":snc}}, indent=2))
          PY
          fi
          echo "----- lean_numbers.json -----"; cat lean_numbers.json

      - name: SHA-256 of lake-manifest.json (dependency pin)
        run: |
          if [ -f lake-manifest.json ]; then
            sha256sum lake-manifest.json | tee lake-manifest.sha256
          else
            echo "no lake-manifest.json committed at this tag" | tee lake-manifest.sha256
          fi

      - name: Build the library and capture the full log
        run: |
          set -o pipefail
          lake --version
          lake update -R
          lake build 2>&1 | tee build.log
          echo "exit=$?" | tee -a build.log

      - name: Write reproduce.md
        run: |
          cat > reproduce.md <<EOF
          # Reproduce this build

          Tag: \`$TAG\`  ·  toolchain: \`$(cat lean-toolchain)\`

          \`\`\`bash
          git clone https://github.com/szl-holdings/lutar-lean.git
          cd lutar-lean && git checkout $TAG
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y
          lake update -R
          lake build            # kernel-checks the whole library
          lake exe check
          \`\`\`

          Then verify the numbers in \`lean_numbers.json\` and the dependency pin in
          \`lake-manifest.sha256\` (sha256 of lake-manifest.json).
          EOF
          cat reproduce.md

      - name: Attach assets to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            lean_numbers.json lake-manifest.sha256 build.log reproduce.md \
            --clobber --repo "${{ github.repository }}"

      - name: Upload bundle as workflow artifact (always)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproducibility-bundle-${{ env.TAG }}
          path: |
            lean_numbers.json
            lake-manifest.sha256
            build.log
            reproduce.md
          if-no-files-found: error
