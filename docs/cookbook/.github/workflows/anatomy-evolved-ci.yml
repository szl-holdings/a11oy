# anatomy-evolved-v1 CI — tsc + doctrine guard + smoke tests
name: anatomy-evolved-ci
on:
  push:
    paths:
      - 'recipes/anatomy-evolved-v1/code/**'
      - '.github/workflows/anatomy-evolved-ci.yml'
  pull_request:
    paths:
      - 'recipes/anatomy-evolved-v1/code/**'
permissions:
  contents: read
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipes/anatomy-evolved-v1/code
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: TypeScript build (--noEmit)
        run: npx tsc --noEmit
      - name: Doctrine guard
        run: |
          set -euo pipefail
          HITS=$(grep -rinE 'alloyscape|glass[ -]?wing|glasswing|mythos|stephen paul|perplexity computer' \
            src/ lean/ tests/ 2>/dev/null \
            | grep -v 'BANNED_TOKENS' \
            | grep -v 'doctrine-guard' \
            | wc -l || true)
          if [ "$HITS" -gt 0 ]; then
            echo "DOCTRINE VIOLATION: $HITS banned-token hits outside guard arrays"
            exit 1
          fi
          echo "Doctrine guard: clean"
      - name: Compile + run smoke tests
        run: |
          npx tsc -p tsconfig.test.json
          echo '{"type":"commonjs"}' > dist-test/package.json
          node dist-test/tests/smoke.js
