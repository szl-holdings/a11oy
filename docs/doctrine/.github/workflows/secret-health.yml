# secret-health.yml — Org-wide required-secret health check.
#
# Runs DAILY and reports which szl-holdings repos are MISSING a required secret.
# This is the standing replacement for ad-hoc audits: it makes the secret gap
# VISIBLE every day instead of letting workflows silently no-op.
#
# Required-secret policy (REQUIRED_MAP below) is intentionally explicit and
# grep-able. Add/adjust entries as new operational secrets are introduced.
#
# Auth: needs a token that can read repo Actions secrets across the org.
#   - org secret SECRET_HEALTH_TOKEN: a fine-grained PAT (or GitHub App token)
#     with `Secrets: read` + `Metadata: read` on the szl-holdings org repos,
#     and `Administration: read` so it can list per-repo secrets.
#   If SECRET_HEALTH_TOKEN is missing, the job FAILS LOUDLY (no silent green).
#
# This workflow NEVER prints secret values (the GitHub API never returns them);
# it reports NAMES and PRESENT/MISSING status only.
#
# Doctrine: HONESTY OVER CHECKLIST. A missing required secret is surfaced as a
# failed check, not buried.
#
# Signed-off-by: Yachay <yachay@szlholdings.ai>
# Co-Authored-By: Perplexity Computer Agent <agent@perplexity.ai>

name: secret-health

on:
  schedule:
    - cron: "30 6 * * *"   # daily 06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: Org secret health
    runs-on: ubuntu-latest
    steps:
      - name: Require SECRET_HEALTH_TOKEN (fail loudly if missing)
        if: ${{ secrets.SECRET_HEALTH_TOKEN == '' }}
        run: |
          echo "::error title=SECRET_HEALTH_TOKEN missing::This audit needs a token that can read org repo Actions secrets."
          echo "::error::Founder action: add org secret SECRET_HEALTH_TOKEN (fine-grained PAT: Secrets:read + Administration:read + Metadata:read on szl-holdings)."
          echo "::error::See FOUNDER_SECRETS_RUNBOOK.md."
          exit 1

      - name: Audit required secrets across active repos
        env:
          GH_TOKEN: ${{ secrets.SECRET_HEALTH_TOKEN }}
        run: |
          set -euo pipefail
          ORG=szl-holdings

          # ── Required-secret policy ──────────────────────────────────────────
          # repo|SECRET_NAME ; one per line. "*" repo = required org-wide.
          REQUIRED=$(cat <<'POLICY'
          killinchu|HF_TOKEN
          rosie|HF_TOKEN
          amaru|HF_TOKEN
          sentra|HF_TOKEN
          a11oy|HF_TOKEN
          szl-lake|HF_TOKEN
          .github|HF_TOKEN
          uds-bundles|COSIGN_KEY
          uds-bundles|COSIGN_PASSWORD
          *|SZL_COSIGN_PRIVATE_PEM
          POLICY
          )

          # Active (non-archived) repos.
          mapfile -t REPOS < <(gh repo list "$ORG" --no-archived --limit 200 --json name --jq '.[].name')
          echo "Active repos: ${#REPOS[@]}"

          # Cache of present secret names per repo.
          declare -A PRESENT
          list_secrets() {
            local repo="$1"
            if [ -z "${PRESENT[$repo]+x}" ]; then
              local names
              names=$(gh api "repos/$ORG/$repo/actions/secrets" --paginate --jq '.secrets[].name' 2>/dev/null | tr '\n' ' ' || true)
              PRESENT[$repo]="$names"
            fi
            echo "${PRESENT[$repo]}"
          }

          MISSING=0
          {
            echo "# Secret health report ($(date -u +%FT%TZ))"
            echo ""
            echo "| Repo | Required secret | Status |"
            echo "|------|-----------------|--------|"
          } > report.md

          while IFS='|' read -r rrepo rsecret; do
            [ -z "$rrepo" ] && continue
            if [ "$rrepo" = "*" ]; then
              targets=("${REPOS[@]}")
            else
              targets=("$rrepo")
            fi
            for t in "${targets[@]}"; do
              names=$(list_secrets "$t")
              if echo " $names " | grep -q " $rsecret "; then
                echo "| $t | $rsecret | PRESENT |" >> report.md
              else
                echo "| $t | $rsecret | **MISSING** |" >> report.md
                echo "::warning title=Missing secret::$t is missing required secret $rsecret"
                MISSING=$((MISSING+1))
              fi
            done
          done <<< "$REQUIRED"

          cat report.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total missing required secrets: $MISSING**" >> "$GITHUB_STEP_SUMMARY"
          echo "Total missing required secrets: $MISSING"

          # HONESTY: a missing required secret is a FAILED check, not a silent pass.
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required secret(s) missing. See the job summary + FOUNDER_SECRETS_RUNBOOK.md."
            exit 1
          fi
          echo "All required secrets present."
