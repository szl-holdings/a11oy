<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0e14"/>
  <title>Sentra Console | Policy Immune System — Elite 13-Tab</title>
  <meta name="description" content="Sentra Policy Immune System — deny-by-default, allow-with-proof. 8 immune gates, signed verdicts, STIX corpus, anomaly scoring, compliance evidence."/>
  <link rel="canonical" href="https://szlholdings-sentra.hf.space/console/"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f1117; --surface: #161b27; --surf2: #1c2236; --surf3: #212845;
      --border: #252d40; --text: #e4e6ef; --muted: #6b7a99; --dim: #3d4660;
      --gold: #c9b787; --teal: #3ecfcf; --red: #e05c5c; --green: #5aac8e;
      --yellow: #e0b84e; --purple: #9b7fcf;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
    a { color: var(--teal); text-decoration: none; } a:hover { text-decoration: underline; }
    button { cursor: pointer; }
    code, .mono { font-family: var(--mono); }
    .shell { display: flex; height: 100vh; overflow: hidden; }
    /* Sidebar */
    .sidebar { width: 210px; min-width: 210px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-brand { padding: 1.1rem 1rem 0.9rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; }
    .brand-mark { width: 1.5rem; height: 1.5rem; background: var(--gold); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9px; font-weight: 700; color: #0a0a0a; }
    .brand-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .brand-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); }
    .sidebar-section { padding: 0.75rem 0.75rem 0.25rem; }
    .section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; padding: 0 0.25rem 0.4rem; }
    .nav-item { display: flex; align-items: center; gap: 0.5rem; width: 100%; padding: 0.45rem 0.75rem; border-radius: 5px; border: none; background: transparent; color: var(--muted); font-size: 12.5px; font-family: var(--sans); text-align: left; transition: all 0.12s; }
    .nav-item:hover { background: var(--surf2); color: var(--text); }
    .nav-item.active { background: rgba(201,183,135,0.08); color: var(--gold); }
    .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.5; flex-shrink: 0; }
    .nav-item.active .nav-dot { opacity: 1; background: var(--gold); }
    /* Main */
    .main-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { display: flex; align-items: center; gap: 0.75rem; padding: 0 1.25rem; height: 44px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .topbar-title { font-size: 13px; font-weight: 600; flex: 1; }
    .topbar-badge { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 3px; border: 1px solid rgba(62,207,207,0.25); background: rgba(62,207,207,0.06); color: var(--teal); letter-spacing: 0.05em; }
    .topbar-link { font-size: 11px; color: var(--muted); }
    .content { flex: 1; overflow-y: auto; padding: 1.5rem; }
    /* Cards + KPIs */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 0.3rem; font-weight: 500; }
    .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; margin-bottom: 0.2rem; }
    .kpi-gold { color: var(--gold); } .kpi-teal { color: var(--teal); } .kpi-red { color: var(--red); } .kpi-green { color: var(--green); } .kpi-yellow { color: var(--yellow); }
    .kpi-delta { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    .section-heading { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 1.5rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .section-heading:first-child { margin-top: 0; }
    /* Tables */
    .tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .tbl th { text-align: left; padding: 0.5rem 0.75rem; font-size: 10.5px; font-weight: 500; color: var(--muted); border-bottom: 1px solid var(--border); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.04em; }
    .tbl td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(37,45,64,0.6); font-size: 12px; }
    .tbl tr:hover td { background: var(--surf2); }
    /* Badges */
    .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em; }
    .badge-allow { background: rgba(90,172,142,0.12); color: var(--green); border: 1px solid rgba(90,172,142,0.25); }
    .badge-deny  { background: rgba(224,92,92,0.12);  color: var(--red);   border: 1px solid rgba(224,92,92,0.25); }
    .badge-gold  { background: rgba(201,183,135,0.10); color: var(--gold);  border: 1px solid rgba(201,183,135,0.2); }
    .badge-teal  { background: rgba(62,207,207,0.08);  color: var(--teal);  border: 1px solid rgba(62,207,207,0.2); }
    .badge-yellow{ background: rgba(224,184,78,0.10);  color: var(--yellow);border: 1px solid rgba(224,184,78,0.22); }
    .badge-purple{ background: rgba(155,127,207,0.10); color: var(--purple);border: 1px solid rgba(155,127,207,0.22); }
    .badge-muted { background: var(--surf2); color: var(--muted); border: 1px solid var(--border); }
    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.9rem; border-radius: 5px; border: 1px solid var(--border); background: var(--surf2); color: var(--text); font-size: 12px; font-family: var(--sans); cursor: pointer; transition: all 0.12s; }
    .btn:hover { background: var(--surf3); border-color: var(--teal); color: var(--teal); }
    .btn-primary { background: rgba(201,183,135,0.1); border-color: rgba(201,183,135,0.3); color: var(--gold); }
    .btn-primary:hover { background: rgba(201,183,135,0.18); }
    /* Code block */
    .code-block { background: var(--surf2); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem 1rem; font-family: var(--mono); font-size: 11.5px; color: var(--teal); overflow-x: auto; white-space: pre; line-height: 1.6; margin: 0.5rem 0; }
    /* Gate cards */
    .gate-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 0.75rem; }
    .gate-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .gate-id { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 0.3rem; }
    .gate-name { font-size: 13px; font-weight: 600; margin-bottom: 0.4rem; }
    .gate-desc { font-size: 11.5px; color: var(--muted); line-height: 1.5; margin-bottom: 0.75rem; }
    /* Input */
    .inp { background: var(--surf2); border: 1px solid var(--border); border-radius: 5px; padding: 0.5rem 0.75rem; color: var(--text); font-size: 12.5px; font-family: var(--mono); width: 100%; outline: none; }
    .inp:focus { border-color: var(--teal); }
    textarea.inp { resize: vertical; min-height: 80px; }
    /* Verdict result */
    .verdict-result { background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-family: var(--mono); font-size: 11.5px; white-space: pre-wrap; max-height: 360px; overflow-y: auto; }
    /* Loading */
    .loading { color: var(--muted); font-size: 12px; padding: 2rem 0; text-align: center; }
    /* Formula pill */
    .pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 2px 8px; border-radius: 12px; font-family: var(--mono); font-size: 10px; margin: 2px; }
    .pill-proved { background: rgba(90,172,142,0.1); color: var(--green); border: 1px solid rgba(90,172,142,0.2); }
    .pill-conjecture { background: rgba(224,184,78,0.1); color: var(--yellow); border: 1px solid rgba(224,184,78,0.2); }
    .pill-roadmap { background: var(--surf2); color: var(--muted); border: 1px solid var(--border); }
    /* SLO bar */
    .slo-bar-bg { background: var(--surf2); border-radius: 3px; height: 6px; width: 100%; }
    .slo-bar-fill { height: 6px; border-radius: 3px; transition: width 0.3s; }
    /* Tier row */
    .tier-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
    .tier-rank { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 1.5rem; text-align: right; }
    .tier-id { font-family: var(--mono); font-size: 12px; color: var(--teal); font-weight: 600; flex: 1; }
    .tier-use { font-size: 11.5px; color: var(--muted); flex: 2; }
    /* Rosie */
    #rosie-widget { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
    #rosie-toggle { width: 2.75rem; height: 2.75rem; border-radius: 50%; background: var(--gold); border: none; color: #0a0a0a; font-size: 1.1rem; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    #rosie-bubble { display: none; width: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .rosie-msgs { max-height: 180px; overflow-y: auto; margin: 0.5rem 0; display: flex; flex-direction: column; gap: 0.35rem; }
    .rmsg-u, .rmsg-b { font-size: 12px; padding: 0.4rem 0.6rem; border-radius: 6px; max-width: 95%; line-height: 1.4; }
    .rmsg-u { background: var(--surf2); align-self: flex-end; color: var(--text); }
    .rmsg-b { background: rgba(201,183,135,0.08); color: var(--gold); }
    .rosie-inp { background: var(--surf2); border: 1px solid var(--border); border-radius: 5px; padding: 0.4rem 0.6rem; color: var(--text); font-size: 12px; width: 100%; margin-top: 0.35rem; outline: none; }
    .rosie-send-btn { margin-top: 0.4rem; width: 100%; padding: 0.4rem; background: rgba(201,183,135,0.1); border: 1px solid rgba(201,183,135,0.25); border-radius: 5px; color: var(--gold); font-size: 12px; cursor: pointer; }
    /* Responsive */
    @media (max-width: 640px) { .sidebar { width: 180px; min-width: 180px; } }
  </style>
</head>

<!-- Hero particle canvas -->
<section style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;">
  <canvas id="bg-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.35;"></canvas>
  <script>
    (function(){
      var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
      var TEAL='rgba(62,207,207,', ACCENT='rgba(201,183,135,';
      var nodes=[],DPR=window.devicePixelRatio||1;
      var W,H,t=0,prefersReduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
      function size(){W=c.width=window.innerWidth*DPR;H=c.height=window.innerHeight*DPR;c.style.width=window.innerWidth+'px';c.style.height=window.innerHeight+'px';}
      for(var i=0;i<55;i++){nodes.push({x:Math.random()*2000,y:Math.random()*1200,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,r:1.5+Math.random()*2.5,p:Math.random()*Math.PI*2});}
      function step(){ctx.clearRect(0,0,W,H);t+=0.016;
        for(var i=0;i<nodes.length;i++){var n=nodes[i];n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;}
        var MAX=140*DPR;for(var i=0;i<nodes.length;i++)for(var j=i+1;j<nodes.length;j++){var a=nodes[i],b=nodes[j];var dx=a.x-b.x,dy=a.y-b.y;var d=Math.sqrt(dx*dx+dy*dy);if(d<MAX){var o=(1-d/MAX);ctx.strokeStyle='rgba(62,207,207,'+(o*0.22)+')';ctx.lineWidth=DPR*0.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
        for(var i=0;i<nodes.length;i++){var n=nodes[i];var p=0.5+0.5*Math.sin(t*1.3+n.p);ctx.fillStyle=(i%5===0)?ACCENT+'0.6)':TEAL+'0.5)';ctx.globalAlpha=0.3+0.4*p;ctx.beginPath();ctx.arc(n.x,n.y,n.r*(0.8+0.4*p),0,6.28);ctx.fill();}
        ctx.globalAlpha=1;if(!prefersReduce)requestAnimationFrame(step);}
      size();window.addEventListener('resize',size);if(prefersReduce){step();}else{requestAnimationFrame(step);}
    })();
  </script>
</section>

<script>
/* ────── state ────── */
const BASE = '/api/sentra/v1';
let _gate_cache = null;

/* ────── helpers ────── */
async function api(path, opts={}) {
  try { const r = await fetch(BASE + path, opts); return await r.json(); }
  catch(e) { return {error: e.message}; }
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pj(obj) { return JSON.stringify(obj, null, 2); }
function ts(t) { if(!t) return '—'; try { return new Date(t).toLocaleTimeString(); } catch(e) { return t; } }
function badgeDecision(d) { return d === 'allow' ? '<span class="badge badge-allow">ALLOW</span>' : d === 'deny' ? '<span class="badge badge-deny">DENY</span>' : `<span class="badge badge-muted">${esc(d)}</span>`; }

/* ────── navigation ────── */
const PAGE_TITLES = {
  overview:'Decision Center', gates:'8-Gate Inspector', 'verdict-feed':'Live Verdict Feed',
  'verdict-tester':'Verdict Tester', 'deny-theater':'Attested-Deny Theater', 'audit-log':'Audit-Verdict Log',
  'threat-corpus':'Threat-Sig Corpus (STIX 2.1)', 'threat-ingest':'Threat-Intel Ingest',
  anomaly:'Anomaly Risk Board', 'policy-harness':'Policy-as-Code Harness',
  compliance:'Compliance Evidence', 'gate-slo':'Gate-Coverage SLO',
  'mesh-crosscut':'Mesh Immune Cross-Cut', forecast:'Mādhava Forecast (F19)',
  formulas:'F1–F23 Formulas', 'llm-hub':'LLM Hub — 5-Tier Router',
};
function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `showPage('${page}')`);
  });
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  renderPage(page);
}
async function renderPage(page) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading…</div>';
  try {
    switch(page) {
      case 'overview':       el.innerHTML = await buildOverview(); break;
      case 'gates':          el.innerHTML = await buildGates(); attachGateHandlers(); break;
      case 'verdict-feed':   el.innerHTML = await buildVerdictFeed(); break;
      case 'verdict-tester': el.innerHTML = buildVerdictTester(); break;
      case 'deny-theater':   el.innerHTML = buildDenyTheater(); break;
      case 'audit-log':      el.innerHTML = await buildAuditLog(); break;
      case 'threat-corpus':  el.innerHTML = await buildThreatCorpus(); break;
      case 'threat-ingest':  el.innerHTML = buildThreatIngest(); break;
      case 'anomaly':        el.innerHTML = buildAnomalyBoard(); break;
      case 'policy-harness': el.innerHTML = buildPolicyHarness(); break;
      case 'compliance':     el.innerHTML = buildCompliance(); break;
      case 'gate-slo':       el.innerHTML = await buildGateSLO(); break;
      case 'mesh-crosscut':  el.innerHTML = await buildMeshCrosscut(); break;
      case 'forecast':       el.innerHTML = await buildForecast(); break;
      case 'formulas':       el.innerHTML = await buildFormulas(); break;
      case 'llm-hub':        el.innerHTML = await buildLLMHub(); break;
      default:               el.innerHTML = '<div class="loading">Page not found.</div>';
    }
  } catch(e) {
    el.innerHTML = `<div class="loading">Error: ${esc(e.message)}</div>`;
  }
}

/* ══════════════════════════════════════════════════════
   TAB-0: DECISION CENTER (OVERVIEW)
══════════════════════════════════════════════════════ */
async function buildOverview() {
  const [audit, gates] = await Promise.all([
    api('/audit-log?limit=200').catch(()=>({total_buffered:0,entries:[]})),
    api('/gates').catch(()=>({total:8,gates:[]})),
  ]);
  const verdicts = audit.total_buffered || 0;

    <button class="btn" onclick="runCompliance('nist-ai-rmf')">NIST AI RMF</button>
    <button class="btn" onclick="runCompliance('iso-42001')">ISO 42001</button>
    <button class="btn" onclick="runCompliance('soc2')">SOC 2</button>
  </div>
</div>
<div id="comp-result" style="display:none;">
  <div class="section-heading" id="comp-heading">Results</div>
  <div id="comp-controls"></div>
  <div class="verdict-result" id="comp-output" style="margin-top:0.5rem;"></div>
</div>`;
}
async function runCompliance(framework) {
  const data = await api('/elite/compliance', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({framework})});
  const controls = data.controls || [];
  let controlHtml = controls.map(c=>{
    const pct = c.coverage_pct || 0;
    const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="card" style="padding:0.75rem;margin-bottom:0.5rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem;">
        <span style="font-size:12px;font-weight:600;">${esc(c.article)}</span>
        <span style="font-size:11px;color:${color};font-weight:600;">${pct}%</span>
      </div>
      <div class="slo-bar-bg"><div class="slo-bar-fill" style="width:${pct}%;background:${color};"></div></div>
      <div style="margin-top:0.4rem;font-size:11px;color:var(--muted);">${c.gate_evidence.map(g=>`<span class="badge ${g.found_in_manifest?'badge-teal':'badge-muted'}">${esc(g.gate)}</span>`).join(' ')}</div>
    </div>`;
  }).join('');
  document.getElementById('comp-heading').textContent = `${framework.toUpperCase()} — Gate Coverage`;
  document.getElementById('comp-controls').innerHTML = controlHtml;
  document.getElementById('comp-output').textContent = pj(data);
  document.getElementById('comp-result').style.display = 'block';
}

/* ══════════════════════════════════════════════════════
   TAB-11 (10): GATE-COVERAGE SLO  — /elite/gate-slo
══════════════════════════════════════════════════════ */
async function buildGateSLO() {
  const data = await api('/elite/gate-slo');
  const gates = data.gates || {};
  const rows = Object.entries(gates).map(([gid,g])=>{
    const events = g.observed_events || 0;
    const status = events === 0 ? 'IDLE' : ((g.observed_hits||0)/events) >= g.target ? 'MET' : 'MISS';
    const badge = status==='MET' ? 'badge-allow' : status==='IDLE' ? 'badge-muted' : 'badge-deny';
    const pct = events > 0 ? ((g.observed_hits||0)/events*100).toFixed(1) : '—';
    return `<tr>
      <td style="font-family:var(--mono);font-size:11px;">${esc(gid)}</td>
      <td style="color:var(--muted);font-size:11.5px;">${esc(g.description)}</td>
      <td style="font-family:var(--mono);">${(g.target*100).toFixed(1)}%</td>
      <td style="font-family:var(--mono);">${pct}%</td>
      <td><span class="badge ${badge}">${status}</span></td>
    </tr>`;
  }).join('');
  return `
<div style="font-size:12px;color:var(--muted);margin-bottom:1rem;">
  Gate coverage SLOs computed from real audit log entries. Backed by <code>/api/sentra/v1/elite/gate-slo</code>. IDLE = no traffic yet (Space just started). Falco/Wiz parity for runtime detection coverage.
</div>
<div class="card" style="padding:0.75rem;margin-bottom:1rem;font-size:11.5px;color:var(--muted);">
  Total audit events: <b>${data.total_audit_events||0}</b> · Gates meeting SLO: <b>${data.gates_meeting_slo||0}/${data.gate_count||8}</b> · ${data.note||''}
</div>
<div class="card" style="padding:0;">
<table class="tbl"><thead><tr><th>Gate</th><th>Description</th><th>SLO Target</th><th>Observed</th><th>Status</th></tr></thead>
<tbody>${rows}</tbody></table>
</div>`;
}

/* ══════════════════════════════════════════════════════
   TAB-12 (8): MESH IMMUNE CROSS-CUT  — /elite/mesh-crosscut
══════════════════════════════════════════════════════ */
async function buildMeshCrosscut() {
  const data = await api('/elite/mesh-crosscut');
  const organs = data.organs || [];
  const rows = organs.map(o=>{
    const dr = o.deny_rate !== null ? (o.deny_rate*100).toFixed(1)+'%' : '—';
    const drColor = o.deny_rate === null ? 'var(--muted)' : o.deny_rate > 0.3 ? 'var(--red)' : o.deny_rate > 0.1 ? 'var(--yellow)' : 'var(--green)';
    return `<tr>
      <td style="font-weight:600;font-family:var(--mono);">${esc(o.organ)}</td>
      <td style="color:var(--muted);font-size:11.5px;">${esc(o.role)}</td>
      <td style="font-size:11px;color:var(--dim);">${esc(o.wire)}</td>
      <td style="font-family:var(--mono);">${o.events||0}</td>
      <td style="font-family:var(--mono);color:var(--red);">${o.deny||0}</td>
      <td style="font-family:var(--mono);color:${drColor};">${dr}</td>
    </tr>`;
  }).join('');
  return `
<div style="font-size:12px;color:var(--muted);margin-bottom:1rem;">
  Per-organ immune event distribution from real audit entries. Mesh invariant: <code>receipts.in ≡ receipts.out</code>. Backed by <code>/api/sentra/v1/elite/mesh-crosscut</code>.
</div>
<div class="card" style="padding:0.75rem;margin-bottom:1rem;font-size:11.5px;color:var(--muted);">
  Total mesh events: <b>${data.total_events||0}</b> · ${data.note||''}
</div>
<div class="card" style="padding:0;">
<table class="tbl"><thead><tr><th>Organ</th><th>Role</th><th>Wire</th><th>Events</th><th>Denied</th><th>Deny Rate</th></tr></thead>
<tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:1.5rem;">No cross-organ events yet (IDLE).</td></tr>'}</tbody></table>
</div>`;
}

/* ══════════════════════════════════════════════════════
   BONUS: F1–F23 FORMULAS  — /puriq/formulas
══════════════════════════════════════════════════════ */
async function buildFormulas() {
  const data = await api('/puriq/formulas');
  const formulas = data.formulas || [];
  function proofBadge(f) {
    if (f.proof_status === 'PROVED') return '<span class="badge badge-allow">PROVED</span>';
    if (f.proof_status === 'CONJECTURE_1') return '<span class="badge badge-yellow">CONJECTURE 1</span>';
    return '<span class="badge badge-muted">ROADMAP</span>';
  }
  const rows = formulas.map(f=>`<tr>
    <td style="font-family:var(--mono);font-weight:600;">${esc(f.formula_id)}</td>
    <td style="font-size:12px;">${esc(f.name)}</td>
    <td style="font-size:11px;color:var(--muted);">${esc(f.organ)}</td>
    <td>${proofBadge(f)}</td>
    <td style="font-family:var(--mono);font-size:10.5px;color:var(--teal);">${esc(JSON.stringify(f.value||{}).substring(0,60))}</td>
  </tr>`).join('');
  return `
<div style="font-size:12px;color:var(--muted);margin-bottom:1rem;">
  All 23 SZL formulas (F1–F23) with live computed values and honest proof status. Backed by <code>/api/sentra/v1/puriq/formulas</code>.
</div>
<div style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;">
  <span>PROVED: </span>${(data.proved||[]).map(f=>`<span class="badge badge-allow">${f}</span>`).join(' ')}
  <span style="margin-left:0.5rem;">CONJECTURE: </span>${(data.conjecture||[]).map(f=>`<span class="badge badge-yellow">${f}</span>`).join(' ')}
</div>
<div style="font-size:11.5px;color:var(--muted);margin-bottom:1rem;">
  Lean pin: ${data.lean_pin||'749/14/163 @ c7c0ba17'} · Λ: ${data.lambda_status||'Conjecture 1 (NOT a theorem)'}
</div>
<div class="card" style="padding:0;">
<table class="tbl"><thead><tr><th>ID</th><th>Name</th><th>Organ</th><th>Status</th><th>Live Value</th></tr></thead>
<tbody>${rows}</tbody></table>
</div>`;
}

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */

  const data = await api('/llm/hub');

<div style="font-size:12px;color:var(--muted);margin-bottom:1rem;">
  Full 5-tier LLM router — a11oy parity. Backed by <code>/api/sentra/v1/llm/hub</code> + <code>/api/sentra/v1/llm/route/elite</code>. Tier selection and Λ-receipt are real deterministic math. Response is honest stub (no API key wired).
</div>

  <div style="padding:0.75rem 1rem;border-bottom:1px solid var(--border);display:flex;gap:0.75rem;font-family:var(--mono);font-size:10.5px;color:var(--muted);">

</div>
<div class="card">

  <div style="display:flex;gap:0.5rem;align-items:center;">
    <label style="font-size:12px;color:var(--muted);">Max tier:</label>
    <input class="inp" id="llm-tier" type="number" value="4" min="0" max="4" style="width:60px;"/>
    <label style="font-size:12px;color:var(--muted);">Task hint:</label>
    <input class="inp" id="llm-hint" value="immune" style="width:120px;"/>
    <button class="btn btn-primary" onclick="runLLMRoute()">Route →</button>
  </div>
</div>
<div id="llm-result" style="display:none;">
  <div class="section-heading">Routing Decision</div>
  <div class="verdict-result" id="llm-output"></div>
</div>
<div class="card" style="margin-top:0.75rem;font-size:11.5px;color:var(--muted);">
  ${esc(data.honest_stub_note||'')}

}
async function runLLMRoute() {
  const prompt = document.getElementById('llm-prompt').value;
  const max_tier = parseInt(document.getElementById('llm-tier').value)||4;
  const task_hint = document.getElementById('llm-hint').value;
  const data = await api('/llm/route/elite', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({prompt, max_tier, task_hint})});
  document.getElementById('llm-output').textContent = pj(data);
  document.getElementById('llm-result').style.display = 'block';
}

/* ────── Rosie widget ────── */
let rosieOpen = false;
function toggleRosie() {
  rosieOpen = !rosieOpen;
  document.getElementById('rosie-bubble').style.display = rosieOpen ? 'block' : 'none';
}
async function sendRosie() {
  const inp = document.getElementById('rosie-inp');
  const msg = inp.value.trim(); if (!msg) return;
  inp.value = '';
  const msgs = document.getElementById('rosie-msgs');
  msgs.innerHTML += `<div class="rmsg-u">${esc(msg)}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  try {
    const r = await fetch('/api/sentra/v1/brain/jack', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({messages:[{role:'user',content:msg}]})});
    const d = await r.json();
    const reply = d.response || d.content || d.text || d.answer || pj(d).substring(0,200);
    msgs.innerHTML += `<div class="rmsg-b">${esc(reply)}</div>`;
  } catch(e) {
    msgs.innerHTML += `<div class="rmsg-b">Error: ${esc(e.message)}</div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
}

/* ────── init ────── */
renderPage('overview');
