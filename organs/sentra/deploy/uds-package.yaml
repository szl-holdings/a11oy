# SLSA: L1 honest · Section 889: 5 vendors · NO Iron Bank / FedRAMP / CMMC
#
# Sentra is the SZL mesh immune system: 8-gate dual-use filter protecting all
# organs and actions. Receives Wire B verdicts from a11oy.
#
# References:
#   UDS Core CRD: https://github.com/defenseunicorns/uds-core/blob/main/src/pepr/operator/crd/
#   SZL P2 Spec: SHARED_LEDGER/sentra/P2_SPEC_PM.md
