<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>rosie — Fleet Topology 3D Map</title>
<style>
  body { margin:0; background:#04060d; color:#aaccbb; font-family:'Courier New',monospace; overflow:hidden; }
  #canvas-container { width:100vw; height:100vh; }
  #hud {
    position:fixed; top:12px; left:12px; background:rgba(0,0,0,0.8);
    border:1px solid #1a3328; padding:10px 16px; border-radius:6px;
    font-size:12px; line-height:1.8; z-index:10; max-width:260px;
  }
  #hud h2 { color:#aaccbb; margin:0 0 6px; font-size:14px; letter-spacing:2px; }
  #peers { margin-top:8px; }
  .peer-row { display:flex; align-items:center; gap:8px; margin:3px 0; }
  .peer-dot { width:8px; height:8px; border-radius:50%; }
  .peer-name { min-width:80px; }
  .peer-status { color:#555; font-size:10px; }
  #status { position:fixed; bottom:12px; left:12px; font-size:11px; color:#333; }
  #receipt-tape {
    position:fixed; right:12px; top:12px; bottom:12px; width:220px;
    background:rgba(0,0,0,0.8); border:1px solid #1a3328;
    border-radius:6px; padding:10px; overflow:hidden; font-size:10px;
  }
  #receipt-tape h3 { color:#aaccbb; font-size:11px; margin:0 0 8px; letter-spacing:1px; }
  .receipt-item { 
    border-bottom:1px solid #0a1a14; padding:4px 0; color:#556655;
    transition: color 0.5s;
  }
  .receipt-item.new { color:#aaccbb; }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="hud">
  <h2>🌐 ROSIE FLEET TOPOLOGY</h2>
  <div style="color:#333;font-size:10px;margin-bottom:8px;">5 Flagships · Khipu Streams · Doctrine v11</div>
  <div>Receipts streamed: <span id="receipt-count" style="color:#aaccbb">0</span></div>
  <div>Active flows: <span id="flow-count" style="color:#00ff88">0</span></div>
  <div>Doctrine: <span id="doctrine-status" style="color:#00ff88">v11 ✓</span></div>
  <div id="peers"></div>
</div>
<div id="receipt-tape">
  <h3>📜 KHIPU RECEIPT STREAM</h3>
  <div id="receipt-list"></div>
</div>
<div id="status">Doctrine v11 LOCKED · rosie/3d/topology · Three.js r160 (MIT) · © SZL Holdings 2026 · Apache-2.0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// rosie Fleet Topology 3D Map
// Source: Three.js r160 (MIT) — https://threejs.org/
// DCO: Signed-off-by: Yachay <yachay@szlholdings.ai>
// Co-Authored-By: Perplexity Computer Agent <agent@perplexity.ai>
// Doctrine: v11 LOCKED | Λ Conjecture 1 | ADDITIVE ONLY

const FLEET_API = 'https://szlholdings-a11oy.hf.space/api/a11oy/v4/fleet';
const DOCTRINE = {v:'v11', kernel:'c7c0ba17', declarations:749, sorries:163};

// Flagship definitions
const FLAGSHIPS = [
  {id:'a11oy',    name:'a11oy',    color:0xd4a444, desc:'Policy Gate',    healthUrl:'https://szlholdings-a11oy.hf.space/api/a11oy/healthz'},
  {id:'sentra',   name:'sentra',   color:0x4488ff, desc:'Security Immune', healthUrl:'https://szlholdings-sentra.hf.space/api/sentra/healthz'},
  {id:'amaru',    name:'amaru',    color:0x44ffcc, desc:'Cortex Memory',   healthUrl:'https://szlholdings-amaru.hf.space/api/amaru/healthz'},
  {id:'rosie',    name:'rosie',    color:0x00ff88, desc:'Operator Console',healthUrl:'https://szlholdings-rosie.hf.space/healthz'},
  {id:'killinchu',name:'killinchu',color:0xff4444, desc:'Drone Domain',    healthUrl:'https://szlholdings-killinchu.hf.space/api/killinchu/healthz'},
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04060d);
scene.fog = new THREE.FogExp2(0x04060d, 0.015);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 300);
camera.position.set(0, 20, 45);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x112233, 0.6));
const pLight = new THREE.PointLight(0xffffff, 1.0, 100);
pLight.position.set(0,30,0);
scene.add(pLight);

// Grid
const grid = new THREE.GridHelper(80, 20, 0x0a1a14, 0x050d0a);
scene.add(grid);

// Flagship orbs — arranged in pentagon
const orbMeshes = {};
const ORBS = {};
const R = 14; // orbit radius

FLAGSHIPS.forEach((f, i) => {
  const angle = (i / FLAGSHIPS.length) * Math.PI * 2 - Math.PI/2;
  const x = Math.cos(angle) * R;
  const z = Math.sin(angle) * R;

  // Orb
  const geo = new THREE.SphereGeometry(1.5, 32, 32);
  const mat = new THREE.MeshPhongMaterial({
    color:f.color, emissive:f.color, emissiveIntensity:0.3,
    transparent:true, opacity:0.9
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 0, z);
  scene.add(mesh);
  orbMeshes[f.id] = mesh;
  ORBS[f.id] = {x, z, angle};

  // Glow ring
  const ringGeo = new THREE.RingGeometry(2, 2.4, 32);
  const ringMat = new THREE.MeshBasicMaterial({color:f.color, side:THREE.DoubleSide, transparent:true, opacity:0.2});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(x, 0, z);
  ring.rotation.x = Math.PI/2;
  scene.add(ring);

  // Label sprite
  const canvas2 = document.createElement('canvas');
  canvas2.width = 128; canvas2.height = 32;
  const ctx = canvas2.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0,0,128,32);
  ctx.font = 'bold 16px Courier New';
  ctx.fillStyle = '#'+f.color.toString(16).padStart(6,'0');
  ctx.textAlign = 'center';
  ctx.fillText(f.name, 64, 22);
  const tex = new THREE.CanvasTexture(canvas2);
  const spriteMat = new THREE.SpriteMaterial({map:tex, transparent:true});
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(x, 2.5, z);
  sprite.scale.set(4, 1, 1);
  scene.add(sprite);

  // Peer HUD row
  const peersDiv = document.getElementById('peers');
  const row = document.createElement('div');
  row.className = 'peer-row';
  row.id = 'peer-'+f.id;
  row.innerHTML = `<div class="peer-dot" style="background:#'+f.color.toString(16).padStart(6,'0')+'"></div>
    <span class="peer-name">${f.name}</span>
    <span class="peer-status" id="ps-${f.id}">checking...</span>`;
  peersDiv.appendChild(row);
});

// Particle streams (Khipu receipt flows)
const MAX_PARTICLES = 600;
const particlePositions = new Float32Array(MAX_PARTICLES*3);
const particleColors = new Float32Array(MAX_PARTICLES*3);
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
const pMat = new THREE.PointsMaterial({size:0.15, vertexColors:true, transparent:true, opacity:0.8});
scene.add(new THREE.Points(pGeo, pMat));

// Connection lines between all pairs
FLAGSHIPS.forEach((a, i) => {
  FLAGSHIPS.forEach((b, j) => {
    if(i>=j) return;
    const aOrb = ORBS[a.id]; const bOrb = ORBS[b.id];
    const pts = [
      new THREE.Vector3(aOrb.x, 0, aOrb.z),
      new THREE.Vector3(bOrb.x, 0, bOrb.z)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({color:0x1a3328, transparent:true, opacity:0.3});
    scene.add(new THREE.Line(geo, mat));
  });
});

// State
let receiptCount = 0;
let flowCount = 0;
let pIdx = 0;
const activeFlows = [];

// Animate a particle stream between two flagships
function emitReceiptStream(srcId, dstId, color) {
  const src = ORBS[srcId]; const dst = ORBS[dstId];
  if(!src||!dst) return;
  for(let i=0;i<15;i++) {
    const t = i/15;
    const px = src.x + (dst.x - src.x)*t + (Math.random()-0.5)*0.3;
    const py = Math.sin(t*Math.PI)*2 + (Math.random()-0.5)*0.3;
    const pz = src.z + (dst.z - src.z)*t + (Math.random()-0.5)*0.3;
    const idx = (pIdx % MAX_PARTICLES)*3;
    particlePositions[idx]   = px;
    particlePositions[idx+1] = py;
    particlePositions[idx+2] = pz;
    const col = new THREE.Color(color);
    particleColors[idx]   = col.r;
    particleColors[idx+1] = col.g;
    particleColors[idx+2] = col.b;
    pIdx++;
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate = true;
  flowCount++;
  receiptCount++;
  updateHUD();
  addReceiptTape(srcId, dstId, color);
}

function addReceiptTape(src, dst, color) {
  const list = document.getElementById('receipt-list');
  const item = document.createElement('div');
  item.className = 'receipt-item new';
  const hash = Math.random().toString(36).slice(2,10);
  const col = new THREE.Color(color);
  const hex = '#'+Math.round(col.r*255).toString(16).padStart(2,'0')+
                   Math.round(col.g*255).toString(16).padStart(2,'0')+
                   Math.round(col.b*255).toString(16).padStart(2,'0');
  item.innerHTML = `<span style="color:${hex}">▶</span> ${src}→${dst} | ${hash} | v11`;
  list.insertBefore(item, list.firstChild);
  setTimeout(() => item.classList.remove('new'), 100);
  // Trim
  while(list.children.length > 20) list.removeChild(list.lastChild);
  receiptCount++;
  document.getElementById('receipt-count').textContent = receiptCount;
}

function updateHUD() {
  document.getElementById('flow-count').textContent = flowCount;
}

// Pulse orbs
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;
  
  // Orbit camera
  const camAngle = t * 0.15;
  camera.position.x = Math.sin(camAngle) * 45;
  camera.position.z = Math.cos(camAngle) * 45;
  camera.position.y = 20 + Math.sin(t*0.2)*5;
  camera.lookAt(0,0,0);
  
  // Pulse orbs
  Object.values(orbMeshes).forEach((mesh, i) => {
    mesh.scale.setScalar(1 + Math.sin(t*2 + i)*0.05);
    mesh.rotation.y += 0.01;
  });
  
  // Decay particle brightness
  for(let i=0;i<MAX_PARTICLES*3;i++) particleColors[i]*=0.998;
  pGeo.attributes.color.needsUpdate = true;
  
  renderer.render(scene, camera);
}

// Health check all flagships
async function checkHealth(flagship) {
  const f = FLAGSHIPS.find(f=>f.id===flagship.id);
  try {
    const resp = await fetch(f.healthUrl, {mode:'cors'});
    if(resp.ok) {
      document.getElementById('ps-'+f.id).textContent = '✓ LIVE';
      document.getElementById('ps-'+f.id).style.color = '#00ff88';
      orbMeshes[f.id].material.emissiveIntensity = 0.5;
    } else {
      document.getElementById('ps-'+f.id).textContent = 'WARN';
      document.getElementById('ps-'+f.id).style.color = '#ffaa00';
    }
  } catch {
    document.getElementById('ps-'+f.id).textContent = 'probing';
    document.getElementById('ps-'+f.id).style.color = '#4488ff';
  }
}

// Simulate receipt flows
function triggerReceiptFlow() {
  const src = FLAGSHIPS[Math.floor(Math.random()*FLAGSHIPS.length)];
  const dst = FLAGSHIPS[Math.floor(Math.random()*FLAGSHIPS.length)];
  if(src.id===dst.id) return;
  const flowColors = [0x00ff88, 0x4488ff, 0xffaa00, 0xaa44ff, 0xd4a444];
  emitReceiptStream(src.id, dst.id, flowColors[Math.floor(Math.random()*flowColors.length)]);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
FLAGSHIPS.forEach(f => checkHealth(f));
setInterval(() => FLAGSHIPS.forEach(f => checkHealth(f)), 30000);
setInterval(triggerReceiptFlow, 1200);
// Initial burst
for(let i=0;i<10;i++) setTimeout(triggerReceiptFlow, i*200);
</script>
</body>
</html>
