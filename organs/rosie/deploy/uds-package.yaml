# deploy/uds-package.yaml — rosie UDS Package CR
# Authored by: Connector Wayra · P4 UDS Apply
# Doctrine: v11 LOCKED 749/14/163 · Λ = Conjecture 1 (NOT a theorem)
# SLSA: L1 honest · Section 889: 5 vendors · NO Iron Bank / FedRAMP / CMMC
#
# Rosie is the SZL Fleet Operator Console — nervous system and cross-session
# god-view. Co-pilot to amaru (NOT pilot). hatun_willay aggregate invariant.
# Proxies live routes to all siblings (a11oy, sentra, amaru, killinchu).
#
# References:
#   UDS Core CRD: https://github.com/defenseunicorns/uds-core/blob/main/src/pepr/operator/crd/
#   SZL P2 Spec: SHARED_LEDGER/rosie/P2_SPEC_PM.md
#
# Signed-off-by: Yachay <yachay@szlholdings.ai>
# Co-Authored-By: Perplexity Computer Agent <agent@perplexity.ai>

apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: rosie
  namespace: rosie
  annotations:
    szl.io/doctrine-version: "v11"
    szl.io/doctrine-locked: "749/14/163"
    szl.io/lean-sha: "c7c0ba17"
    szl.io/lambda-status: "Conjecture 1 — NOT a theorem"
    szl.io/slsa-level: "L1"
    szl.io/section-889: "Huawei,ZTE,Hytera,Hikvision,Dahua"
    szl.io/hatun-willay: "true"
    szl.io/dual-pilot: "rosie=co-pilot amaru=cortex-pilot"
spec:
  network:
    allow:
      - direction: Egress
        selector:
          app: rosie
        remoteGenerated: Anywhere
        port: 443
        description: "HF Space egress + live proxy to all 5 flagships"
      - direction: Egress
        selector:
          app: rosie
        remoteNamespace: amaru
        port: 7860
        description: "Rosie co-pilot egress to amaru cortex"
      - direction: Egress
        selector:
          app: rosie
        remoteNamespace: a11oy
        port: 7860
        description: "Fleet proxy: a11oy"
      - direction: Egress
        selector:
          app: rosie
        remoteNamespace: sentra
        port: 7860
        description: "Fleet proxy: sentra"
      - direction: Ingress
        selector:
          app: rosie
        remoteNamespace: istio-system
        port: 7860
        description: "Istio ingress gateway"
  expose:
    - service: rosie-svc
      selector:
        app: rosie
      host: rosie
      gateway: tenant
      port: 7860
      targetPort: 7860
  sso:
    - name: rosie SSO
      clientId: rosie
      redirectUris:
        - "https://rosie.uds.dev/callback"
        - "https://szlholdings-rosie.hf.space/callback"
      description: "Rosie fleet operator console — nervous system"
  monitor:
    - selector:
        app: rosie
      portName: http
      targetPort: 7860
      path: /api/health
      description: "rosie health monitor"
