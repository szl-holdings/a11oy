# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rosie-console
  namespace: rosie
  labels:
    app.kubernetes.io/name: rosie
    app.kubernetes.io/component: operator-console
    app.kubernetes.io/part-of: szl-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rosie
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rosie
        app.kubernetes.io/component: operator-console
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: rosie-console
          # Built by zarf-build-and-sign.yml from deploy/Dockerfile (Gradio).
          # Requires deploy/app/app.py vendored from the HF Space first.
          image: ghcr.io/szl-holdings/rosie:v0.3.1-rc.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GRADIO_SERVER_NAME
              value: "0.0.0.0"
            - name: GRADIO_SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
