# Default values for rosie-api.

image:
  repository: ghcr.io/szl-holdings/rosie-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 2

# Container listen port (matches Dockerfile EXPOSE and HEALTHCHECK).
port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Spread replicas across nodes (soft anti-affinity).
antiAffinity: soft

# Application environment.
env:
  KEYCLOAK_ISSUER_URL: https://sso.szlholdings.com/realms/szl
  KEYCLOAK_AUDIENCE: rosie-api
  # szl-receipts-server (a11oy receipt substrate backend).
  RECEIPTS_BACKEND_URL: http://szl-receipts-server.szl-receipts.svc.cluster.local:8080
  # The Ed25519 signing key is mounted from a Secret; see keyCustody below.
  # No key material is committed — the key path points at the mounted Secret.
  SZL_ED25519_KEY_PATH: /run/secrets/rosie-api/ed25519.pem
  SZL_KEY_ID: rosie-api-ed25519-2026
  LOG_LEVEL: info

# Ed25519 signing key custody.
# The private key is delivered out-of-band per the key-custody runbook
# (authored in parallel by PhD SecOps). Reference:
#   docs/runbooks/key-custody.md  (JWT public-key source + Ed25519 signing key)
# This chart mounts an existing Secret; it never creates or embeds key material.
keyCustody:
  secretName: rosie-api-ed25519
  mountPath: /run/secrets/rosie-api
  # Runbook reference (see README "Citation" + PhD SecOps key-custody runbook).
  runbook: docs/runbooks/key-custody.md

# UDS Package CR settings.
uds:
  ssoClientId: rosie-api
  # authservice protects all ingress to this app via the Keycloak realm.
  authserviceSelector:
    app.kubernetes.io/name: rosie-api
  # OTLP egress to the in-cluster collector.
  otlpEndpoint: opentelemetry-collector.monitoring.svc.cluster.local
  otlpPort: 4317
  # Allowed widget host(s) that may call this API.
  widgetRemoteSelector:
    app.kubernetes.io/name: rosie-widget

# Prometheus ServiceMonitor.
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s

# PodDisruptionBudget.
pdb:
  minAvailable: 1
