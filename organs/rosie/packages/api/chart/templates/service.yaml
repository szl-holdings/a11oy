apiVersion: v1
kind: Service
metadata:
  name: {{ include "rosie-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rosie-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "rosie-api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
