apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: amaru
  namespace: amaru
  annotations:
    szl.io/doctrine-version: "v11"
    szl.io/doctrine-locked: "749/14/163"
    szl.io/lean-sha: "c7c0ba17"
    szl.io/lambda-status: "Conjecture 1 — NOT a theorem"
    szl.io/slsa-level: "L1"
    szl.io/section-889: "Huawei,ZTE,Hytera,Hikvision,Dahua"
    szl.io/dual-pilot: "rosie=co-pilot amaru=pilot"
spec:
  network:
    allow:
      - direction: Egress
        selector:
          app: amaru
        remoteGenerated: Anywhere
        port: 443
        description: "HF Space egress + Wire E to a11oy cortex-subscribe"
      - direction: Egress
        selector:
          app: amaru
        remoteNamespace: a11oy
        port: 7860
        description: "Wire E: amaru cortex sync to a11oy"
      - direction: Ingress
        selector:
          app: amaru
        remoteNamespace: rosie
        port: 7860
        description: "Rosie co-pilot query access"
      - direction: Ingress
        selector:
          app: amaru
        remoteNamespace: istio-system
        port: 7860
        description: "Istio ingress gateway"
  expose:
    - service: amaru-svc
      selector:
        app: amaru
      host: amaru
      gateway: tenant
      port: 7860
      targetPort: 7860
  sso:
    - name: amaru SSO
      clientId: amaru
      redirectUris:
        - "https://amaru.uds.dev/callback"
        - "https://szlholdings-amaru.hf.space/callback"
      description: "Amaru memory cortex — Andean Ouroboros"
  monitor:
    - selector:
        app: amaru
      portName: http
      targetPort: 7860
      path: /api/health
      description: "amaru health monitor"
